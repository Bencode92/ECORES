<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Questionnaire EcoVadis 2026 — CAMELEON COM MARK SASU</title>
<style>
  :root {
    --c-env: #2e7d32;
    --c-soc: #43a047;
    --c-eth: #1b5e20;
    --c-sup: #66bb6a;
    --c-gen: #558b2f;
    --c-bg: #f1f8e9;
    --c-card: #fff;
    --c-border: #c8e6c9;
    --c-text: #1b3a1b;
    --c-muted: #4e6a4e;
    --c-success: #2e7d32;
    --c-warning: #f57c00;
    --c-danger: #c62828;
    --c-info: #2e7d32;
    --c-primary: #2e7d32;
    --c-primary-dark: #1b5e20;
    --c-primary-light: #a5d6a7;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.5;
  }
  header {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%);
    color: white;
    padding: 24px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header-title h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }
  .header-title p { margin: 4px 0 0 0; opacity: 0.8; font-size: 0.85rem; }
  .score-badge {
    background: rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 8px;
    text-align: center;
  }
  .score-badge .score { font-size: 1.6rem; font-weight: 700; }
  .score-badge .label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .toolbar {
    background: white;
    border-bottom: 1px solid var(--c-border);
    padding: 12px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 92px;
    z-index: 99;
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 12px;
    border: 1px solid var(--c-border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: #f5f5f5; }
  .filter-btn.active {
    background: var(--c-primary);
    color: white;
    border-color: var(--c-primary);
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--c-border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .btn:hover { background: #f5f5f5; }
  .btn-primary {
    background: var(--c-primary);
    color: white;
    border-color: var(--c-primary);
  }
  .btn-primary:hover { background: var(--c-primary-dark); }
  
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px 64px;
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: white;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--c-border);
  }
  .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--c-text); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .question-card {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .question-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-card.hidden { display: none; }
  
  .q-header {
    padding: 16px 20px;
    background: #fafafa;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .q-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .q-code {
    font-family: "SF Mono", Monaco, monospace;
    background: #eceff1;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .theme-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: white;
  }
  .theme-environnement { background: #1b5e20; }
  .theme-social { background: #2e7d32; }
  .theme-éthique { background: #388e3c; }
  .theme-achats { background: #43a047; }
  .theme-général { background: #558b2f; }
  .section-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    background: #f5f5f5;
    color: var(--c-muted);
    border: 1px solid var(--c-border);
  }
  
  .priority-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .priority-haute { background: #ffebee; color: var(--c-danger); }
  .priority-moyenne { background: #fff3e0; color: var(--c-warning); }
  .priority-faible { background: #fffde7; color: #f9a825; }
  .priority-ok { background: #e8f5e9; color: var(--c-success); }
  
  .q-body { padding: 20px; }
  .q-text {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--c-text);
  }
  
  .section-block { margin-bottom: 16px; }
  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--c-muted);
    margin-bottom: 8px;
  }
  
  .docs-list { display: grid; gap: 8px; }
  .doc-item {
    background: #f1f8e9;
    padding: 10px 12px;
    border-radius: 6px;
    border-left: 3px solid var(--c-primary);
    font-size: 0.88rem;
  }
  .doc-name { font-weight: 600; }
  .doc-meta { color: var(--c-muted); font-size: 0.78rem; margin-top: 2px; }
  .doc-comment { font-style: italic; color: var(--c-muted); font-size: 0.82rem; margin-top: 4px; }
  
  .scorecard-notes { display: grid; gap: 6px; }
  .scorecard-note {
    background: #fff3e0;
    border-left: 3px solid var(--c-warning);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
  }
  .scorecard-note.priority-haute {
    background: #ffebee;
    border-left-color: var(--c-danger);
  }
  
  .annotation {
    background: #e8f5e9;
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
    border: 1px solid var(--c-primary-light);
  }
  .annotation-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--c-primary-dark);
    margin-bottom: 8px;
  }
  .annotation-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px;
    margin-bottom: 8px;
    align-items: start;
  }
  .annotation-row label {
    font-size: 0.85rem;
    color: var(--c-muted);
    padding-top: 4px;
  }
  .annotation textarea, .annotation input, .annotation select {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--c-primary-light);
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.88rem;
    background: white;
  }
  .annotation textarea:focus, .annotation input:focus, .annotation select:focus {
    outline: 2px solid var(--c-primary);
    outline-offset: -1px;
    border-color: var(--c-primary);
  }
  .annotation textarea { min-height: 50px; resize: vertical; }
  
  .empty-msg {
    color: var(--c-muted);
    font-style: italic;
    font-size: 0.85rem;
    padding: 8px 0;
  }
  
  .doc-status-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 8px;
  }
  .doc-status-bar select {
    padding: 4px 8px;
    border: 1px solid var(--c-border);
    border-radius: 4px;
    font-size: 0.78rem;
    background: white;
  }
  
  details summary {
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--c-muted);
    padding: 6px 0;
    user-select: none;
  }
  details[open] summary { margin-bottom: 8px; }
  pre.raw {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  
  @media print {
    header, .toolbar { position: static; }
    .question-card, .doc-card { break-inside: avoid; }
    .annotation { background: #f9f9f9 !important; -webkit-print-color-adjust: exact; }
  }

  /* === Tabs === */
  .tabs {
    background: white;
    border-bottom: 1px solid var(--c-border);
    padding: 0 32px;
    display: flex;
    gap: 4px;
    position: sticky;
    top: 92px;
    z-index: 99;
  }
  .tab-btn {
    padding: 14px 24px;
    border: none;
    background: transparent;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--c-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--c-primary); background: #f1f8e9; }
  .tab-btn.active {
    color: var(--c-primary-dark);
    border-bottom-color: var(--c-primary);
    background: #f1f8e9;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .toolbar { top: 144px; }

  /* === Library view === */
  .doc-card {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .doc-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .doc-card.hidden { display: none; }
  .doc-card.expired { border-left: 4px solid var(--c-danger); }
  .doc-card.warning { border-left: 4px solid var(--c-warning); }
  .doc-card.valid { border-left: 4px solid var(--c-success); }
  .doc-card.unknown { border-left: 4px solid #bdbdbd; }

  .doc-card-header {
    padding: 14px 18px;
    background: #fafafa;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .doc-card-header h3 {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
    color: var(--c-text);
  }
  .doc-card-header .doc-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .doc-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
  }
  .doc-tag.type-politique { background: #1b5e20; }
  .doc-tag.type-action { background: #43a047; }
  .doc-tag.type-reporting { background: #ef6c00; }
  .doc-tag.type-certificat { background: #6a1b9a; }
  .doc-tag.type-adhesion { background: #1976d2; }
  .doc-tag.type-audit { background: #c62828; }
  .doc-tag.type-autre { background: #616161; }

  .validity-badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .validity-badge.expired { background: #ffebee; color: var(--c-danger); }
  .validity-badge.warning { background: #fff3e0; color: var(--c-warning); }
  .validity-badge.valid { background: #e8f5e9; color: var(--c-success); }
  .validity-badge.unknown { background: #f5f5f5; color: var(--c-muted); }

  .doc-card-body { padding: 16px 18px; }
  .doc-fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }
  .doc-field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--c-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .doc-field input, .doc-field select {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--c-primary-light);
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.88rem;
    background: white;
  }
  .doc-field input:focus, .doc-field select:focus {
    outline: 2px solid var(--c-primary);
    outline-offset: -1px;
    border-color: var(--c-primary);
  }
  .doc-field .computed {
    padding: 6px 10px;
    background: #f5f5f5;
    border-radius: 5px;
    font-size: 0.88rem;
    color: var(--c-text);
  }

  .doc-questions-list {
    margin-top: 8px;
  }
  .doc-questions-list .label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--c-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .doc-q-chip {
    display: inline-block;
    padding: 4px 10px;
    background: #f1f8e9;
    color: var(--c-primary-dark);
    border: 1px solid var(--c-primary-light);
    border-radius: 12px;
    font-size: 0.78rem;
    font-family: "SF Mono", Monaco, monospace;
    margin: 2px 4px 2px 0;
    text-decoration: none;
  }
  .doc-q-chip:hover { background: var(--c-primary-light); }

  .rattachement-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    padding: 8px 10px;
    background: #f9fbf7;
    border: 1px solid #e8f5e9;
    border-radius: 6px;
    margin-bottom: 6px;
    align-items: start;
    font-size: 0.85rem;
  }
  .rattachement-row .rattach-code {
    font-family: "SF Mono", Monaco, monospace;
    background: var(--c-primary);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    text-align: center;
    font-weight: 600;
    text-decoration: none;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .rattachement-row .rattach-code:hover { background: var(--c-primary-dark); }
  .rattachement-row .rattach-info {
    color: var(--c-text);
  }
  .rattachement-row .rattach-question {
    font-size: 0.82rem;
    color: var(--c-muted);
    font-style: italic;
    margin-bottom: 3px;
  }
  .rattachement-row .rattach-pages {
    display: inline-block;
    background: #fff3e0;
    color: var(--c-warning);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    margin-right: 6px;
  }
  .rattachement-row .rattach-why {
    font-size: 0.85rem;
    color: var(--c-text);
    margin-top: 4px;
    padding: 4px 8px;
    background: white;
    border-left: 2px solid var(--c-primary);
    border-radius: 3px;
  }
  .rattachement-row .rattach-why-empty {
    font-size: 0.78rem;
    color: var(--c-muted);
    font-style: italic;
    margin-top: 4px;
  }

  /* Recommended new docs panel */
  .recommended-panel {
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    border: 2px solid var(--c-warning);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .recommended-panel h2 {
    margin: 0 0 12px 0;
    font-size: 1.05rem;
    color: #e65100;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .recommended-panel .recommendation {
    background: white;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 4px solid var(--c-warning);
    font-size: 0.88rem;
  }
  .recommended-panel .recommendation.priority-haute {
    border-left-color: var(--c-danger);
    background: #ffebee;
  }
  .recommended-panel .recommendation strong { color: var(--c-text); }
  .recommended-panel .recommendation .for-q {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.78rem;
    color: var(--c-muted);
  }
  .recommended-panel .add-this-btn {
    margin-top: 6px;
    padding: 4px 10px;
    background: var(--c-primary);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.78rem;
  }
  .recommended-panel .add-this-btn:hover { background: var(--c-primary-dark); }

  .doc-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--c-border);
    flex-wrap: wrap;
  }
  .btn-danger {
    background: white;
    border: 1px solid #ef5350;
    color: var(--c-danger);
  }
  .btn-danger:hover { background: #ffebee; }

  .add-doc-form {
    background: #f1f8e9;
    border: 2px dashed var(--c-primary);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .add-doc-form h3 {
    margin: 0 0 12px 0;
    font-size: 1rem;
    color: var(--c-primary-dark);
  }
</head>
<body>
<header>
  <div class="header-content">
    <div class="header-title">
      <h1>Questionnaire EcoVadis 2026 — CAMELEON COM MARK SASU</h1>
      <p>Périmètre : Entité · Activités d'agences d'emploi temporaire · Paris · Remise : fin mai 2026</p>
    </div>
    <div class="score-badge">
      <div class="score">84/100</div>
      <div class="label">Score 2024 · 99e percentile</div>
    </div>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="questions">📋 Questionnaire (17 questions)</button>
  <button class="tab-btn" data-tab="library">📚 Bibliothèque documents</button>
</nav>

<div id="view-questions" class="tab-content active">
<div class="toolbar">
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Thème :</strong>
    <button class="filter-btn active" data-filter="theme" data-value="all">Tous</button>
    <button class="filter-btn" data-filter="theme" data-value="Général">Général</button>
    <button class="filter-btn" data-filter="theme" data-value="Environnement">Environnement</button>
    <button class="filter-btn" data-filter="theme" data-value="Social et Droits Humains">Social</button>
    <button class="filter-btn" data-filter="theme" data-value="Éthique">Éthique</button>
    <button class="filter-btn" data-filter="theme" data-value="Achats Responsables">Achats</button>
  </div>
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Priorité :</strong>
    <button class="filter-btn active" data-filter="priority" data-value="all">Toutes</button>
    <button class="filter-btn" data-filter="priority" data-value="haute">🔴 Haute</button>
    <button class="filter-btn" data-filter="priority" data-value="moyenne">🟠 Moyenne</button>
    <button class="filter-btn" data-filter="priority" data-value="faible">🟡 Faible</button>
    <button class="filter-btn" data-filter="priority" data-value="ok">🟢 OK</button>
  </div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="btn" id="btn-export">💾 Exporter annotations</button>
    <button class="btn" id="btn-import">📂 Importer</button>
    <input type="file" id="file-input" accept=".json" style="display:none">
    <button class="btn" id="btn-print">🖨️ Imprimer</button>
  </div>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div id="questions"></div>
</main>
</div><!-- /view-questions -->

<div id="view-library" class="tab-content">
<div class="toolbar">
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Type :</strong>
    <button class="filter-btn active" data-filter-lib="type" data-value="all">Tous</button>
    <button class="filter-btn" data-filter-lib="type" data-value="politique">Politiques</button>
    <button class="filter-btn" data-filter-lib="type" data-value="action">Actions</button>
    <button class="filter-btn" data-filter-lib="type" data-value="reporting">Reporting/KPI</button>
    <button class="filter-btn" data-filter-lib="type" data-value="certificat">Certificats</button>
    <button class="filter-btn" data-filter-lib="type" data-value="adhesion">Adhésions</button>
    <button class="filter-btn" data-filter-lib="type" data-value="audit">Audits</button>
  </div>
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Validité :</strong>
    <button class="filter-btn active" data-filter-lib="validity" data-value="all">Toutes</button>
    <button class="filter-btn" data-filter-lib="validity" data-value="valid">🟢 Valide</button>

const QUESTIONS = [{"code": "GEN120", "theme": "Général", "question": "Fournissez-vous des services de placement de salariés temporaires pour vos clients? Oui Non/Je ne sais pas Complète", "raw": "Fournissez-vous des services de placement de salariés temporaires pour vos clients?\nOui\nNon/Je ne sais pas\n\nComplète", "docs": [], "no_answers": [], "scorecard_notes": [], "section": "Périmètre", "section_label": "Type de service"}, {"code": "GEN300", "theme": "Général", "question": "Votre entreprise adhère-t-elle officiellement et publiquement à des initiatives RSE externes ou à des ensembles de principes ?", "raw": "Votre entreprise adhère-t-elle officiellement et publiquement à des initiatives RSE externes ou à des ensembles de\nprincipes ?\nExemples de documents à joindre :\nCodes de conduite, chartes ou principes signés\nCapture d’écran de la liste des membres\nRapport annuel ou RSE\nCommuniqué de presse\nVue d’ensemble de l’adhésion : Les dix principes du Pacte mondial des Nations Unies (PMNU) guident les entreprises du monde entier en vue de\nl’adoption de pratiques durables et socialement responsables. En savoir plus sur les Principes du PMNU.\nLe Pacte Mondial des Nations Unies\nDocument joint\nLettre d'engagement publique\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nDocument joint\nCapture d'écran de la liste de…\nAutre\nRemplacer le document\nCommentaire:\nCaméléons RH fait participe au Pacte Mondial des Nations Unies\nExemples de documents à joindre :\nPreuve de l’engagement ou de l’approbation d’objectifs de l’initiative Science Based Targets\nCapture d’écran du tableau de bord des objectifs de l’initiative Science Based Targets\nRapport annuel ou RSE\nCommuniqué de presse\nVue d’ensemble de l’adhésion : L’initiative Science Based Targets aide les entreprises à se fixer des objectifs fondés sur la science pour réduire de moitié\nleurs émissions d’ici 2030 et atteindre la neutralité carbone avant 2050.\nEn savoir plus sur l’initiative Science Based Targets.\nInitiative Science Based Targets (SBT)\n\nIndicateur\nCertifications\nCet indicateur fait référence aux certifications de votre système de gestion RSE. Il recouvre des questions sur les points suivants :\nCertificats de gestion RSE\nÉco-labels certifiant des produits et des services\nLes certifications confirment votre conformité envers les normes internationales (par exemple, ISO 14001). Elles doivent être émises par un\norganisme de certification externe.\nVeuillez sélectionner cette option uniquement si vous avez d’autres adhésions ou des adhésions supplémentaires, et ajoutez une explication dans le\nchamp de texte.\nExemples de documents à joindre :\nCodes de conduite, chartes ou principes signés\nCapture d’écran de la liste des membres\nRapport annuel ou RSE\nCommuniqué de presse\nAutres initiatives RSE externes ou ensemble de principes\nCaméléons supporte et est en accord avec les principes du Pacte mondial des Nations Unies, contribue aux ODD. Nous sommes signataires de\nla charte diversité.\nVeuillez préciser\nDocument joint\nCharte diversité site web liste…\nAutre\nRemplacer le document\nCommentaire:\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n5-6,26-30\nCommentaire:\np5 les objectifs de développement durable; p6 Pacte mondial des Nations Unies; p26-30 GRI\nAucune adhésion pour le moment/Je ne sais pas\n\nComplète", "docs": [{"name": "Lettre d'engagement publique", "type": "Autre", "pages": "1", "comment": "Document joint"}, {"name": "Charte diversité site web liste…", "type": "Autre", "pages": "", "comment": "Document joint"}], "no_answers": ["Aucune adhésion pour le moment"], "scorecard_notes": [], "section": "Adhésions", "section_label": "Initiatives RSE externes"}, {"code": "GEN703", "theme": "Général", "question": "Votre entreprise détient-elle l’une des certifications suivantes ?", "raw": "Votre entreprise détient-elle l’une des certifications suivantes ?\nExemples de documents à joindre :\nCertificat de gestion environnementale\nÉco-label\nRapport annuel ou RSE avec assurance externe par un tiers\nAutres types de documents pouvant être joints lorsque la norme de certification comporte une base de données publique associée (par exemple,\nB Corp, EMAS, FSSC 22000, normes ISO) :\nCapture d’écran de la base de données\nRapport d’audit\nRapport annuel ou RSE avec ou sans assurance externe par un tiers\nCapture d’écran du site Web\nFacture\nÉchange de communication avec le certificateur\nDirectives supplémentaires\nAccréditation : le certificat doit respecter une norme certifiable claire et doit être délivré par un organisme de certification accrédité.\nBases de données publiques : les bases de données publiques valides doivent être publiées par l’entité de la norme de certification ou l’organisme\nde certification et doivent inclure toutes les informations pertinentes (nom de l’entreprise, nom de la norme, scope et statut de validité).\nAutres thèmes : si votre entreprise dispose de certificats environnementaux propres à votre secteur d’activité ou couvrant un thème\nenvironnemental spécifique autres que ceux indiqués dans cette option de réponse, vous pouvez également les joindre.\nDocuments multiples : si votre entreprise dispose de plusieurs certificats environnementaux, vous pouvez joindre plusieurs documents à cette\noption de réponse.\nCertifications environnementales, notamment : ISO 50001, ISO 14001, EMAS\nbilan carbon provisoire\nVeuillez préciser\nDocument joint\nbilan carbone\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-53\nCommentaire:\nExemples de documents à joindre :\nCertificat en gestion sociale ou des droits humains\nRapport annuel ou RSE avec assurance externe par un tiers\nAutres types de documents pouvant être joints lorsque la norme de certification comporte une base de données publique associée (par exemple,\nB Corp, SA8000, normes ISO) :\nCapture d’écran de la base de données\nRapport d’audit\nRapport annuel ou RSE avec ou sans assurance externe par un tiers\nCapture d’écran du site Web\nFacture\nÉchange de communication avec le certificateur\nDirectives supplémentaires\nAccréditation : le certificat doit respecter une norme certifiable claire et doit être délivré par un organisme de certification accrédité.\nBases de données publiques : les bases de données publiques valides doivent être publiées par l’entité de la norme de certification ou l’organisme\nde certification et doivent inclure toutes les informations pertinentes (nom de l’entreprise, nom de la norme, scope et statut de validité).\nAutres thèmes : si votre entreprise dispose de certificats de gestion des droits humains ou du travail propres à votre secteur d'activité ou couvrant\nun thème spécifique des droits humains ou du travail autres que ceux indiqués dans cette option de réponse, vous pouvez également les joindre.\nDocuments multiples : si votre entreprise dispose de plusieurs certificats relatifs aux droits humains ou du travail, vous pouvez joindre plusieurs\ndocuments à cette option de réponse.\nCertifications en matière de pratiques sociales et de droits humains, notamment : Fair Wage Network, B Corp, GEEIS, WBENC, SA8000\nVeuillez préciser\n\nExemples de documents à joindre :\nCertificat de gestion en éthique des affaires\nRapport annuel ou RSE avec assurance externe par un tiers\nAutres types de documents pouvant être joints lorsque la norme de certification comporte une base de données publique associée (par exemple,\nCyber Essentials PLUS, ICSA STAR, normes ISO) :\nCapture d’écran de la base de données\nRapport d’audit\nRapport annuel ou RSE avec ou sans assurance externe par un tiers\nCapture d’écran du site Web\nFacture\nÉchange de communication avec le certificateur\nDirectives supplémentaires\nAccréditation : le certificat doit respecter une norme certifiable claire et doit être délivré par un organisme de certification accrédité.\nBases de données publiques : les bases de données publiques valides doivent être publiées par l’entité de la norme de certification ou l’organisme\nde certification et doivent inclure toutes les informations pertinentes (nom de l’entreprise, nom de la norme, scope et statut de validité).\nAutres thèmes : si votre entreprise dispose de certificats en matière d’éthique des affaires propres à votre secteur d’activité ou couvrant un thème\nd’éthique des affaires spécifique autres que ceux indiqués dans cette option de réponse, vous pouvez également les joindre.\nDocuments multiples : si votre entreprise dispose de plusieurs certificats relatifs à l’éthique des affaires, vous pouvez joindre plusieurs documents à\ncette option de réponse.\nCertifications en matière d’éthique des affaires, notamment : ISO 27001, ISO 37003\nVeuillez préciser\nExemples de documents à joindre :\nCertificat de gestion des achats responsables\nCertificat de chaîne de contrôle\nRapport annuel ou RSE avec assurance externe par un tiers\nAutres types de documents pouvant être joints lorsque la norme de certification comporte une base de données publique associée (par exemple,\nB Corp, FSC Chain of Custody, PEFC Chain of Custody, MSC Chain of Custody) :\nCapture d’écran de la base de données\nRapport d’audit\nRapport annuel ou RSE avec ou sans assurance externe par un tiers\nCapture d’écran du site Web\nFacture\nÉchange de communication avec le certificateur\nDirectives supplémentaires :\nAccréditation : le certificat doit respecter une norme certifiable claire et doit être délivré par un organisme de certification accrédité.\nBases de données publiques : les bases de données publiques valides doivent être publiées par l’entité de la norme de certification ou l’organisme\nde certification et doivent inclure toutes les informations pertinentes (nom de l’entreprise, nom de la norme, scope et statut de validité).\nAutres thèmes : si votre entreprise dispose de certificats en matière d’achats responsables propres à votre secteur d’activité ou couvrant un thème\nrelatif aux achats responsables spécifique autres que ceux indiqués dans cette option de réponse, vous pouvez également les joindre.\nDocuments multiples : si votre entreprise dispose de plusieurs certificats relatifs aux achats responsables, vous pouvez joindre plusieurs documents\nà cette option de réponse.\nCertifications en matière d’achats responsables, notamment : FSC, ISO 28000, SA8000\nVeuillez préciser\nChoisissez cette option uniquement si votre entreprise dispose d’autres certifications ou labels RSE valides qui ne correspondent pas aux options de\nréponse ci-dessus. Veuillez joindre les certifications couvrant au moins un des 21 thèmes RSE de la méthodologie EcoVadis et émises par un\norganisme de certification accrédité. Les certifications relatives à la gestion de la qualité, comme ISO 9001, ne font pas partie du champ d’application et ne\nseront pas prises en compte.\nSi votre entreprise dispose de plusieurs certificats ou labels RSE que vous n’avez pas encore joints ci-dessus, vous pouvez les joindre à cette option de\nréponse.\nAutres certifications en matière de RSE\nVeuillez préciser\nAucune certification pour le moment/Je ne sais pas\n\nIndicateur\nReporting\nLe reporting repose sur des indicateurs de performance clés quantitatifs qui permettent de mesurer votre mise en œuvre des pratiques RSE.\nNous vous demanderons de joindre des documents comprenant vos indicateurs RSE. Un document de reporting valide comporte l’année de\nreporting et l’unité de reporting (comme les kWh ou les litres).\nAssurez-vous que la dernière période de reporting se situe au cours des deux dernières années calendaires.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nComplète", "docs": [{"name": "bilan carbone", "type": "Politique/code de conduite", "pages": "1-53", "comment": "Exemples de documents à joindre :"}], "no_answers": ["Aucune certification pour le moment"], "scorecard_notes": ["⚠️ Toutes les certifications RSE à 0-25/100 — pas d'ISO 14001/45001/27001/37001", "Levier de score important — étudier au moins une certification"], "section": "Certifications", "section_label": "ISO et autres certifications RSE"}, {"code": "GEN600", "theme": "Général", "question": "Lequel des énoncés suivants s’applique au reporting de votre entreprise concernant les indicateurs RSE ?", "raw": "Lequel des énoncés suivants s’applique au reporting de votre entreprise concernant les indicateurs RSE ?\nExemples de documents à joindre :\nRapport annuel ou RSE\nDéclaration d’assurance ou de vérification par un tiers\nVotre document doit : Attester une déclaration par un tiers indépendant et reconnu qui assure ou vérifie la qualité et la crédibilité des indicateurs\ncommuniqués concernant les questions relatives à l’environnement, au social et aux droits humains, à l’éthique et aux achats responsables.\nLe reporting RSE fait l’objet d’une assurance ou d’une vérification par un tiers indépendant\nDocument joint\nbilan carbone\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-53\nCommentaire:\nen cours de finalisation\nDans la zone de texte ci-dessous, vous devez indiquer les normes de reporting utilisées par votre entreprise.\nExemples de documents à joindre :\nRapport annuel ou RSE\nVotre document doit : Démontrer que les indicateurs sur les questions relatives à l’environnement, au social et aux droits humains, à l’éthique et aux\nachats responsables respectent une norme de reporting officiellement reconnue au niveau national ou international, incluant, mais sans s’y limiter, les\néléments suivants :\nGlobal Reporting Initiative (GRI)\nNormes européennes d’information en matière de durabilité (ESRS)\nNormes IFRS d’information sur la RSE\nNorme volontaire d’information en matière de durabilité pour les petites et moyennes entreprises (VSME)\nPour être considérés comme respectant officiellement ces normes, les rapports doivent répondre aux exigences de conformité définies par les\nnormes de reporting elles-mêmes.\nLe reporting est formellement aligné sur une norme de reporting RSE\nVeuillez préciser\nExemples de documents à joindre :\nRapport annuel ou RSE\nDocument relatif à la matrice de matérialité\nVotre document doit : Démontrer une analyse de matérialité réalisée afin d’identifier les thèmes RSE pertinents et significatifs sur lesquels l’entreprise a\ncommuniqué.\nUne analyse de matérialité a été réalisée\nAucune de ces réponses/Je ne sais pas\n\nThème\nSocial et Droits Humains\nImpact sur le score\nCe thème se concentre sur deux domaines :\nLes droits du travail, tels que la santé et la sécurité, les conditions de travail, le dialogue social structuré, la gestion de carrière et la formation.\nLes droits humains, tels que la prévention du trafic d’êtres humains, du travail des enfants et du travail forcé, ainsi que de la discrimination et du\nharcèlement.\nEnjeux RSE pertinents pour votre entreprise :\nSanté & sécurité des employés\nConditions de travail\nGestion des carrières & formation\nTravail des enfants, travail forcé & trafic d'êtres humains\nDiscrimination et harcèlement\nNos avons sélectionné les enjeux RSE les plus pertinents pour votre entreprise d’après son secteur d’activité, sa taille et sa localisation.\nLes enjeux RSE sélectionnés influencent les questions que vous allez recevoir et l’impact de ce thème sur votre score global.\nIndicateur\nPolitiques\nImpact sur le score\nUne politique est un ensemble d’objectifs qui concerne des enjeux RSE spécifiques. Elle montre que votre entreprise a l’intention de réduire son\nimpact, d’atténuer ses risques ou d’améliorer ses performances.\nExemples de politiques :\nPrincipes généraux, déclarations et objectifs qualitatifs visant à améliorer la RSE.\nObjectifs quantitatifs spécifiques avec une échéance définie dans le futur. Vous pouvez soumettre des objectifs tant absolus que relatifs. Un\nobjectif concluant doit remplir les conditions suivantes :\nÊtre limité dans le temps : il doit inclure une année de référence et une année cible.\nÊtre mesurable : il doit inclure un objectif quantitatif à atteindre.\nÊtre réalisable : il doit être réaliste et pertinent par rapport aux activités de l’entreprise.\nObtenir plus d’exemples et de bonnes pratiques concernant l’élaboration de politiques\nOptionnel", "docs": [{"name": "bilan carbone", "type": "Politique/code de conduite", "pages": "1-53", "comment": "en cours de finalisation"}], "no_answers": [], "scorecard_notes": ["Reporting RSE non aligné formellement sur GRI/ESRS — à formaliser dans rapport 2025-2026"], "section": "Reporting", "section_label": "Normes de reporting (GRI, ESRS...)"}, {"code": "GEN800", "theme": "Social et Droits Humains", "question": "Veuillez fournir des informations sur les activités et le nombre de sites opérationnels de votre entreprise. Indiquez si un ou plusieurs sites comptent sensiblement plus d’employés que les autres. 1 seul site", "raw": "Veuillez fournir des informations sur les activités et le nombre de sites opérationnels de votre entreprise. Indiquez si un\nou plusieurs sites comptent sensiblement plus d’employés que les autres.\n1 seul site\nVeuillez préciser\n\nComplète", "docs": [], "no_answers": [], "scorecard_notes": [], "section": "Périmètre", "section_label": "Sites opérationnels"}, {"code": "LAB100", "theme": "Social et Droits Humains", "question": "Votre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?", "raw": "Impact sur le score\nVotre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?\nExemples de documents à joindre\nPolitique de santé et sécurité des employés\nManuel de santé et sécurité des employés\nCode de conduite couvrant les enjeux de santé et sécurité des employés\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les engagements de votre entreprise à aborder les enjeux de santé et de sécurité auxquels sont confrontés les\nemployés sur leur lieu de travail. Cela peut concerner la sécurité au travail, la santé physique au travail, la santé psychologique au travail et la prévention\ndu stress. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : S’engager à proposer à tous les employés un environnement de travail sûr en procédant à de fréquentes évaluations des\nrisques pour la santé et la sécurité et en fournissant un équipement de protection individuelle adéquat.\nObjectif quantitatif : Réduire de 20 % le nombre d’accidents du travail d’ici 2030 par rapport à 2020.\nSanté et sécurité des employés\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n2-3\nCommentaire:\nSANTE ET SECURITE DES SALARIES\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nLes fournisseurs de Caméléons doivent prendre toutes les mesures pour assurer la santé et la sécurité\nde leurs salariés,\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n8\nCommentaire:\nSanté et sécurité des employés\n\nExemples de documents à joindre\nPolitique en matière de conditions de travail\nPolitique sur le salaire minimum\nPolitique pour une rémunération adéquate\nDéclaration de mission\nPolitique relative à l’amélioration des avantages accordés aux employés\nCode de conduite couvrant les enjeux liés aux conditions de travail\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les engagements de votre entreprise à aborder divers enjeux liés aux conditions de travail tels que l’équilibre entre\nvies professionnelle et personnelle, le droit à la déconnexion, l’enquête de satisfaction des employés, les rémunérations et les avantages sociaux accordés\naux employés. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : S’engager à offrir à tous les employés de bonnes conditions de travail en veillant à ce qu’ils disposent de salaires, d’horaires de\ntravail et d’avantages adéquats.\nObjectif quantitatif : Parvenir à une hausse de 20 % du nombre d’employés pouvant bénéficier d’une couverture en soins de santé d’ici 2030 par\nrapport à 2020.\nConditions de travail\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nSystème de rémunération, Organisation flexible du travail\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nLes fournisseurs de Caméléons RH doivent respecter les lois en vigueur en matière de salaire et de\ntemps de travail. Il garantit notamment le respect du salaire minimum, du paiement des heures\nsupplémentaires, et du temps de travail maximum ; il offrira à ses salariés des possibilités de formation\net d’apprentissage\nDocument joint\ncontrat2023\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n9\nCommentaire:\nConditions de travail\n\nNe sélectionnez cette option que si elle constitue un enjeu RSE pertinent pour votre entreprise. Vous pouvez vérifier cela sur la page\nd’introduction du thème.\nExemples de documents à joindre\nPolitique syndicale de l’entreprise\nCode de conduite couvrant les enjeux liés aux relations sociales\nPolitique de droits humains\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nLe document devrait mentionner les engagements de votre entreprise à aborder un dialogue social structuré par l’intermédiaire de représentants du\npersonnel reconnus et de la négociation collective. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : Chercher à développer des relations constructives avec les représentants du personnel et syndicaux.\nObjectif quantitatif : Maintenir le nombre d’employés couverts par une convention collective à 100 % en 2030.\nDialogue social\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n6\nCommentaire:\nDialogue social\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nLes fournisseurs doivent s'assurer de l'octroi du droit des salariés à la liberté d’association\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n10\nCommentaire:\nDialogue social\n\nExemples de documents à joindre\nPolitique de développement de carrière\nPolitique de formation\nPolitique de développement des compétences\nCode de conduite couvrant les enjeux liés à la gestion de carrière et formation\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les engagements de votre entreprise à aborder les principales phases d’une carrière professionnelle, notamment le\nrecrutement, l’évaluation, la formation, la mobilité professionnelle et le perfectionnement professionnel à chaque étape. Votre politique peut inclure des\nobjectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : S’engager à soutenir le développement de carrière des employés en proposant une formation adéquate.\nObjectif quantitatif : Parvenir à une hausse de 20 % des heures de formation moyennes par employé d’ici 2030 par rapport à 2020.\nGestion de carrière et formation\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n7\nCommentaire:\nDéveloppement des carrières et de la formation\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nLe fournisseur doit offrir à ses salariés des possibilités de formation et d’apprentissage\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n11,14\nCommentaire:\nGESTION DES CARRIERES ET DE LA FORMATION\n\nNe sélectionnez cette option que si elle constitue un enjeu RSE pertinent pour votre entreprise. Vous pouvez vérifier cela sur la page\nd’introduction du thème.\nExemples de documents à joindre\nPolitique de droits humains\nCharte des droits humains\nCode de conduite couvrant les enjeux liés au travail des enfants et au travail forcé\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les engagements de votre entreprise à aborder les enjeux du travail des enfants, du travail forcé ou du travail\nobligatoire au sein des unités appartenant à l’entreprise. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : Refuser le recours au travail des enfants ou forcé, sous quelque forme que ce soit.\nObjectif quantitatif : Chercher à parvenir à une hausse de 20 % du nombre d’audits internes réalisés pour évaluer le travail des enfants et le travail\nforcé dans les activités de l’entreprise d’ici 2030.\nTravail des enfants, travail forcé et trafic d’êtres humains\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n5,9,10\nCommentaire:\nTravail forcé, Travail des enfants, travail forcé & trafic d’êtres humains\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nPas de travail des enfants âgés de moins de 15 ans, ou de l’âge minimum ressortant\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n17\nCommentaire:\nCONTRE LE TRAVAIL DES ENFANTS ET LE TRAVAIL FORCE\n\nExemples de documents à joindre\nPolitique anti-discrimination\nPolitique anti-harcèlement\nCode de conduite couvrant les enjeux liés à la discrimination et au harcèlement\nGuide des collaborateurs contenant une section politique dédiée\nRapport annuel ou RSE\nGuide sur les documents\nVotre document doit attester les engagements de votre entreprise à empêcher la discrimination, le harcèlement et la violence physique, psychologique et\nverbale pour tous les employés dans l’environnement de travail. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux. Voici\nquelques exemples :\nObjectif qualitatif : S’engager à fournir égalité de traitement, équité et respect pour tous les employés, qu’ils soient temporaires, à temps partiel ou\nà temps plein.\nObjectif quantitatif : Augmenter de 20 % le nombre d’employés ayant participé à une formation de sensibilisation à la discrimination et au\nharcèlement d’ici 2030.\nDiscrimination et harcèlement\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n8\nCommentaire:\nDiversité, égalité et inclusion\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nPRATIQUES D’EMPLOI : DROITS FONDAMENTAUX ET LUTTES CONTRE LES DISCRIMINATIONS\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n12,13\nCommentaire:\n\nIndicateur\nMesures\nImpact sur le score\nL’indicateur représente les actions de votre entreprise en faveur de vos politiques et engagements RSE.\nLes options de réponse pour chaque question représentent les bonnes pratiques selon la taille et le secteur d’activité de votre entreprise.\nSélectionnez les options que votre entreprise a déjà mises en œuvre et fournissez des documents prouvant vos actions.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nNe sélectionnez cette option que si elle constitue un enjeu RSE pertinent pour votre entreprise. Vous pouvez vérifier cela sur la page\nd’introduction du thème.\nExemples de documents à joindre\nPolitique de droits humains\nCharte des droits humains\nCode de conduite couvrant les enjeux liés aux droits humains des parties prenantes externes\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les engagements de votre entreprise à aborder les impacts directs et indirects sur les droits humains que ses\nopérations ont sur les parties prenantes externes. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : Chercher à respecter les droits fonciers des populations locales dans les régions où l’entreprise est active.\nObjectif quantitatif : Chercher à parvenir à une hausse de 20 % du nombre d’évaluations des impacts sur les droits humains des parties prenantes\nexternes, menées pour les opérations critiques d’ici 2030.\nDroits humains fondamentaux de parties prenantes externes\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n3\nCommentaire:\nCONFORMITÉ RÈGLEMENTAIRE : respect des lois, de la Déclaration Universelle des Droits de l’Homme\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n9-10\nCommentaire:\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n17,18\nCommentaire:\nAucune politique pour le moment/Je ne sais pas\n\nComplète\nLAB1002\nQui prend en charge les frais de recrutement des employés ?\nLes frais de recrutement (pour obtenir ou conserver un emploi) comprennent tous les honoraires, frais, coûts, cotisations ou autres obligations financières\nassociées au processus de recrutement, peu importe quand, comment et par qui ils sont perçus. Sélectionnez l'option qui s'applique à votre organisation.\nLa société cliente\nLes frais de recrutement (pour obtenir ou conserver un emploi) comprennent tous les honoraires, frais, coûts, cotisations ou autres obligations financières\nassociées au processus de recrutement, peu importe quand, comment et par qui ils sont perçus. Sélectionnez l'option qui s'applique à votre organisation.\nL'employé\nLes frais de recrutement (pour obtenir ou conserver un emploi) comprennent tous les honoraires, frais, coûts, cotisations ou autres obligations financières\nassociées au processus de recrutement, peu importe quand, comment et par qui ils sont perçus. Sélectionnez l'option qui s'applique à votre organisation.\nLa société cliente et l'employé\nJe ne sais pas\n\nComplète\nLAB3171s\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour protéger la santé et la sécurité des employés ?\nExemples de documents à joindre\nÉvaluations internes des risques en matière de santé et de sécurité\nProcédures de sécurité\nMatrice de sécurité\nDocuments d’analyse des risques\nGuide sur les documents\nVotre document doit démontrer que des évaluations régulières des risques en matière de santé et de sécurité sont effectuées afin d’identifier et d’évaluer\nsystématiquement les risques pour la santé et la sécurité des employés.\nLes éléments des évaluations des risques à prendre en compte doivent inclure au moins deux des trois options suivantes : 1) Description des dangers ou\nfacteurs de risque identifiés comme pouvant causer un préjudice et détermination du degré d’importance des risques 2) Examen périodique des\nrisques afin d’identifier les risques les plus récents ainsi que l’environnement de travail en matière de santé et de sécurité au sein de l’entreprise\n3) Existence d’un plan d’actions préventives et correctives sous la forme de mesures à prendre ou de recommandations à suivre par une organisation\npour prévenir et traiter efficacement les risques identifiés\nÉvaluation des risques en matière de santé et de sécurité des employés\nDocument joint\nLivret santé sécurité\nGuide des collaborateurs\nRemplacer le document\nPages indiquées:\n10-16\nCommentaire:\nLes intérimaires bénéficient d'évaluations régulières des risques afin de garantir leur protection au\nmême titre que les employés permanents.\nExemples de documents à joindre\nProcédures d’urgence à destination des employés en cas d’accident ou de blessure\nProcédure opératoire standard pour la mise à disposition d’équipements d’urgence\nProcédures d’évacuation d’urgence (exercices incendie, etc.)\nManuel de sécurité\nGuide sur les documents\nVotre document doit démontrer que votre entreprise dispose d’un plan de santé et de sécurité pour guider tous les employés dans les situations\nd’urgence. Le type de situations d’urgence dépend des activités et du personnel de votre entreprise, mais peut inclure des incidents tels que des accidents\nliés à l’utilisation d’équipements lourds, des blessures, incendies, déversements de produits chimiques, explosions, chutes, etc.\nPlan d’action d’urgence en matière de santé et de sécurité\nDocument joint\nLivret santé sécurité\nGuide des collaborateurs\nRemplacer le document\nPages indiquées:\n24-27,34\nCommentaire:\nLes intérimaires sont formés aux procédures d'urgence et inclus dans les plans d’action pour assurer\nleur sécurité en cas d'incident.\n\nExemples de documents à joindre\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nGuide sur les documents\nVotre document doit démontrer que votre entreprise dispense des formations à ses employés pour renforcer leurs connaissances en matière de santé et\nde sécurité dans le cadre de leur travail.\nFormation des salariés sur les risques pour la santé et la sécurité ainsi que les bonnes pratiques de travail\nDocument joint\nLivret santé sécurité\nGuide des collaborateurs\nRemplacer le document\nPages indiquées:\n4-8\nCommentaire:\nLes intérimaires reçoivent une formation complète sur les risques et bonnes pratiques de sécurité,\ngarantissant leur préparation dans l'exercice de leurs missions.\nExemples de documents à joindre\nÉvaluations des niveaux de stress\nProcédures et ressources permettant aux employés de mieux gérer leur charge de travail\nProgrammes d’aide aux employés et lignes d’assistance téléphonique\nGuide sur les documents\nVotre document doit démontrer que l’entreprise déploie des efforts proactifs pour réduire au minimum le stress et soutenir le bien-être psychologique des\nemployés sur le lieu de travail. Il peut s’agir d’actions préventives, comme des lignes d’assistance téléphonique ou des canaux réservés aux employés,\nvisant à repenser l’environnement et l’organisation du travail afin de réduire le stress et les risques pour la santé mentale, ou de procédures\nd’intervention en cas de stress ou de problèmes de santé mentale.\nActions visant à lutter contre le stress et favoriser le bien-être psychologique au travail\nDocument joint\nLivret santé sécurité\nGuide des collaborateurs\nRemplacer le document\nPages indiquées:\n35-36\nCommentaire:\nLes actions de prévention du stress et de soutien psychologique s'appliquent aux intérimaires, incluant\nl'accès aux mêmes ressources que les employés permanents.\n\nSélectionnez cette option seulement si les actions couvrent les travailleurs intérimaires.\nExemples de documents à joindre\nMatériel de formation fourni aux travailleurs intérimaires\nBilans de santé des travailleurs intérimaires\nÉvaluation des risques liés à la santé et à la sécurité concernant des travailleurs intérimaires\nGuide sur les documents\nVotre document justificatif doit indiquer des actions mises en œuvre par votre entreprise pour assurer la santé et la sécurité de ses travailleurs\nintérimaires. Cela peut inclure les formations à la sécurité, les examens de santé ou les procédures de réclamation en place pour signaler les incidents liés\nà la santé et à la sécurité au travail des travailleurs intérimaires.\nActions liées à la santé et à la sécurité des travailleurs intérimaires\nDocument joint\nLivret santé sécurité\nGuide des collaborateurs\nRemplacer le document\nPages indiquées:\n35-36\nCommentaire:\nL'entreprise assure des formations, bilans de santé et procédures spécifiques pour garantir la sécurité\ndes travailleurs intérimaires dès leur prise de poste.\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nGuide sur les documents\nVotre document doit démontrer que votre entreprise a mis en place des actions distinctes de celles spécifiées dans les autres options pour aborder les\nenjeux de santé et de sécurité auxquels sont confrontés les employés sur leur lieu de travail. Par exemple, les problèmes physiologiques résultant de\nl’utilisation d’équipements dangereux ou une procédure corrective pour les accidents ou cas de maladie liés au travail.\nExemples de documents à joindre\nProcédures de santé et de sécurité standard\nInstructions de travail relatives à la santé et à la sécurité\nGuide des collaborateurs\nRapport annuel ou RSE\nAutres actions pour protéger la santé et la sécurité des employés qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\n\nComplète\nLAB3203s\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour garantir de bonnes conditions de travail ?\nExemples de documents à joindre :\nManuel de rémunération (salaire)\nSuivi des salaires\nGuide des collaborateurs\nVotre document doit : démontrer les processus opérationnels que votre entreprise a mis en œuvre pour examiner et surveiller les niveaux de salaire et\npour s’assurer qu’ils sont adéquats. Il peut s’agir d’un examen par rapport au contexte économique local (inflation, augmentation du coût de la vie et\nmoyennes sectorielles) ou par rapport à des références externes.\nVeuillez noter que le respect des exigences locales en matière de salaire minimum ne suffit pas à lui seul à démontrer l’adéquation des salaires au contexte\néconomique local de votre entreprise.\nActions visant à garantir des salaires adéquats\nExemples de documents à joindre :\nAudits internes sur le temps de travail\nEnregistrements de suivi du temps de travail\nGuide des collaborateurs\nVotre document doit :\ndémontrer la mise en place de systèmes ou d’audits internes qui permettent d’effectuer activement le suivi du temps de travail de vos employés. Le suivi\nrégulier du temps de travail permet à votre entreprise d’identifier les cas d’heures supplémentaires et d’horaires de travail irréguliers dans le cadre de ses\nactivités.\nActions visant à gérer le temps de travail et les heures supplémentaires\nExemples de documents à joindre :\nGuide des collaborateurs\nDocument de recrutement de l’entreprise\nGuide de rémunération\nGuide sur les documents\nVotre document devrait mentionner l’offre d’une rémunération supplémentaire pour les heures supplémentaires, y compris toutes les autres formes\nd’heures prestées en plus ou en dehors des heures indiquées dans le contrat de travail des employés.\nRémunération des heures de travail supplémentaires ou atypiques\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nRémunération des heures de travail supplémentaires au delà de 35h00, Repos compensateur au delà\nde 220 heures supplémentaires.\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n9\nCommentaire:\nSystème de rémunération => Rémunération des heures de travail supplémentaires au delà de 35h00 =>\nRepos compensateur au delà de 220 heures supplémentaires. => Carte ticket restaurant avec une part\nemployeur de 5.21€ => Participation au bénéfice à partir 606 heures annuel lié à la performance de\nl'entreprise\n\nExemples de documents à joindre :\nGuide des collaborateurs\nMatériel de formation d’accueil\nInformations de recrutement\nGuide sur les documents\nVotre document devrait mentionner les initiatives proactives mises en place par votre entreprise pour aider les employés à trouver un équilibre entre leurs\nvies professionnelle et familiale. Ces actions ne se limitent pas aux parents qui travaillent, mais doivent être accessibles à l’ensemble des employés.\nLes actions peuvent prendre les formes suivantes :\nCongé parental rémunéré et autre congé de proche aidant rémunéré\nAllocations ou services de garde d’enfant abordables et de qualité\nAccès à des mesures minimales de protection sociale (protection contre les risques professionnels et protection contre le licenciement pendant la\ngrossesse)\nCette option ne se limite pas aux soins parentaux, mais englobe également les personnes prenant soin de grands-parents ou d’autres membres de leur famille.\nProgrammes adaptés aux familles\nExemples de documents à joindre :\nGuide des collaborateurs\nContrat de travail\nFormation d’accueil ou autre matériel de communication\nGuide sur les documents\nVotre document devrait mentionner la possibilité pour les employés de disposer d’horaires de travail flexibles afin de les aider à trouver un équilibre\nnécessaire entre leur vie familiale et leur vie professionnelle. Cela peut prendre la forme d’un temps partiel, du télétravail, d’un horaire flexible, d’un emploi\npartagé ou d’horaires de travail variables.\nOrganisation flexible du travail à la disposition des salariés\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nOrganisation flexible du travail à la disposition des salariés\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n9\nCommentaire:\nOrganisation flexible du travail à la disposition des salariés Caméléons rh Assure le lien avec les acteurs\nde la profession Prism’emploi, FASTT pour la mise en œuvre des actions initiées par la branche en relais\nauprès des salariés de l’entreprise Une partie de la qualité de vie au travail de nos salariés intérimaires\nest relative aux conditions de travail(contenu,organisation, environnement de travail, ...) qui ont lieu\nlors de la mission et qui sont à la charge del’entre priseutilisatriceduclient. Cependant, Caméléons rh\naccompagne les salariés intérimaires en les informant, en les sensibilisant à la sécurité, à la prévention\nsanté, aux relais d’aide sociale créés par le FASTT. De plus, nous gardons le lien avec l’entreprise\nutilisatrice pendant les missions de nos intérimaires afin de faire le relais auprès de l’entreprise\nutilisatrice si cela le nécessite.\n\nExemples de documents à joindre :\nRégime d’assurance-maladie détaillé\nDocuments montrant la mise en œuvre du programme\nMatériel de communication remis aux employés à propos de leur complémentaire santé\nGuide sur les documents\nVotre document devrait mentionner le ou les régimes d’assurance-maladie spécifiques de l’entreprise, qui fournissent des soins médicaux aux employés\nou aux personnes à leur charge, directement par l’entremise d’une assurance, d’un remboursement ou autre. Les soins de santé fournis recouvrent les\nblessures/accidents/maladies liés ou non au travail du moment que l’employé choisit d’avoir recours à des soins médicaux.\nSi un régime d’assurance-maladie est obligatoire dans le ou les pays dans lesquels vous opérez, les documents doivent montrer qu’il est fourni par votre entreprise\n(p. ex., preuve de l’existence d’associations d’assureurs médicaux d’entreprise).\nCouverture des salariés en soins de santé\nDocument joint\nLivret d'accueil collaborateur\nGuide des collaborateurs\nRemplacer le document\nPages i
