cuments à joindre :\nRapport annuel sur les incidents de sécurité\nRapport de synthèse sur la formation en matière de santé et de sécurité\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs à la santé et la sécurité des employés au travail, tels que le taux d’absentéisme, le nombre\nd’employés formés aux questions de santé et de sécurité, le nombre d’évaluations des risques menées en matière de santé et de sécurité des employés,\netc.\nSanté et sécurité des employés\nDocument joint\nattestation\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nNombre d'accidents du travail, nombre de jours d'arrêts, nombre d'incapacité permanentes, nombre\nde décés, taux de fréquence, taux de gravité, indice de fréquence, indice de gravité, taux brut\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n22\nCommentaire:\nTaux de Fréquence; Taux de Gravité ; % de visites médicales à jour ;le nombre de salariés couverts en\nsoins de santé ;le nombre d'employés formés aux questions de santé et de sécurité\nSélectionnez cette option si vous disposez d’indicateurs de reporting supplémentaires relatifs aux conditions de travail, en plus des indicateurs\ndéclarés à la question précédente sur le reporting relatif au travail.\nExemples de documents à joindre :\nRapport annuel sur les avantages sociaux\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs à la rémunération et aux avantages sociaux accordés aux employés, tels que le nombre\nd’employés bénéficiant d’une couverture médicale, le taux de satisfaction des employés, etc.\nConditions de travail\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n22\nCommentaire:\nHoraires supplémentaires rémunérées moyen, en 2021; Nombre de jours télé travaillés pour les\nemployés permanents\n\nExemples de documents à joindre :\nRapport sur les syndicats\nRapport sur la couverture des représentants du personnel\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs aux mécanismes de dialogue social, tels que le nombre de travailleurs couverts par les\nreprésentants des travailleurs, le nombre de travailleurs couverts par des conventions collectives, etc.\nDialogue social\nDocument joint\npv de carence\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nconformément à la législation, élections tous les 4 ans\nSélectionnez cette option si vous disposez d’indicateurs de reporting supplémentaires relatifs à la gestion des carrières et formation, en plus des\nindicateurs déclarés à la question précédente sur le reporting relatif au travail.\nExemples de documents à joindre :\nRapport annuel sur les formations\nRapport annuel sur le perfectionnement des employés\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs à l’évolution de carrière et à la formation des employés, tels que le nombre de formations\nprofessionnelles dispensées, le nombre d’employés disposant d’un plan de développement personnel, le nombre de cas de recrutement interne, etc.\nGestion de carrière et formation\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nNombre moyen d'heures de formation par employé; % d’effectif ayant bénéficié d’une formation\nExemples de documents à joindre :\nRapport annuel sur les droits humains\nRapport sur les atteintes aux droits humains\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs aux questions sur le travail des enfants, ainsi que le travail forcé ou obligatoire dans le cadre des\nactivités de l’entreprise, tels que le nombre d’incidents de travail des enfants ou de travail forcé signalés, le nombre d’audits sur le travail des enfants ou le\ntravail forcé menés dans les sites opérationnels de l’entreprise, etc.\nTravail des enfants, travail forcé et trafic d’êtres humains\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n25\nCommentaire:\nNombre de cas de travail des enfants et de travail forcé confirmés\n\nSélectionnez cette option si vous disposez d’indicateurs de reporting supplémentaires relatifs à la discrimination et au harcèlement, en plus des\nindicateurs déclarés à la question précédente sur le reporting.\nExemples de documents à joindre\nRapport annuel sur les données sociales\nRapport sur la diversité dans l'entreprise\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents\nVotre document doit démontrer des indicateurs relatifs à la prévention de la discrimination et de la violence physique, psychologique et verbale sur le lieu\nde travail. Il peut s’agir du nombre d’employés formés à la prévention de la discrimination et du harcèlement, du nombre de groupes de ressources pour\nles employés, etc.\nDiscrimination et harcèlement\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nPourcentage de femmes employées par rapport à l'ensemble de l'organisation; Écart salarial de genre\nmoyen non ajusté à des postes comparables;% des salariés étrangers; % des salariés seniors; % des\ncollaborateurs en situation de handicap; Le nombre de cas de discrimination ou d'incidents de\nharcèlement signalés par des dénonciateurs; le nombre d'employés sensibilisés à la discrimination ou\naux questions de harcèlement\nExemples de documents à joindre :\nRapport annuel sur les droits humains\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs aux impacts directs et indirects des activités de l’entreprise sur les parties prenantes externes\ndans le domaine des droits humains, tels que le nombre d’évaluations de l’impact sur les droits humains réalisées, le nombre de cas de mécanisme de\ngestion des conflits liés à des incidents en matière de droits humains, etc.\nDroits humains des parties prenantes externes\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n26\nCommentaire:\nNombre de signalements reçus via la procédure d’alerte\nAucun indicateur pour le moment/Je ne sais pas\n\nThème\nEnvironnement\nImpact sur le score\nCe thème se concentre sur deux domaines :\nManagement environnemental des opérations, comme la consommation d’énergie dans les bureaux, l’eau et les matériaux utilisés lors de la\nfabrication, la pollution de l’air et les menaces pesant sur la biodiversité.\nManagement environnemental des produits et services. Il se compose des éléments suivants :\nL’utilisation et la fin de vie des produits, comme l’efficacité énergétique des produits électroniques ou les programmes de reprise.\nLa santé et la sécurité des consommateurs, telles que l’hygiène et la sécurité des produits destinés à la consommation et à l’utilisation.\nLes services environnementaux et de défense de l’environnement, tels que les programmes ou les services visant à encourager la\nconsommation responsable.\nEnjeux RSE pertinents pour votre entreprise :\nConsommation d'énergie & émissions de gaz à effet de serre\nMatières premières, produits chimiques & déchets\nNos avons sélectionné les enjeux RSE les plus pertinents pour votre entreprise d’après son secteur d’activité, sa taille et sa localisation.\nLes enjeux RSE sélectionnés influencent les questions que vous allez recevoir et l’impact de ce thème sur votre score global.\nIndicateur\nPolitiques\nImpact sur le score\nUne politique est un ensemble d’objectifs qui concerne des enjeux RSE spécifiques. Elle montre que votre entreprise a l’intention de réduire son\nimpact, d’atténuer ses risques ou d’améliorer ses performances.\nExemples de politiques :\nPrincipes généraux, déclarations et objectifs qualitatifs visant à améliorer la RSE.\nObjectifs quantitatifs spécifiques avec une échéance définie dans le futur. Vous pouvez soumettre des objectifs tant absolus que relatifs. Un\nobjectif concluant doit remplir les conditions suivantes :\nÊtre limité dans le temps : il doit inclure une année de référence et une année cible.\nÊtre mesurable : il doit inclure un objectif quantitatif à atteindre.\nÊtre réalisable : il doit être réaliste et pertinent par rapport aux activités de l’entreprise.\nObtenir plus d’exemples et de bonnes pratiques concernant l’élaboration de politiques\n\nComplète", "docs": [{"name": "attestation", "type": "Autre", "pages": "1", "comment": "Nombre d'accidents du travail, nombre de jours d'arrêts, nombre d'incapacité permanentes, nombre"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "22", "comment": "Taux de Fréquence; Taux de Gravité ; % de visites médicales à jour ;le nombre de salariés couverts en"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "22", "comment": "Horaires supplémentaires rémunérées moyen, en 2021; Nombre de jours télé travaillés pour les"}, {"name": "pv de carence", "type": "Autre", "pages": "1", "comment": "conformément à la législation, élections tous les 4 ans"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "23", "comment": "Nombre moyen d'heures de formation par employé; % d’effectif ayant bénéficié d’une formation"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "25", "comment": "Nombre de cas de travail des enfants et de travail forcé confirmés"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "23", "comment": "Pourcentage de femmes employées par rapport à l'ensemble de l'organisation; Écart salarial de genre"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "26", "comment": "Nombre de signalements reçus via la procédure d’alerte"}], "no_answers": ["Aucun indicateur pour le moment"], "scorecard_notes": ["🟡 Absence reporting indicateurs S&S pour travailleurs intérimaires (cœur de métier !)"], "section": "Reporting", "section_label": "Indicateurs sociaux"}, {"code": "ENV300", "theme": "Environnement", "question": "Votre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?", "raw": "Impact sur le score\nVotre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?\nExemples de documents à joindre\nPolitique environnementale\nPolitique énergétique\nPolitique climatique\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait préciser l’engagement de votre entreprise en matière d’énergie et de GES. Il devrait comprendre les objectifs de votre entreprise\nsur le plan de la gestion de la consommation énergétique provenant de l’exploitation. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou\nles deux.\nVoici quelques exemples :\nObjectif qualitatif : S’engager à atténuer le changement climatique en augmentant l’efficacité énergétique dans les activités de l’entreprise.\nObjectif quantitatif : Réduire la consommation énergétique de 20 % d’ici 2030 par rapport à 2020.\nConsommation d'énergie et émissions de gaz à effet de serre\nDocument joint\nPolitique environnementale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n3\nCommentaire:\ndigitalisation des bulletins de paye pour réduire les émissions de GES, organisation du travail : mise en\nplace du télétravail, incitation à la limitation des déplacements. mises en place des entretiens via\nteam's, flotte automobile : acquisition de vehicule électrique et vélo électrique pouvant être mis à\ndisposition des salarié permanent\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n5\nCommentaire:\nEngagement des fournisseurs à contrôler sa consommation d’eau, d’énergie, de ressources naturelles\net d’autres matières premières nécessaires à ses activités\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nL'ensemble de nos système de chasse d'eau ont un double flux qui permet de réduire de 30% la\nconsommation d'eau. Souscription à un contrat EDF vert. Baisse de 50% de la consommation de papier.\n\nExemples de documents à joindre\nPolitique environnementale\nPolitique de gestion des déchets\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait préciser l’engagement de votre entreprise vis-à-vis de la réduction des déchets. Il devrait comprendre les objectifs de votre\nentreprise sur le plan de la diminution de l’impact des déchets provenant de l’exploitation. Votre politique peut inclure des objectifs qualitatifs, quantitatifs\nou les deux.\nVoici quelques exemples :\nObjectif qualitatif : S’engager à réduire les déchets en optimisant les processus.\nObjectif quantitatif : Réduire la production de déchets provenant de l’exploitation de 50 % d’ici 2030 par rapport à 2020.\nDéchets\nDocument joint\nPolitique environnementale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n3 et 4\nCommentaire:\nRéduction des éditions papier et préconisation de l'impression recto verso pour réduire la\nconsommation de papier et par conséquent la production de déchets. recyclage de 80% des matériels:\nmatériel informatique, cartouche d'encre, téléphone portable\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nL'ensemble de nos déchets sont déposés dans des poubelles de tris sélectives. Suppression des\nbouteilles d'eau en plastique réduction des emballages inutiles. Gourde offerte à chaque salarié\n\nIndicateur\nMesures\nImpact sur le score\nL’indicateur représente les actions de votre entreprise en faveur de vos politiques et engagements RSE.\nLes options de réponse pour chaque question représentent les bonnes pratiques selon la taille et le secteur d’activité de votre entreprise.\nSélectionnez les options que votre entreprise a déjà mises en œuvre et fournissez des documents prouvant vos actions.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nNe sélectionnez cette option que si elle constitue un enjeu RSE pertinent pour votre entreprise. Vous pouvez vérifier cela sur la page\nd’introduction du thème.\nExemples de documents à joindre\nPolitique environnementale\nPolitique de promotion de la RSE\nPolitique de consommation responsable\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait préciser l’engagement de votre entreprise vis-à-vis de la fourniture de services et de plaidoyer en faveur de l’environnement. Il\ndevrait inclure vos objectifs d’offre de services ou de solutions alternatives pour permettre aux clients de diagnostiquer et de limiter les impacts sur\nl’environnement découlant de leur propre consommation. Votre politique peut inclure des objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : (1) S’efforcer d’aider les clients à réduire leur empreinte carbone en proposant des solutions alternatives ou innovantes. (2)\nChercher à promouvoir une consommation responsable en faisant évoluer les services qui émettent moins d’émissions tels que la seconde vie et les\nréparations. (3) Soutenir l’élimination progressive des carburants fossiles par le financement de technologies à faible intensité de carbone et les\nentreprises proposant des plans de transition vers un futur positif net.\nObjectif quantitatif : Fournir aux clients une empreinte carbone pour 100 % des produits d’ici 2030.\nPromotion et services environnementaux\nDocument joint\nPolitique environnementale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nIntégration d'une démarche d’éco-conception dans le développement de nos services.\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nNotre immeuble a fait le choix de ne pas recevoir de prospectus afin de sensibilisé les salariés au\nrecyclage du papier\nAucune politique pour le moment/Je ne sais pas\n\nComplète", "docs": [{"name": "Politique environnementale", "type": "Politique/code de conduite", "pages": "3", "comment": "digitalisation des bulletins de paye pour réduire les émissions de GES, organisation du travail : mise en"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "5", "comment": "Engagement des fournisseurs à contrôler sa consommation d’eau, d’énergie, de ressources naturelles"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "L'ensemble de nos système de chasse d'eau ont un double flux qui permet de réduire de 30% la"}, {"name": "Politique environnementale", "type": "Politique/code de conduite", "pages": "3 et 4", "comment": "Réduction des éditions papier et préconisation de l'impression recto verso pour réduire la"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "L'ensemble de nos déchets sont déposés dans des poubelles de tris sélectives. Suppression des"}, {"name": "Politique environnementale", "type": "Politique/code de conduite", "pages": "4", "comment": "Intégration d'une démarche d’éco-conception dans le développement de nos services."}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "Notre immeuble a fait le choix de ne pas recevoir de prospectus afin de sensibilisé les salariés au"}], "no_answers": ["Aucune politique pour le moment"], "scorecard_notes": [], "section": "Politiques", "section_label": "Politique environnementale"}, {"code": "ENV313", "theme": "Environnement", "question": "Quelles actions votre entreprise a-t-elle mises en œuvre pour réduire la consommation d’énergie et les GES ?", "raw": "Impact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour réduire la consommation d’énergie et les GES ?\nExemples de documents à joindre :\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nVotre document doit : Démontrer que votre entreprise offre des formations aux employés pour renforcer leurs connaissances sur les économies\nd’énergie et les actions climatiques dans le cadre de leur travail. Les thèmes de formation peuvent couvrir les économies d’énergie, les stratégies de\nréduction des émissions de GES, ainsi que les politiques climatiques internationales ou nationales pertinentes pour l’activité de l’entreprise.\nFormation des employés aux économies d’énergie et actions climatiques\nDocument joint\nPolitique environnementale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nSensibiliser ou former les collaborateurs\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nLes salariés sont sensibilisés avec le rapport RSE et une communication interne\nExemples de documents à joindre :\nAccord contractuel ou facture attestant de l’acquisition d’une énergie renouvelable\nDocument attestant de l’entretien de systèmes de génération d’énergie renouvelable sur place\nRapport sur le changement climatique du CDP\nVotre document doit : Démontrer que l’entreprise achète ou produit de l’énergie provenant de sources renouvelables telles que le soleil, le vent, l’eau et la\ngéothermie.\nAchat ou production d’énergie renouvelable\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n20\nCommentaire:\nNous faisons l'achat d'énergie renouvelable à travers le contrat EDF vert\n\nExemples de documents à joindre :\nAccord contractuel ou facture attestant de l’acquisition de compensation carbone auprès d’un programme ou d’un marché de compensation\ncarbone réputé\nCertificat de retrait de compensation carbone\nRapport sur le changement climatique du CDP\nVotre document doit : Attester des actions par lesquelles l’entreprise a acheté et retiré des crédits de compensation carbone vérifiés, permettant ainsi de\ncompenser ses propres émissions de GES.\nLes crédits de compensation carbone doivent être achetés via un programme de compensation carbone réputé (tel que Verified Carbon Standard - VCS,\nGold Standard, American Carbon Registry - ACR, ou Climate Action Reserve, etc.) ou un marché de programmes volontaires de compensation carbone.\nParmi les projets de compensation carbone les plus courants figurent REDD+, le boisement, les projets d’énergie renouvelable et la gestion des déchets.\nAchat de crédits de compensation carbone vérifiés\nExemples de documents à joindre :\nCertificat d’audit énergétique ou carbone\nRapport d’audit énergétique ou carbone rédigé par un expert tiers\nRapports internes d’évaluation énergétique ou carbone, accompagnés d’un plan d’action concret de réduction de la consommation d’énergie ou des\némissions de GES\nRapport sur le changement climatique du CDP\nVotre document doit : S’assurer qu’un audit énergétique ou carbone a été réalisé pour évaluer le profil de consommation d’énergie ou des émissions de\nGES des installations du site de l’entreprise, notamment ses bureaux, sites de production et moyens de transport. Cela permet à l’entreprise de déterminer\nles possibilités de réduction liées à la consommation d’énergie et aux émissions de GES.\nAudit énergétique ou carbone\nExemples de documents à joindre :\nTableau de contrôle du système d’éclairage intelligent\nAnalyse de l’éclairage intérieur visant à identifier et optimiser l’utilisation de la lumière naturelle\nDocuments attestant de la rénovation des systèmes d’éclairage\nDocuments attestant de l’achat de systèmes d’éclairage écoénergétiques\nVotre document doit : Démontrer la mise en œuvre de systèmes d’éclairage écoénergétiques ou de la rénovation des luminaires existants avec des\ncomposants plus économes en énergie.\nRéduction de la consommation d’énergie des systèmes d’éclairage\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n20\nCommentaire:\nEclairage nous avons remplacer les lampes énergivores par une source lumineuse LED plus économe\net nous installons des détecteurs de présence pour les pièces inoccupées de manière continue.\n\nExemples de documents à joindre :\nDocuments attestant de l’installation de refroidisseurs à vitesse variable pour les systèmes de chauffage, de ventilation et de climatisation\nDocuments attestant de l’exploitation de systèmes de refroidissement urbain ou de systèmes de contrôle intelligent et d’automatisation des\nbâtiments\nInterface de contrôle des détecteurs de présence\nVotre document doit : Démontrer l’installation ou l’adoption de systèmes de chauffage, de ventilation et de climatisation écoénergétiques, ou l’adoption\nd’autres technologies intelligentes visant à réduire la consommation d’énergie de ces systèmes.\nRéduction de la consommation d’énergie des systèmes CVC (chauffage, ventilation et climatisation)\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n20\nCommentaire:\nEclairage nous avons remplacer les lampes énergivores par une source lumineuse LED plus économe\net nous installons des détecteurs de présence pour les pièces inoccupées de manière continue.\nExemples de documents à joindre :\nProcessus d’adoption de la virtualisation des données\nPreuve du déploiement d’équipements écoénergétiques\nDocument attestant de l’installation ou de l’entretien de systèmes de refroidissement ou de processeurs écoénergétiques\nVotre document doit : Démontrer la mise en œuvre de mesures de réduction de la consommation énergétique de l’infrastructure informatique (centres\nde données, salles de serveurs, etc.).\nRéduction de la consommation d’énergie de l’infrastructure informatique\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nVotre document doit : Démontrer des actions, autres que celles spécifiées dans les autres options, visant à améliorer l’efficacité énergétique et à réduire\nles émissions de GES.\nExemples de documents à joindre :\nProcédure opératoire standard\nInstruction de travail\nRapport annuel ou RSE\nAutres actions pour réduire la consommation énergétique et les émissions de GES qui ne sont incluses nulle part ailleurs dans cette\nquestion\nCaméléons possède deux véhicules d'entreprise électrique.\nVeuillez préciser\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n16\nCommentaire:\nNous proposant au salarié caméléons la prime indemnité mobilité durable\nAucune action pour le moment/Je ne sais pas\n\nComplète\nENV3551\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour gérer les déchets ?\nExemples de documents à joindre :\nInstructions pour la gestion des déchets\nContrat avec un tiers\nRegistres des matériaux réutilisés\nExtrait du site web sur les déchets évités\nVotre document doit :\nDémontrer que l'entreprise adopte des méthodes qui réduisent la production de déchets en interne.\nQuelques exemples :\nUtiliser des articles réutilisables et compostables au lieu d'articles à usage unique\nRéduire la consommation de papier\nRéparer et réhabiliter du matériel de bureau et des équipements informatiques\nRéduction des déchets internes au moyen de la réutilisation, de la récupération ou du recyclage des matériaux\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\n100% des cartouches sont réexpédier à hp planets patrners; l'ensemble de nos déchets sont déposés\ndans des poubelles aux tris sélectives\nExemples de documents à joindre :\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nVotre document doit :\nDémontrer la mise en place de programmes de formation sur les questions liées à la gestion des déchets à l’intention des employés. La formation doit\nviser à accroître la réutilisation et le recyclage des matériaux ainsi qu’à réduire la séparation et l’élimination inadéquates des déchets dans le cadre de vos\nactivités.\nFormation des employés à la réduction et au tri des déchets\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nNous sensibilisons à l'impression noir et blanc\n\nExemples de documents à joindre :\nInstructions concernant le tri des déchets\nFacture du système de tri des déchets\nContrat de transport ou de traitement des déchets\nPlan de gestion des déchets\nVotre document doit :\nDémontrer que les déchets d'exploitation sont triés dans leurs flux respectifs avant d'être éliminés. Cette action permet de s'assurer que chaque flux de\ndéchets est préparé de manière appropriée pour faciliter le traitement ou le recyclage.\nLes flux de déchets peuvent être classés en différentes catégories : déchets organiques, papier, verre, métaux, plastiques, ainsi que déchets dangereux\ntels que les piles ou les produits chimiques.\nLes actions peuvent inclure la mise en place de bacs ou de conteneurs étiquetés pour différents types de déchets afin de permettre aux employés de trier\nfacilement les déchets à la source, ou des partenariats avec des entreprises de gestion des déchets pour garantir que les déchets triés sont traités\ncorrectement.\nTri interne et élimination des déchets en fonction des flux de déchets\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nl'ensemble de nos déchets sont déposés dans des poubelles aux tris selectives\nExemples de documents à joindre :\nInstructions ou matériel de communication à l'intention des employés\nPrésentation des améliorations réalisées\nComparaison des relevés de consommation (avant et après la mise en œuvre)\nVotre document doit : Montrer les processus ou les technologies mis en œuvre pour réduire la consommation de matériaux dans les opérations. Cela\npeut inclure la numérisation des processus et le remplacement d’articles à usage unique par des articles réutilisables.\nRéduction de la consommation de matériaux via l'optimisation des processus\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nL'ensemble de nos papier est du papier recyclé. nous avons baisser de 50% notre consommation grâce\n: utilisation recto verso des impressions digitalisation des contrats et des bs\n\nExemples de documents à joindre :\nFactures\nListes d’ingrédients ou de composants\nSpécifications des matériaux ou des produits\nLignes directrices relatives à l’utilisation et à la manipulation des matériaux\nDocumentation sur la recherche et le développement\nVotre document doit : Montrer que l’entreprise utilise des matériaux de traitement écologiques ou biosourcés dans ses activités, ce qui réduit l’impact sur\nl’environnement et la dépendance à l’égard des matières dangereuses. Cette action se réfère spécifiquement aux matériaux consommés dans le processus\nopérationnel, et non aux matériaux utilisés dans le produit fini, l’emballage primaire ou l’offre de services directs.\nQuelques exemples :\nRemplacement des solutions de nettoyage, désinfectants, détergents, dégraissants et produits antiparasitaires conventionnels par des solutions à\nfaible toxicité, biodégradables ou certifiées écologiques\nMise en œuvre de matériaux écologiques pour la logistique interne et la manutention des matériaux, tels que des films étirables, des caisses ou des\npalettes réutilisables, recyclés ou biosourcés, ou des palettes en bois provenant de sources durables certifiées\nAdoption de matériels d’étalage et de stockage respectueux de l’environnement, tels que des présentoirs de point de vente recyclés ou rapidement\nrenouvelables avec des encres non toxiques, et des contenants réutilisables pour le stockage des ingrédients en vrac\nUtilisation de matériaux de traitement écologiques ou biosourcés\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n15\nCommentaire:\nL'ensemble de nos papier est du papier recyclé; 100% des produits pour le ménage sont des produit\neco labellisés. nos sacs poubelles sont biodégradables\nExemples de documents à joindre :\nManuel d’utilisateur de la plateforme\nMatériel promotionnel\nRegistres des fournitures échangées\nVotre document doit :\nDémontrer l’utilisation ou la mise en place d’une plateforme permettant aux employés d’échanger du matériel de bureau afin de promouvoir la\nréutilisation et la RSE. Cette plateforme peut prendre la forme d’un marché d’échange physique, tel qu’une rencontre ou un événement organisé, ou d’une\nplace de marché en ligne. Les preuves doivent attester d’une plateforme en ligne active, d’un événement qui a déjà eu lieu ou d’un événement qui est\nplanifié à une date et une heure déterminées. Les preuves doivent fournir une indication raisonnable de l’implication active ou de la participation des\nemployés et doivent attester d’un objectif clair de réduction des déchets ou de concrétisation de buts RSE.\nLes fournitures de bureau peuvent inclure :\nPapeterie et fournitures pour imprimantes\nÉquipements électroniques\nMobilier et équipements ergonomiques\nArticles personnels tels que tasses à café, bouteilles d’eau et articles de table réutilisables\nPlateforme des employés disponible pour échanger des fournitures de bureau entre différents départements ou différentes unités\nExemples de documents à joindre :\nRapports de vente\nLignes directrices relatives à la remise à neuf\nPlans de gestion des biens informatiques\nVotre document doit : Démontrer que l'entreprise remet à neuf le matériel informatique pour réduire les déchets électroniques. Le reconditionnement\ninclut le réassemblage, l’inspection, le nettoyage, la mise à niveau et le remplacement de composants afin de remettre l'équipement dans l'état où il se\ntrouvait au moment de sa fabrication. Ce processus permet de prolonger la durée de vie de l'équipement et de réduire la quantité de déchets\nélectroniques produits.\nRemise à neuf et réutilisation interne du matériel informatique\n\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nVotre document doit :\nIndiquer les actions supplémentaires, en plus de celles énumérées dans les autres options, visant à gérer les déchets dangereux ou non dangereux\ngénérés par les activités de l’entreprise tout au long de ses processus de production, tels que l’extraction de matériaux, la transformation, les achats, la\nconception de produit ou de service, la production et la distribution.\nExemples de documents à joindre :\nProcédures opératoires standard\nInstructions de travail\nRapport annuel ou RSE\nAutres actions pour gérer les déchets qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\nObligatoire\nENV7001\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour faire face aux risques physiques liés au climat ?\nExemples de documents à joindre :\nSection dédiée aux risques physiques liés au climat dans le rapport TCFD\nRapport d’évaluation des risques physiques liés au climat et de leur impact\nAudit du risque d’assurance\nMatériel de présentation détaillé sur les résultats de l’évaluation des risques\nVotre document doit : Démontrer que votre entreprise a effectué une évaluation pour identifier et quantifier l’exposition de ses sites opérationnels aux\naléas physiques liés au climat. Cette évaluation porte sur la manière dont les changements de modèles climatiques pourraient avoir un impact sur les\nbiens et les activités de l’entreprise. L’évaluation peut porter sur deux types de risques physiques liés au climat :\nRisques physiques graves : Les aléas résultant d’événements, tels que l’intensification des ouragans, des inondations, des incendies de forêt ou des\nvagues de chaleur.\nRisques physiques chroniques : Des changements à long terme dans les modèles climatiques, tels que des températures plus élevées en continu,\nl’élévation du niveau de la mer ou un stress hydrique chronique.\nCette question n’aura pas d’impact sur le score, mais les forces et les points d’amélioration identifiés à partir des preuves fournies apparaîtront sur la fiche\nd’évaluation.\nÉvaluation des risques physiques et des impacts liés au changement climatique\nExemples de documents à joindre :\nPlan de relance résilient au changement climatique\nPlan de continuité des activités\nRapport TCFD (section sur la stratégie et la gestion des risques)\nVotre document doit : Démontrer que votre entreprise a mis en œuvre un plan structuré pour gérer les risques physiques liés au climat et assurer la\ncontinuité des activités face à des événements météorologiques extrêmes. Ce plan doit prendre en compte deux échéances distinctes :\nRelance (à court terme) : Protocoles visant à rétablir les opérations immédiatement après des événements climatiques graves, tels que des\ninondations, des tempêtes ou des incendies de forêt. Cela va au-delà de la reprise après sinistre standard dans le domaine de l’informatique et\ninclut des mesures d’urgence visant à protéger les actifs physiques.\nAdaptation (à long terme) : Mesures stratégiques visant à protéger l’entreprise contre les changements climatiques chroniques, tels que l’élévation\ndu niveau de la mer, la pénurie d’eau ou le stress thermique.\nCette question n’aura pas d’impact sur le score, mais les forces et les points d’amélioration identifiés à partir des preuves fournies apparaîtront sur la fiche\nd’évaluation.\nPlan de relance et d’adaptation au changement climatique\nAucune action pour le moment/Je ne sais pas\n\nIndicateur\nReporting\nImpact sur le score\nLe reporting repose sur des indicateurs de performance clés quantitatifs qui permettent de mesurer votre mise en œuvre des pratiques RSE.\nNous vous demanderons de joindre des documents comprenant vos indicateurs RSE. Un document de reporting valide comporte l’année de\nreporting et l’unité de reporting (comme les kWh ou les litres).\nAssurez-vous que la dernière période de reporting se situe au cours des deux dernières années calendaires.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\n\nComplète", "docs": [{"name": "Politique environnementale", "type": "Politique/code de conduite", "pages": "4", "comment": "Sensibiliser ou former les collaborateurs"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "Les salariés sont sensibilisés avec le rapport RSE et une communication interne"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "20", "comment": "Nous faisons l'achat d'énergie renouvelable à travers le contrat EDF vert"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "20", "comment": "Eclairage nous avons remplacer les lampes énergivores par une source lumineuse LED plus économe"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "20", "comment": "Eclairage nous avons remplacer les lampes énergivores par une source lumineuse LED plus économe"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "16", "comment": "Nous proposant au salarié caméléons la prime indemnité mobilité durable"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "100% des cartouches sont réexpédier à hp planets patrners; l'ensemble de nos déchets sont déposés"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "Nous sensibilisons à l'impression noir et blanc"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "l'ensemble de nos déchets sont déposés dans des poubelles aux tris selectives"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "L'ensemble de nos papier est du papier recyclé. nous avons baisser de 50% notre consommation grâce"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "15", "comment": "L'ensemble de nos papier est du papier recyclé; 100% des produits pour le ménage sont des produit"}], "no_answers": ["Aucune action pour le moment", "Aucune action pour le moment", "Aucune action pour le moment"], "scorecard_notes": [], "section": "Actions", "section_label": "Actions énergie/GES"}, {"code": "ENV630", "theme": "Environnement", "question": "Veuillez déclarer les indicateurs de GES suivants : Les réponses à cette question seront affichées dans une section dédiée de votre plateforme EcoVadis :", "raw": "Impact sur le score\nVeuillez déclarer les indicateurs de GES suivants :\nLes réponses à cette question seront affichées dans une section dédiée de votre plateforme EcoVadis : Indicateurs. Cet outil est utile pour stocker\ntoutes les données quantitatives pertinentes et surveiller vos progrès en matière de RSE.\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport sur les émissions de GES\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs au total des émissions brutes de GES du Scope 1 en tonnes d’équivalent\nCO₂. Les émissions du Scope 1 sont les émissions de GES provenant de sources détenues ou contrôlées par l’entreprise. Elles comprennent notamment la\nproduction de chaleur, de vapeur ou d’électricité, le traitement physique ou chimique, etc. L’entreprise peut se référer au Greenhouse Gas Protocol : Une\nnorme de comptabilisation et de déclaration destinée à l’entreprise pour connaître les principes de comptabilisation des émissions du Scope 1.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés).\nVeuillez saisir une valeur\nTotal des émissions brutes de GES du scope 1\n2025\ntonnes d’équivalent CO₂\nValeur\nDocument joint\nEcoVadis_Carbon_Calculator_…\nDocuments de reporting (KPI)/rapp…\nRemplacer le document\nCommentaire:\nDocument joint\nEcoVadis_Carbon_Calculator_…\nDocuments de reporting (KPI)/rapp…\nRemplacer le document\nCommentaire:\nAnnée\nUnité\n\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport sur les émissions de GES\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs au total des émissions brutes de GES du Scope 2 en tonnes d’équivalent\nCO₂. Les émissions du Scope 2 sont les émissions de GES provenant de la production d’électricité achetée et consommée par l’entreprise. L’électricité\nachetée est définie comme étant celle acquise ou exploitée autrement par l’entreprise. Les émissions du Scope 2 diffèrent de celles du Scope 1 en ce\nqu’elles sont générées physiquement sur le lieu où l’électricité est produite. L’entreprise peut se référer au Greenhouse Gas Protocol : Une norme de\ncomptabilisation et de déclaration destinée à l’entreprise pour connaître les principes de comptabilisation des émissions du Scope 2.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés).\nVeuillez saisir une valeur\nTotal des émissions brutes de GES du scope 2 (selon le marché ou les localisations)\n2025\ntonnes d’équivalent CO₂\nValeur\nDocument joint\nEcoVadis_Carbon_Calculator_…\nDocuments de reporting (KPI)/rapp…\nRemplacer le document\nCommentaire:\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport sur les émissions de GES\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au total des émissions brutes de GES du Scope 3 en tonnes d’équivalent CO₂. Les émissions du\nScope 3 comprennent toutes les émissions de GES indirectes relevant des 15 catégories suivantes (telles que définies par le GHG Protocol) :\nbiens et services achetés\nbiens-capitaux\nactivités liées au carburant et à l’énergie (non incluses dans les Scopes 1 ou 2)\ntransport et distribution en amont\ndéchets produits par les opérations\ndéplacements professionnels\ndéplacements domicile-travail des employés\nbiens loués en amont\ntransport et distribution en aval\ntransformation des produits vendus\nutilisation des produits vendus\ntraitement de fin de vie des produits vendus\nbiens loués en aval\nfranchises\ninvestissements L’entreprise peut se référer au Greenhouse Gas Protocol : Une norme de comptabilisation et de déclaration destinée à l’entreprise\npour connaître les principes de comptabilisation des émissions du Scope 3.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés).\nTotal des émissions brutes de GES du scope 3\n2025\ntonnes d’équivalent CO₂\nValeur\nAnnée\nUnité\nAnnée\nUnité\n\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport sur les émissions de GES\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs au total des émissions brutes de GES du Scope 3 en aval en tonnes\nd’équivalent CO₂. Les émissions du Scope 3 en aval comprennent toutes les émissions de GES indirectes liées aux biens et services vendus qui relèvent des\ncatégories suivantes (telles que définies par le GHG Protocol) :\ntransport et distribution en aval\ntransformation des produits vendus\nutilisation des produits vendus\ntraitement de fin de vie des produits vendus\nbiens loués en aval\nfranchises\ninvestissements L’entreprise peut se référer au Greenhouse Gas Protocol : Une norme de comptabilisation et de déclaration destinée à l’entreprise\npour connaître les principes de comptabilisation des émissions du Scope 3.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés). La fourniture\nd’éléments de preuve valables concernant cette option sera créditée pour le thème de l’environnement.\nTotal des émissions brutes de GES du Scope 3 en aval\n2025\ntonnes d’équivalent CO₂\nValeur\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport sur les émissions de GES\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs au total des émissions brutes de GES du Scope 3 en amont en tonnes\nd’équivalent CO₂. Les émissions du Scope 3 en amont comprennent toutes les émissions de GES indirectes liées aux biens et services achetés ou acquis qui\nrelèvent des catégories suivantes (telles que définies par le GHG Protocol) :\nbiens et services achetés\nbiens-capitaux\nactivités liées au carburant et à l’énergie (non incluses dans les Scopes 1 ou 2)\ntransport et distribution en amont\ndéchets produits par les opérations\ndéplacements professionnels\ndéplacements domicile-travail des employés\nbiens loués en amont L’entreprise peut se référer au Greenhouse Gas Protocol : Une norme de comptabilisation et de déclaration destinée à\nl’entreprise pour connaître les principes de comptabilisation des émissions du Scope 3.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés). La fourniture\nd’éléments de preuve valables concernant cette option sera créditée pour le thème des achats responsables.\nTotal des émissions brutes de GES du Scope 3 en amont\n2025\ntonnes d’équivalent CO₂\nValeur\nNous utilisons les données de chiffre d’affaires pour les analyses comparatives des indicateurs et pour calculer le niveau de fiabilité de vos émissions de\nCO₂. La confidentialité et la sécurité de ces données est préservée conformément aux pratiques de confidentialité du secteur d’activité et à la politique de\nconfidentialité d’EcoVadis.\nChiffre d’affaires annuel brut total\n2025\nmillions d’euros\nValeur\nAucun indicateur pour le moment/Je ne sais pas\nAnnée\nUnité\nAnnée\nUnité\nAnnée\nUnité\n\nComplète", "docs": [{"name": "EcoVadis_Carbon_Calculator_…", "type": "Documents de reporting (KPI)/rapp…", "pages": "", "comment": "Document joint"}, {"name": "EcoVadis_Carbon_Calculator_…", "type": "Documents de reporting (KPI)/rapp…", "pages": "", "comment": "Exemples de documents à joindre :"}], "no_answers": ["Aucun indicateur pour le moment"], "scorecard_notes": ["🟡 Absence reporting GES Scope 1 (preuve manquante)", "🟡 Absence reporting GES Scope 2 (market-based + location-based)"], "section": "Reporting", "section_label": "Indicateurs GES"}, {"code": "ENV640", "theme": "Environnement", "question": "Veuillez déclarer les indicateurs environnementaux suivants : Les réponses à cette question seront affichées dans une section dédiée de votre plateforme EcoVadis :", "raw": "Impact sur le score\nVeuillez déclarer les indicateurs environnementaux suivants :\nLes réponses à cette question seront affichées dans une section dédiée de votre plateforme EcoVadis : Indicateurs. Cet outil est utile pour stocker\ntoutes les données quantitatives pertinentes et surveiller vos progrès en matière de RSE.\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport interne de suivi énergétique\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs à la consommation énergétique. La consommation énergétique\ncomprend les combustibles avant combustion et la quantité d’intrants énergétiques achetés, y compris l’électricité, la chaleur, la vapeur et le\nrefroidissement, destinés aux opérations.\nLe reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou d’employés).\nConsommation totale d’énergie\nkilowatt-heure (kWh)\n3972\nValeur\nDocument joint\nbilan-annuel-data edf\nCertificat\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n24\nCommentaire:\nExemples de documents à joindre :\nRapport d’audit énergétique\nRapport sur la consommation énergétique\nRapport interne de suivi énergétique\nSection de reporting dans votre rapport annuel ou RSE\nGuide sur les documents Votre document doit démontrer les indicateurs relatifs à l’énergie consommée issue de sources renouvelables, qu’elle provienne\nd’un contrat spécifique ou d’une installation d’autoproduction sur site. Les sources renouvelables pouvant être envisagées sont les suivantes : les\néoliennes, l’énergie solaire, la biomasse, la méthanisation, la géothermie, l’hydraulique, etc.\nLa quantité d’énergie provenant de sources renouvelables doivent être déclarées dans la même unité que la quantité d’énergie déclarée sous l’indicateur\n« Consommation énergétique ». Le reporting sur cet indicateur spécifique doit couvrir au moins 95 % des activités de votre entreprise (nombre de sites ou\nd’employés).\nConsommation totale d’énergie renouvelable\n2025\ngigajoules (GJ)\nValeur\nAnnée\nUnité\nAnnée\nUnité\n\nExemples de documents à joindre :\nRapport interne de suivi des déchets dangereux\nReporting sur les déchets dangereux préparés à des fins réglementaires\nReporting sur les déchets dangereux élaboré par un tiers\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au total des déchets dangereux générés, recyclés, réutilisés, valorisés, transportés, exportés,\nimportés et traités par les activités de l’entreprise en tonnes. Les déchets sont qualifiés de dangereux lorsqu’ils contiennent des matières dangereuses ou\nqu’ils sont susceptibles d’avoir des effets néfastes sur la santé humaine ou l’environnement (tels que les produits chimiques dangereux, les déchets\nélectroniques comme des ordinateurs de bureau de salle de contrôle, des ordinateurs portables, des processeurs centraux, des serveurs, des disques\ndurs, des moniteurs, des onduleurs UPS et divers équipements réseau; des métaux corrosifs et toxiques, etc.).\nPoids total des déchets dangereux\n2025\ntonne métrique (t)\nValeur\nExemples de documents à joindre :\nRapport interne de suivi des déchets\nReporting sur les déchets non dangereux préparés à des fins réglementaires\nReporting sur les déchets non dangereux élaboré par un tiers\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au total des déchets non dangereux émis par les activités de l’entreprise, indépendamment de la\nméthode de traitement ou d’élimination utilisée. Les déchets non dangereux comprennent tous les autres déchets ne correspondant pas à la définition des\ndéchets dangereux. Les différents types de déchets non-dangereux doivent être agrégés afin d’obtenir le poids total des déchets.\nPoids total des déchets non dangereux\nkilogramme (kg)\n1290\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n24\nCommentaire:\nAnnée\nUnité\nAnnée\nUnité\n\nExemples de documents à joindre :\nRapport interne de suivi des déchets\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs aux poids total des déchets (qu’ils soient dangereux ou non dangereux) qui sont soumis à un\ntraitement de valorisation en fin de vie. Les déchets destinés à être valorisés sont des déchets qui subissent l’un des traitements ci-dessous : réutilisation,\nrecyclage, compostage et autres opérations de récupération. Les déchets qui ne sont pas triés sur site, mais qui bénéficieraient d’une valorisation via le\ntraitement des déchets industriels banals (DIB) organisé par la commune ne peuvent pas être inclus dans la quantité de déchets valorisés,, sauf si le site\nest en mesure de démontrer la valorisation effectivement réalisée par la commune.\nPoids total de déchets valorisés\ntonne métrique (t)\n100\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n24\nCommentaire:\n% des cartouches d’encre recyclées\nAucun indicateur pour le moment/Je ne sais pas\nAnnée\nUnité\n\nObligatoire", "docs": [{"name": "bilan-annuel-data edf", "type": "Certificat", "pages": "1", "comment": "Document joint"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "24", "comment": "Année"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "24", "comment": "% des cartouches d’encre recyclées"}], "no_answers": ["Aucun indicateur pour le moment"], "scorecard_notes": ["🟡 Absence reporting déchets dangereux"], "section": "Reporting", "section_label": "Autres indicateurs environnementaux"}, {"code": "ENV697", "theme": "Environnement", "question": "Parmi les thèmes suivants, quels sont ceux pour lesquels votre entreprise déclare des indicateurs ? Sélectionnez cette option si vous disposez d’indicateurs de reporting supplémentaires relatifs à la consommation énergétique et aux GES, en plus des indicateurs déclarés aux questions précédentes sur le reporting environnemental ou sur les GES.", "raw": "Impact sur le score\nP t/Je ne sais pas\nComplète\nCAR1300\nVotre entreprise possède-t-elle actuellement un système de gestion du carbone (avec un reporting sur les émissions de\nGES et/ou des objectifs de réduction des émissions de GES ) ?\nCette question nous aide à déterminer si davantage de questions en lien avec le carbone s’appliquent à votre entreprise.\nVeuillez sélectionner « Oui » si votre entreprise dispose actuellement de l’un des systèmes suivants (liste non exhaustive) : objectifs de réduction\ndes émissions de GES, bilan carbone ou autres déclarations, analyse des émissions du scope 3, engagement des fournisseurs relatif aux émissions de GES,\nsuivi des progrès réalisés par rapport aux objectifs fixés, processus de suivi ou déclaration et vérification des GES.\nSi aucun des systèmes ci-dessus n’est actuellement en place, veuillez sélectionner « Non ». Si vous cliquez sur « Non », votre entreprise ne recevra\npas de questions en lien avec le carbone. Cependant, vous obtiendrez des points d’amélioration en rapport avec votre système de gestion du\ncarbone, ainsi qu’un niveau de performance dédié.\nOui\nPas encore/Je ne sais pas\n\nThème\nÉthique\nImpact sur le score\nCe thème se concentre sur la gestion des enjeux d’éthique des affaires, dont les suivants :\nCorruption (p. ex. pots-de-vin, fraude, conflits d’intérêts, blanchiment d’argent).\nPratiques anticoncurrentielles (p. ex., cartels, abus de position dominante, fusions et acquisitions illégales).\nGestion insatisfaisante des informations (p. ex., violation de la sécurité de l’information).\nEnjeux RSE pertinents pour votre entreprise :\nCorruption\nGestion responsable de l'information\nNos avons sélectionné les enjeux RSE les plus pertinents pour votre entreprise d’après son secteur d’activité, sa taille et sa localisation.\nLes enjeux RSE sélectionnés influencent les questions que vous allez recevoir et l’impact de ce thème sur votre score global.\nIndicateur\nPolitiques\nImpact sur le score\nUne politique est un ensemble d’objectifs qui concerne des enjeux RSE spécifiques. Elle montre que votre entreprise a l’intention de réduire son\nimpact, d’atténuer ses risques ou d’améliorer ses performances.\nExemples de politiques :\nPrincipes généraux, déclarations et objectifs qualitatifs visant à améliorer la RSE.\nObjectifs quantitatifs spécifiques avec une échéance définie dans le futur. Vous pouvez soumettre des objectifs tant absolus que relatifs. Un\nobjectif concluant doit remplir les conditions suivantes :\nÊtre limité dans le temps : il doit inclure une année de référence et une année cible.\nÊtre mesurable : il doit inclure un objectif quantitatif à atteindre.\nÊtre réalisable : il doit être réaliste et pertinent par rapport aux activités de l’entreprise.\nObtenir plus d’exemples et de bonnes pratiques concernant l’élaboration de politiques\n\nComplète\nFB100\nImpact sur le score\nVotre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?\nExamples of documents to attach\nCode of Conduct with commitments related to anti-corruption & bribery\nBusiness Ethics Policy covering issues related to corruption\nCEO letter with anti-corruption commitments\nEmployee Handbook\nFraud Policy\nConflict of Interest Prevention Policy\nGifts Policy\nAnti-corruption Policy\nSustainability report, document or charter with commitments related to corruption\nDocument guidelines Your document should demonstrate your company's commitments on prevention of bribery, conflict of interest, fraud, or money\nlaundering. Your policy can include either qualitative objectives or quantitative targets or both.\nHere are some examples:\nQualitative objective: Have zero tolerance for any corruption in business activities, bribes or other improper unauthorized payments that are\nstrictly prohibited.\nQuantitative target: Increase the number of employees trained on anti-corruption to 50% by 2030 compared to 2020.\nAnti-corruption et extorsion\nDocu tres critères pertinents.\nLes transactions sensibles sont des transactions discrétionnaires qui impliquent, ou paraissent impliquer, un profit personnel en plus de l’avantage offert à\nl’entreprise. Elles se produisent souvent dans le cadre de l’hospitalité et des voyages ou en reconnaissance de services professionnels rendus. Ces\ncontextes présentent intrinsèquement un risque de corruption plus élevé.\nProcédure d'approbation spécifique pour les transactions sensibles\nDocument joint\nchartre anti-corruption\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n8-10\nCommentaire:\nToute transaction sensible, y compris les cadeaux et invitations, doit être déclarée et approuvée par un\nsupérieur hiérarchique.\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nGuide sur les documents Votre document doit démontrer la présence d’actions, distinctes de celles spécifiées dans les autres options, mises en place par\nvotre entreprise pour faire face aux problèmes liés à l’éthique comme la corruption, la fraude, les conflits d’intérêt ou le blanchiment d’argent.\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nRapport annuel ou RSE\nAutres actions pour empêcher la corruption qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\n\nComplète\nFB3106\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour garantir une gestion responsable de l'information ?\nExemples de documents à joindre\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nGuide sur les documents Votre document doit démontrer la présence de programmes de formation offerts aux employés pour renforcer leurs\nconnaissances sur les questions liées à la sécurité de l’information, comme des diaporamas, des résumés du contenu de la formation, des rapports\nd’avancement, des certificats d’achèvement, etc.\nFormation des employés à la sécurité de l’information\nDocument joint\nformation sécurité de l'infor…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-5\nCommentaire:\nformer ses employés à identifier et prévenir les cybermenaces, en leur fournissant des outils et des\nbonnes pratiques pour assurer la sécurité des données sensibles de l’entreprise​\nExemples de documents à joindre\nProcédure standard de diligence raisonnable\nInstructions de travail pour faire preuve de diligence raisonnable\nDocuments montrant la mise en œuvre du programme de diligence raisonnable\nGuide sur les documents Votre document doit démontrer l’existence de mesures détaillées et concrètes pour enquêter sur les tiers avec lesquels\nl’entreprise fait affaire (fournisseurs, vendeurs, commissionnaires, courtiers, représentants commerciaux, distributeurs, entrepreneurs, courtiers en\ndouane et consultants) afin d’assurer le respect des règles de sécurité de l’information et de prévenir les incidents de tiers en la matière.\nLes éléments d’un programme de diligence raisonnable à prendre en compte doivent inclure au moins deux des trois options suivantes : 1) Preuve d’une\napproche basée sur les risques 2) Collecte de données sur des tiers 3) Analyses comparatives ou autres résultats\nProgramme de devoir de vigilance sur les tiers en matière de sécurité de l’information\nDocument joint\nsécurité tiers\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-7\nCommentaire:\n: Caméléons RH veille à ce que tous ses partenaires et tiers respectent des normes de sécurité\nrigoureuses en appliquant un programme de diligence raisonnable qui évalue et contrôle\nrégulièrement leurs pratiques de sécurité\n\nExemples de documents à joindre\nProcédure d’alerte indépendante\nDescription d’une procédure dans un document sur la politique relative à la sécurité de l’information\nDescription d’une procédure dans un code d’éthique ou un code de conduite\nDescription d’une procédure dans un manuel ou un guide des collaborateurs\nGuide sur les documents Votre document doit démontrer l’existence d’un mécanisme établi permettant à différentes parties de signaler les problèmes\nliés à la sécurité de l’information. Les éléments d’une procédure d’alerte à prendre en compte doivent inclure ce qui suit : 1) Garantie de confidentialité\n2) Garantie d’absence de représailles 3) Canal dédié aux signalements (par ex. adresse e-mail interne ou tierce, numéro de téléphone, hotline, personne à\ncontacter).\nProcédure d'alerte à disposition des parties prenantes afin de signaler les problèmes en matière de sécurité de l'information\nDocument joint\nprocédure d'alerte\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-2\nCommentaire:\nmis en place une procédure d'alerte sécurisée et confidentielle permettant à toutes les parties\nprenantes de signaler rapidement tout incident de sécurité, garantissant ainsi une réaction rapide et\nefficace​\nExemples de documents à joindre\nProcédures opératoires standard\nÉvaluations des risques menées par un tiers\nDocuments relatifs au suivi du système interne\nGuide sur les documents Votre document doit démontrer l’existence d’une évaluation des risques liés à la sécurité de l’information dans l’ensemble des\nactivités de l’entreprise afin d’établir des priorités en matière de gestion des risques.\nLes éléments des évaluations des risques à prendre en compte doivent inclure au moins deux des trois options suivantes : 1) Examen périodique des\nrisques 2) Descriptions des risques 3) Présence d’un plan d’actions correctives\nEvaluations des risques liés à la sécurité de l'information effectuées\nDocument joint\nprocédure d'alerte\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n2-4\nCommentaire:\nCaméléons RH réalise régulièrement des évaluations des risques pour identifier et prioriser les\nmenaces potentielles, afin de les traiter avant qu’elles ne se concrétisent en incidents​\nExemples de documents à joindre\nRapports d’audit formels\nProcédures d’audit interne\nGuide sur les documents Votre document doit démontrer la présence d’une surveillance régulière de l’efficacité du système de contrôle de l’éthique et de\nla conformité par l’intermédiaire de tests internes et d’audits externes formels.\nLes éléments d’un audit des procédures de contrôle à prendre en compte doivent inclure au moins deux des trois options suivantes : 1) Indication du\npérimètre de l’audit 2) Indication de la personne ou entité responsable 3) Contrôle rétrospectif du système existant\nAudits des procédures de contrôle pour prévenir les atteintes à la sécurité de l'information\n\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nPlan de continuité des activités couvrant la sécurité de l’information\nGuide sur les documents Votre document doit démontrer des instructions ou une procédure pour détecter les atteintes à la sécurité de l’information, y\nréagir et en limiter l’impact, afin de prévenir d’autres dommages et de rassurer les parties concernées.\nPlan de réponse aux incidents pour gérer les atteintes aux informations confidentielles\nDocument joint\nprocédure d'alerte\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nprocédure claire et réactive pour gérer efficacement les incidents de sécurité, en assurant une\nlimitation des dommages et une communication appropriée aux parties concernées​\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nManuel ou guide des collaborateurs\nRegistres de conservation documentés\nGuide sur les documents Votre document doit démontrer l’existence d’un programme formalisé et détaillé indiquant la durée de conservation de chaque\ntype de données de tiers.\nMise en œuvre d'un calendrier de conservation des documents\nExemples de documents à joindre\nInstructions de travail ou procédures\nProcédure de demande d’accès aux données\nDescription du fonctionnement des pare-feu\nGuide sur les documents Votre document doit démontrer la présence de contrôles internes visant à restreindre l’accès physique ou numérique aux\ndonnées des clients par des employés non autorisés et/ou des tiers.\nMesures pour protéger les données des tiers contre un accès non-autorisé ou une divulgation d'informations\nDocument joint\nsécurité tiers\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n3-4\nCommentaire:\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nFormulaire de consentement utilisé par l’entreprise\nRegistres des documents de consentement conservés par l’entreprise\nGuide sur les documents Votre document doit démontrer des instructions ou un processus opérationnel pour consulter et informer les clients sur les\nparticularités de la collecte et du stockage de leurs données personnelles (comme le type de données recueillies, le partage des données avec des tiers,\netc.).\nMesures pour obtenir le consentement des parties prenantes sur le traitement, le partage et la conservation des informations\nconfidentielles\n\nIndicateur\nReporting\nImpact sur le score\nLe reporting repose sur des indicateurs de performance clés quantitatifs qui permettent de mesurer votre mise en œuvre des pratiques RSE.\nNous vous demanderons de joindre des documents comprenant vos indicateurs RSE. Un document de reporting valide comporte l’année de\nreporting et l’unité de reporting (comme les kWh ou les litres).\nAssurez-vous que la dernière période de reporting se situe au cours des deux dernières années calendaires.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nGuide sur les documents Votre document doit démontrer la présence d’actions, distinctes de celles spécifiées dans les autres options, mises en place par\nvotre entreprise pour faire face aux problèmes liés à la sécurité de l’information.\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nRapport annuel ou rapport RSE\nAutres actions pour garantir la gestion responsable de l'information qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\n\nComplète", "docs": [{"name": "Politique éthique", "type": "Politique/code de conduite", "pages": "2", "comment": "PRÉVENTION DES POTS DE VINS ET DE LA CORRUPTION"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "La fournisseur de Caméléons s'engage à ne pas pratiquer tout acte de corruption, notamment"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "17-18", "comment": "Lutter contre la corruption, le trafic d’influence et la fraude"}, {"name": "Politique éthique", "type": "Politique/code de conduite", "pages": "2", "comment": "CONFLITS D'INTÉRÊT"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "Le fournisseur de Caméléons s'engage à ne pas profiter d’une situation de conflit d’intérêts du fait de"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "17-18", "comment": "s'interdit de participer à des conflits d'intérêt et du blanchiment d'argent"}, {"name": "Politique éthique", "type": "Politique/code de conduite", "pages": "3", "comment": "FRAUDE"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "17-18", "comment": "Lutter contre la corruption, le trafic d’influence et la fraude"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "Le fournisseur de Caméléons RH s'engage à ne pas participer à des opérations de bl
