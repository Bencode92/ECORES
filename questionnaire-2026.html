<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Questionnaire EcoVadis 2026 — CAMELEON COM MARK SASU</title>
<style>
  :root {
    --c-env: #2e7d32;
    --c-soc: #43a047;
    --c-eth: #1b5e20;
    --c-sup: #66bb6a;
    --c-gen: #558b2f;
    --c-bg: #f1f8e9;
    --c-card: #fff;
    --c-border: #c8e6c9;
    --c-text: #1b3a1b;
    --c-muted: #4e6a4e;
    --c-success: #2e7d32;
    --c-warning: #f57c00;
    --c-danger: #c62828;
    --c-info: #2e7d32;
    --c-primary: #2e7d32;
    --c-primary-dark: #1b5e20;
    --c-primary-light: #a5d6a7;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.5;
  }
  header {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%);
    color: white;
    padding: 24px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header-title h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }
  .header-title p { margin: 4px 0 0 0; opacity: 0.8; font-size: 0.85rem; }
  .score-badge {
    background: rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 8px;
    text-align: center;
  }
  .score-badge .score { font-size: 1.6rem; font-weight: 700; }
  .score-badge .label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .toolbar {
    background: white;
    border-bottom: 1px solid var(--c-border);
    padding: 12px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 92px;
    z-index: 99;
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 12px;
    border: 1px solid var(--c-border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: #f5f5f5; }
  .filter-btn.active {
    background: var(--c-primary);
    color: white;
    border-color: var(--c-primary);
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--c-border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .btn:hover { background: #f5f5f5; }
  .btn-primary {
    background: var(--c-primary);
    color: white;
    border-color: var(--c-primary);
  }
  .btn-primary:hover { background: var(--c-primary-dark); }
  
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px 64px;
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: white;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--c-border);
  }
  .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--c-text); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .question-card {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .question-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-card.hidden { display: none; }
  
  .q-header {
    padding: 16px 20px;
    background: #fafafa;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .q-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .q-code {
    font-family: "SF Mono", Monaco, monospace;
    background: #eceff1;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .theme-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: white;
  }
  .theme-environnement { background: #1b5e20; }
  .theme-social { background: #2e7d32; }
  .theme-éthique { background: #388e3c; }
  .theme-achats { background: #43a047; }
  .theme-général { background: #558b2f; }
  .section-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    background: #f5f5f5;
    color: var(--c-muted);
    border: 1px solid var(--c-border);
  }
  
  .priority-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .priority-haute { background: #ffebee; color: var(--c-danger); }
  .priority-moyenne { background: #fff3e0; color: var(--c-warning); }
  .priority-faible { background: #fffde7; color: #f9a825; }
  .priority-ok { background: #e8f5e9; color: var(--c-success); }
  
  .q-body { padding: 20px; }
  .q-text {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--c-text);
  }
  
  .section-block { margin-bottom: 16px; }
  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--c-muted);
    margin-bottom: 8px;
  }
  
  .docs-list { display: grid; gap: 8px; }
  .doc-item {
    background: #f1f8e9;
    padding: 10px 12px;
    border-radius: 6px;
    border-left: 3px solid var(--c-primary);
    font-size: 0.88rem;
  }
  .doc-name { font-weight: 600; }
  .doc-meta { color: var(--c-muted); font-size: 0.78rem; margin-top: 2px; }
  .doc-comment { font-style: italic; color: var(--c-muted); font-size: 0.82rem; margin-top: 4px; }
  
  .scorecard-notes { display: grid; gap: 6px; }
  .scorecard-note {
    background: #fff3e0;
    border-left: 3px solid var(--c-warning);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
  }
  .scorecard-note.priority-haute {
    background: #ffebee;
    border-left-color: var(--c-danger);
  }
  
  .annotation {
    background: #e8f5e9;
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
    border: 1px solid var(--c-primary-light);
  }
  .annotation-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--c-primary-dark);
    margin-bottom: 8px;
  }
  .annotation-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px;
    margin-bottom: 8px;
    align-items: start;
  }
  .annotation-row label {
    font-size: 0.85rem;
    color: var(--c-muted);
    padding-top: 4px;
  }
  .annotation textarea, .annotation input, .annotation select {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--c-primary-light);
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.88rem;
    background: white;
  }
  .annotation textarea:focus, .annotation input:focus, .annotation select:focus {
    outline: 2px solid var(--c-primary);
    outline-offset: -1px;
    border-color: var(--c-primary);
  }
  .annotation textarea { min-height: 50px; resize: vertical; }
  
  .empty-msg {
    color: var(--c-muted);
    font-style: italic;
    font-size: 0.85rem;
    padding: 8px 0;
  }
  
  .doc-status-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 8px;
  }
  .doc-status-bar select {
    padding: 4px 8px;
    border: 1px solid var(--c-border);
    border-radius: 4px;
    font-size: 0.78rem;
    background: white;
  }
  
  details summary {
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--c-muted);
    padding: 6px 0;
    user-select: none;
  }
  details[open] summary { margin-bottom: 8px; }
  pre.raw {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  
  @media print {
    header, .toolbar { position: static; }
    .question-card, .doc-card { break-inside: avoid; }
    .annotation { background: #f9f9f9 !important; -webkit-print-color-adjust: exact; }
  }

  /* === Tabs === */
  .tabs {
    background: white;
    border-bottom: 1px solid var(--c-border);
    padding: 0 32px;
    display: flex;
    gap: 4px;
    position: sticky;
    top: 92px;
    z-index: 99;
  }
  .tab-btn {
    padding: 14px 24px;
    border: none;
    background: transparent;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--c-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--c-primary); background: #f1f8e9; }
  .tab-btn.active {
    color: var(--c-primary-dark);
    border-bottom-color: var(--c-primary);
    background: #f1f8e9;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .toolbar { top: 144px; }

  /* === Library view === */
  .doc-card {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .doc-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .doc-card.hidden { display: none; }
  .doc-card.expired { border-left: 4px solid var(--c-danger); }
  .doc-card.warning { border-left: 4px solid var(--c-warning); }
  .doc-card.valid { border-left: 4px solid var(--c-success); }
  .doc-card.unknown { border-left: 4px solid #bdbdbd; }

  .doc-card-header {
    padding: 14px 18px;
    background: #fafafa;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .doc-card-header h3 {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
    color: var(--c-text);
  }
  .doc-card-header .doc-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .doc-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
  }
  .doc-tag.type-politique { background: #1b5e20; }
  .doc-tag.type-action { background: #43a047; }
  .doc-tag.type-reporting { background: #ef6c00; }
  .doc-tag.type-certificat { background: #6a1b9a; }
  .doc-tag.type-adhesion { background: #1976d2; }
  .doc-tag.type-audit { background: #c62828; }
  .doc-tag.type-autre { background: #616161; }

  .validity-badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .validity-badge.expired { background: #ffebee; color: var(--c-danger); }
  .validity-badge.warning { background: #fff3e0; color: var(--c-warning); }
  .validity-badge.valid { background: #e8f5e9; color: var(--c-success); }
  .validity-badge.unknown { background: #f5f5f5; color: var(--c-muted); }

  .doc-card-body { padding: 16px 18px; }
  .doc-fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }
  .doc-field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--c-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .doc-field input, .doc-field select {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--c-primary-light);
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.88rem;
    background: white;
  }
  .doc-field input:focus, .doc-field select:focus {
    outline: 2px solid var(--c-primary);
    outline-offset: -1px;
    border-color: var(--c-primary);
  }
  .doc-field .computed {
    padding: 6px 10px;
    background: #f5f5f5;
    border-radius: 5px;
    font-size: 0.88rem;
    color: var(--c-text);
  }

  .doc-questions-list {
    margin-top: 8px;
  }
  .doc-questions-list .label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--c-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .doc-q-chip {
    display: inline-block;
    padding: 4px 10px;
    background: #f1f8e9;
    color: var(--c-primary-dark);
    border: 1px solid var(--c-primary-light);
    border-radius: 12px;
    font-size: 0.78rem;
    font-family: "SF Mono", Monaco, monospace;
    margin: 2px 4px 2px 0;
    text-decoration: none;
  }
  .doc-q-chip:hover { background: var(--c-primary-light); }

  .rattachement-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    padding: 8px 10px;
    background: #f9fbf7;
    border: 1px solid #e8f5e9;
    border-radius: 6px;
    margin-bottom: 6px;
    align-items: start;
    font-size: 0.85rem;
  }
  .rattachement-row .rattach-code {
    font-family: "SF Mono", Monaco, monospace;
    background: var(--c-primary);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    text-align: center;
    font-weight: 600;
    text-decoration: none;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .rattachement-row .rattach-code:hover { background: var(--c-primary-dark); }
  .rattachement-row .rattach-info {
    color: var(--c-text);
  }
  .rattachement-row .rattach-question {
    font-size: 0.82rem;
    color: var(--c-muted);
    font-style: italic;
    margin-bottom: 3px;
  }
  .rattachement-row .rattach-pages {
    display: inline-block;
    background: #fff3e0;
    color: var(--c-warning);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    margin-right: 6px;
  }
  .rattachement-row .rattach-why {
    font-size: 0.85rem;
    color: var(--c-text);
    margin-top: 4px;
    padding: 4px 8px;
    background: white;
    border-left: 2px solid var(--c-primary);
    border-radius: 3px;
  }
  .rattachement-row .rattach-why-empty {
    font-size: 0.78rem;
    color: var(--c-muted);
    font-style: italic;
    margin-top: 4px;
  }

  /* Recommended new docs panel */
  .recommended-panel {
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    border: 2px solid var(--c-warning);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .recommended-panel h2 {
    margin: 0 0 12px 0;
    font-size: 1.05rem;
    color: #e65100;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .recommended-panel .recommendation {
    background: white;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 4px solid var(--c-warning);
    font-size: 0.88rem;
  }
  .recommended-panel .recommendation.priority-haute {
    border-left-color: var(--c-danger);
    background: #ffebee;
  }
  .recommended-panel .recommendation strong { color: var(--c-text); }
  .recommended-panel .recommendation .for-q {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.78rem;
    color: var(--c-muted);
  }
  .recommended-panel .add-this-btn {
    margin-top: 6px;
    padding: 4px 10px;
    background: var(--c-primary);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.78rem;
  }
  .recommended-panel .add-this-btn:hover { background: var(--c-primary-dark); }

  .doc-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--c-border);
    flex-wrap: wrap;
  }
  .btn-danger {
    background: white;
    border: 1px solid #ef5350;
    color: var(--c-danger);
  }
  .btn-danger:hover { background: #ffebee; }

  .add-doc-form {
    background: #f1f8e9;
    border: 2px dashed var(--c-primary);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .add-doc-form h3 {
    margin: 0 0 12px 0;
    font-size: 1rem;
    color: var(--c-primary-dark);
  }
</head>
<body>
<header>
  <div class="header-content">
    <div class="header-title">
      <h1>Questionnaire EcoVadis 2026 — CAMELEON COM MARK SASU</h1>
      <p>Périmètre : Entité · Activités d'agences d'emploi temporaire · Paris · Remise : fin mai 2026</p>
    </div>
    <div class="score-badge">
      <div class="score">84/100</div>
      <div class="label">Score 2024 · 99e percentile</div>
    </div>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="questions">📋 Questionnaire (17 questions)</button>
  <button class="tab-btn" data-tab="library">📚 Bibliothèque documents</button>
</nav>

<div id="view-questions" class="tab-content active">
<div class="toolbar">
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Thème :</strong>
    <button class="filter-btn active" data-filter="theme" data-value="all">Tous</button>
    <button class="filter-btn" data-filter="theme" data-value="Général">Général</button>
    <button class="filter-btn" data-filter="theme" data-value="Environnement">Environnement</button>
    <button class="filter-btn" data-filter="theme" data-value="Social et Droits Humains">Social</button>
    <button class="filter-btn" data-filter="theme" data-value="Éthique">Éthique</button>
    <button class="filter-btn" data-filter="theme" data-value="Achats Responsables">Achats</button>
  </div>
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Priorité :</strong>
    <button class="filter-btn active" data-filter="priority" data-value="all">Toutes</button>
    <button class="filter-btn" data-filter="priority" data-value="haute">🔴 Haute</button>
    <button class="filter-btn" data-filter="priority" data-value="moyenne">🟠 Moyenne</button>
    <button class="filter-btn" data-filter="priority" data-value="faible">🟡 Faible</button>
    <button class="filter-btn" data-filter="priority" data-value="ok">🟢 OK</button>
  </div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="btn" id="btn-export">💾 Exporter annotations</button>
    <button class="btn" id="btn-import">📂 Importer</button>
    <input type="file" id="file-input" accept=".json" style="display:none">
    <button class="btn" id="btn-print">🖨️ Imprimer</button>
  </div>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div id="questions"></div>
</main>
</div><!-- /view-questions -->

<div id="view-library" class="tab-content">
<div class="toolbar">
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Type :</strong>
    <button class="filter-btn active" data-filter-lib="type" data-value="all">Tous</button>
    <button class="filter-btn" data-filter-lib="type" data-value="politique">Politiques</button>
    <button class="filter-btn" data-filter-lib="type" data-value="action">Actions</button>
    <button class="filter-btn" data-filter-lib="type" data-value="reporting">Reporting/KPI</button>
    <button class="filter-btn" data-filter-lib="type" data-value="certificat">Certificats</button>
    <button class="filter-btn" data-filter-lib="type" data-value="adhesion">Adhésions</button>
    <button class="filter-btn" data-filter-lib="type" data-value="audit">Audits</button>
  </div>
  <div class="filter-group">
    <strong style="margin-right:4px; font-size:0.85rem;">Validité :</strong>
    <button class="filter-btn active" data-filter-lib="validity" data-value="all">Toutes</button>
    <button class="filter-btn" data-filter-lib="validity" data-value="valid">🟢 Valide</button>
    <button class="filter-btn" data-filter-lib="validity" data-value="warning">🟡 Bientôt expiré</button>
    <button class="filter-btn" data-filter-lib="validity" data-value="expired">🔴 Expiré</button>
    <button class="filter-btn" data-filter-lib="validity" data-value="unknown">⚪ Date inconnue</button>
  </div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="btn btn-primary" id="btn-add-doc">➕ Ajouter document</button>
    <button class="btn" id="btn-export-lib">💾 Exporter bibliothèque</button>
    <button class="btn" id="btn-import-lib">📂 Importer</button>
    <input type="file" id="file-input-lib" accept=".json" style="display:none">
  </div>
</div>
<main>
  <div class="stats" id="lib-stats"></div>
  <div id="add-doc-form-container"></div>
  <div id="library"></div>
</main>
</div><!-- /view-library -->

<script>
let QUESTIONS = [];

// Determine global priority per question (from scorecard notes)
function priorityOf(q) {
  if (q.scorecard_notes.some(n => n.includes("ÉLEVÉE") || n.includes("PRIORITÉ ÉLEVÉE"))) return "haute";
  if (q.scorecard_notes.some(n => n.includes("🟠"))) return "moyenne";
  if (q.scorecard_notes.length > 0) return "faible";
  return "ok";
}
const PRIORITY_LABEL = {
  haute: "🔴 Priorité haute",
  moyenne: "🟠 Priorité moyenne",
  faible: "🟡 Priorité faible",
  ok: "🟢 Pas d'amélioration identifiée"
};

const THEME_CLASS = {
  "Général": "théme-général",
  "Environnement": "theme-environnement",
  "Social et Droits Humains": "theme-social",
  "Éthique": "theme-éthique",
  "Achats Responsables": "theme-achats",
};
function themeClass(t) {
  if (t === "Général") return "theme-général";
  if (t === "Environnement") return "theme-environnement";
  if (t === "Social et Droits Humains") return "theme-social";
  if (t === "Éthique") return "theme-éthique";
  if (t === "Achats Responsables") return "theme-achats";
  return "theme-général";
}

// LocalStorage helpers
const STORAGE_KEY = "ecovadis_2026_annotations";
function loadAnnotations() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveAnnotations(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
let annotations = loadAnnotations();

function getAnn(code, key, defaultVal = "") {
  return (annotations[code] && annotations[code][key]) || defaultVal;
}
function setAnn(code, key, val) {
  if (!annotations[code]) annotations[code] = {};
  annotations[code][key] = val;
  saveAnnotations(annotations);
  updateStats();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function renderQuestion(q) {
  const prio = priorityOf(q);
  const tcls = themeClass(q.theme);
  const docId = `q-${q.code}`;
  
  let docsHtml = q.docs.length === 0
    ? '<div class="empty-msg">Aucun document attaché actuellement</div>'
    : '<div class="docs-list">' + q.docs.map((d, i) => {
        const ann = getAnn(q.code, `doc_${i}`, "à confirmer");
        return `
        <div class="doc-item">
          <div class="doc-name">${escapeHtml(d.name)}</div>
          <div class="doc-meta">
            Type : ${escapeHtml(d.type)}${d.pages ? ` · Pages : ${escapeHtml(d.pages)}` : ''}
          </div>
          ${d.comment ? `<div class="doc-comment">💬 ${escapeHtml(d.comment)}</div>` : ''}
          <div class="doc-status-bar">
            <label style="font-size:0.78rem; color:var(--c-muted);">Statut 2026 :</label>
            <select onchange="setAnn('${q.code}', 'doc_${i}', this.value); this.style.background = STATUS_BG[this.value] || 'white';">
              ${['à confirmer', '🟢 OK reconduire', '🟡 mettre à jour', '⚫ obsolète remplacer', '🔴 ne couvre pas'].map(s =>
                `<option value="${s}" ${ann === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </div>
        </div>`;
      }).join('') + '</div>';
  
  let scorecardHtml = q.scorecard_notes.length === 0
    ? ''
    : `<div class="section-block">
        <div class="section-title">📊 Axes d'amélioration (scorecard 2024)</div>
        <div class="scorecard-notes">
          ${q.scorecard_notes.map(n => `<div class="scorecard-note ${n.includes('ÉLEVÉE') || n.includes('🔴') ? 'priority-haute' : ''}">${escapeHtml(n)}</div>`).join('')}
        </div>
      </div>`;
  
  return `
  <div class="question-card" data-theme="${escapeHtml(q.theme)}" data-priority="${prio}" id="${docId}">
    <div class="q-header">
      <div class="q-meta">
        <span class="q-code">${q.code}</span>
        <span class="theme-tag ${tcls}">${escapeHtml(q.theme)}</span>
        <span class="section-tag">${escapeHtml(q.section)} · ${escapeHtml(q.section_label)}</span>
        <span class="priority-badge priority-${prio}">${PRIORITY_LABEL[prio]}</span>
      </div>
    </div>
    <div class="q-body">
      <div class="q-text">${escapeHtml(q.question)}</div>
      
      <div class="section-block">
        <div class="section-title">📎 Documents actuellement attachés (${q.docs.length})</div>
        ${docsHtml}
      </div>
      
      ${scorecardHtml}
      
      <div class="annotation">
        <div class="annotation-title">📝 Notes équipe — préparation 2026</div>
        <div class="annotation-row">
          <label>Documents existants à fournir :</label>
          <textarea oninput="setAnn('${q.code}', 'existing_docs', this.value)" placeholder="ex: politique sociale 2024, livret S&S à jour...">${escapeHtml(getAnn(q.code, 'existing_docs'))}</textarea>
        </div>
        <div class="annotation-row">
          <label>Nouveaux docs à créer :</label>
          <textarea oninput="setAnn('${q.code}', 'new_docs', this.value)" placeholder="ex: évaluation risques corruption, grille fournisseurs...">${escapeHtml(getAnn(q.code, 'new_docs'))}</textarea>
        </div>
        <div class="annotation-row">
          <label>Responsable :</label>
          <input type="text" oninput="setAnn('${q.code}', 'owner', this.value)" placeholder="ex: Benoit, RH, Direction..." value="${escapeHtml(getAnn(q.code, 'owner'))}">
        </div>
        <div class="annotation-row">
          <label>Statut global :</label>
          <select onchange="setAnn('${q.code}', 'status', this.value)">
            ${['☐ à traiter', '🟡 en cours', '🟢 prêt 2026', '🔴 bloqué'].map(s => {
              const cur = getAnn(q.code, 'status', '☐ à traiter');
              return `<option value="${s}" ${cur === s ? 'selected' : ''}>${s}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="annotation-row">
          <label>Notes libres :</label>
          <textarea oninput="setAnn('${q.code}', 'notes', this.value)" placeholder="commentaires équipe...">${escapeHtml(getAnn(q.code, 'notes'))}</textarea>
        </div>
      </div>
      
      <details>
        <summary>📄 Voir le contenu brut du questionnaire pour cette question</summary>
        <pre class="raw">${escapeHtml(q.raw)}</pre>
      </details>
    </div>
  </div>
  `;
}

const STATUS_BG = {
  '🟢 OK reconduire': '#e8f5e9',
  '🟡 mettre à jour': '#fff8e1',
  '⚫ obsolète remplacer': '#eceff1',
  '🔴 ne couvre pas': '#ffebee',
};

function render() {
  document.getElementById('questions').innerHTML = QUESTIONS.map(renderQuestion).join('');
  updateStats();
}

function updateStats() {
  const total = QUESTIONS.length;
  const totalDocs = QUESTIONS.reduce((s, q) => s + q.docs.length, 0);
  const haute = QUESTIONS.filter(q => priorityOf(q) === "haute").length;
  const moyenne = QUESTIONS.filter(q => priorityOf(q) === "moyenne").length;
  const treated = QUESTIONS.filter(q => {
    const s = getAnn(q.code, 'status', '☐ à traiter');
    return s === '🟢 prêt 2026';
  }).length;
  const inprog = QUESTIONS.filter(q => getAnn(q.code, 'status') === '🟡 en cours').length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Questions</div></div>
    <div class="stat-card"><div class="num">${totalDocs}</div><div class="lbl">Doc. rattachements</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-danger)">${haute}</div><div class="lbl">🔴 Priorité haute</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-warning)">${moyenne}</div><div class="lbl">🟠 Priorité moyenne</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-warning)">${inprog}</div><div class="lbl">🟡 En cours</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-success)">${treated}/${total}</div><div class="lbl">🟢 Prêtes 2026</div></div>
  `;
}

// Filters
const filters = { theme: 'all', priority: 'all' };
function applyFilters() {
  document.querySelectorAll('.question-card').forEach(card => {
    const t = card.dataset.theme;
    const p = card.dataset.priority;
    const themeOk = filters.theme === 'all' || t === filters.theme;
    const prioOk = filters.priority === 'all' || p === filters.priority;
    card.classList.toggle('hidden', !(themeOk && prioOk));
  });
}
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    document.querySelectorAll(`.filter-btn[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters[f] = btn.dataset.value;
    applyFilters();
  });
});

// Export / Import
document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(annotations, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ecovadis-2026-annotations-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      annotations = JSON.parse(ev.target.result);
      saveAnnotations(annotations);
      render();
      alert('Annotations importées avec succès');
    } catch (err) { alert('Erreur : ' + err.message); }
  };
  reader.readAsText(file);
});

document.getElementById('btn-print').addEventListener('click', () => window.print());

// ====================================================================
// LIBRARY VIEW
// ====================================================================

const LIB_STORAGE_KEY = "ecovadis_2026_library";

// Doc type → validity duration in years (per EcoVadis methodology)
const VALIDITY_YEARS = {
  politique: 8,
  action: 8,
  reporting: 2,
  audit: 2,
  certificat: 3,
  adhesion: 99,
  autre: 8,
};

// Heuristic: guess type from EcoVadis "type" field of a doc
function guessType(rawType, name) {
  const s = ((rawType || '') + ' ' + (name || '')).toLowerCase();
  if (s.includes('politique') || s.includes('code') || s.includes('charte') || s.includes('lettre d\'engagement')) return 'politique';
  if (s.includes('rapport annuel') || s.includes('rapport rse') || s.includes('rse')) return 'reporting';
  if (s.includes('certificat') || s.includes('iso')) return 'certificat';
  if (s.includes('audit')) return 'audit';
  if (s.includes('adhésion') || s.includes('adhesion')) return 'adhesion';
  if (s.includes('kpi') || s.includes('bilan') || s.includes('reporting')) return 'reporting';
  return 'action';
}

// Build initial library from QUESTIONS data
function buildInitialLibrary() {
  const docMap = new Map();
  for (const q of QUESTIONS) {
    for (const d of q.docs) {
      const key = d.name.trim();
      if (!docMap.has(key)) {
        docMap.set(key, {
          id: 'doc_' + key.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40),
          name: key,
          ecovadis_type: d.type || '',
          guessed_type: guessType(d.type, d.name),
          publication_date: '',  // user fills
          questions: [],
          comment: '',
          status: '☐ à confirmer',
          location: '',  // chemin local fichier
        });
      }
      const doc = docMap.get(key);
      doc.questions.push({
        code: q.code,
        theme: q.theme,
        pages: d.pages || '',
        question_comment: d.comment || ''
      });
    }
  }
  return Array.from(docMap.values());
}

function loadLibrary() {
  try {
    const stored = JSON.parse(localStorage.getItem(LIB_STORAGE_KEY));
    if (stored && Array.isArray(stored) && stored.length > 0) return stored;
  } catch {}
  return buildInitialLibrary();
}
function saveLibrary(data) {
  localStorage.setItem(LIB_STORAGE_KEY, JSON.stringify(data));
}
let library = loadLibrary();

function setDocField(docId, field, value) {
  const doc = library.find(d => d.id === docId);
  if (!doc) return;
  doc[field] = value;
  saveLibrary(library);
  // Re-render only this card to update validity
  if (field === 'publication_date' || field === 'guessed_type') {
    const card = document.getElementById(docId);
    if (card) card.outerHTML = renderDocCard(doc);
  }
  updateLibStats();
}

// Compute validity status from publication_date + type
function computeValidity(doc) {
  if (!doc.publication_date) return { status: 'unknown', label: '⚪ Date inconnue', expiry: null };
  const pub = new Date(doc.publication_date);
  if (isNaN(pub)) return { status: 'unknown', label: '⚪ Date invalide', expiry: null };
  const years = VALIDITY_YEARS[doc.guessed_type] || 8;
  const expiry = new Date(pub);
  expiry.setFullYear(expiry.getFullYear() + years);
  const now = new Date();
  const monthsLeft = (expiry - now) / (1000 * 60 * 60 * 24 * 30);
  const expiryStr = expiry.toISOString().slice(0, 10);
  if (monthsLeft < 0) return { status: 'expired', label: `🔴 Expiré le ${expiryStr}`, expiry: expiryStr };
  if (monthsLeft < 6) return { status: 'warning', label: `🟡 Expire le ${expiryStr}`, expiry: expiryStr };
  return { status: 'valid', label: `🟢 Valide jusqu'au ${expiryStr}`, expiry: expiryStr };
}

function renderDocCard(doc) {
  const validity = computeValidity(doc);
  const typeLabel = {
    politique: 'Politique (8 ans)',
    action: 'Action (8 ans)',
    reporting: 'Reporting/KPI (2 ans)',
    certificat: 'Certificat (3 ans)',
    adhesion: 'Adhésion',
    audit: 'Audit RSE (2 ans)',
    autre: 'Autre'
  };
  // For each rattachement, look up the question text
  const questionsHtml = doc.questions.length === 0
    ? '<div class="empty-msg">Pas encore rattaché à une question</div>'
    : doc.questions.map(qa => {
        const fullQ = QUESTIONS.find(qq => qq.code === qa.code);
        const qShort = fullQ ? (fullQ.question.length > 130 ? fullQ.question.slice(0, 130) + '…' : fullQ.question) : '';
        const why = qa.question_comment && qa.question_comment.trim()
          ? `<div class="rattach-why">💡 <strong>Justification</strong> : ${escapeHtml(qa.question_comment)}</div>`
          : `<div class="rattach-why-empty">⚠️ Pas de justification renseignée — à clarifier pour 2026</div>`;
        return `
          <div class="rattachement-row">
            <a class="rattach-code" href="javascript:void(0)" onclick="goToQuestion('${qa.code}')" title="Aller à la question">${qa.code}</a>
            <div class="rattach-info">
              <div class="rattach-question">${escapeHtml(qShort)}</div>
              ${qa.pages ? `<span class="rattach-pages">📄 Pages : ${escapeHtml(qa.pages)}</span>` : ''}
              <span class="section-tag">${escapeHtml(qa.theme)}</span>
              ${why}
            </div>
          </div>
        `;
      }).join('');

  return `
  <div class="doc-card ${validity.status}" data-type="${doc.guessed_type}" data-validity="${validity.status}" id="${doc.id}">
    <div class="doc-card-header">
      <div>
        <h3>${escapeHtml(doc.name)}</h3>
        <div class="doc-tags">
          <span class="doc-tag type-${doc.guessed_type}">${typeLabel[doc.guessed_type] || doc.guessed_type}</span>
          ${doc.ecovadis_type ? `<span class="section-tag">EcoVadis : ${escapeHtml(doc.ecovadis_type)}</span>` : ''}
        </div>
      </div>
      <span class="validity-badge ${validity.status}">${validity.label}</span>
    </div>
    <div class="doc-card-body">
      <div class="doc-fields">
        <div class="doc-field">
          <label>Type EcoVadis</label>
          <select onchange="setDocField('${doc.id}', 'guessed_type', this.value)">
            ${Object.entries(typeLabel).map(([k, v]) =>
              `<option value="${k}" ${doc.guessed_type === k ? 'selected' : ''}>${v}</option>`
            ).join('')}
          </select>
        </div>
        <div class="doc-field">
          <label>Date de parution</label>
          <input type="date" value="${escapeHtml(doc.publication_date)}" oninput="setDocField('${doc.id}', 'publication_date', this.value)">
        </div>
        <div class="doc-field">
          <label>Date d'expiration</label>
          <div class="computed">${validity.expiry || '—'}</div>
        </div>
        <div class="doc-field">
          <label>Statut 2026</label>
          <select onchange="setDocField('${doc.id}', 'status', this.value)">
            ${['☐ à confirmer','🟢 OK reconduire','🟡 mettre à jour','⚫ obsolète remplacer','🔴 ne couvre pas','🆕 nouveau doc à produire'].map(s =>
              `<option value="${s}" ${doc.status === s ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </div>
        <div class="doc-field" style="grid-column: span 2;">
          <label>Chemin / fichier (optionnel)</label>
          <input type="text" value="${escapeHtml(doc.location)}" oninput="setDocField('${doc.id}', 'location', this.value)" placeholder="ex: 03-social-droits-humains/politiques/politique-sociale-2025.pdf">
        </div>
        <div class="doc-field" style="grid-column: 1 / -1;">
          <label>Commentaire</label>
          <input type="text" value="${escapeHtml(doc.comment)}" oninput="setDocField('${doc.id}', 'comment', this.value)" placeholder="notes...">
        </div>
      </div>
      <div class="doc-questions-list">
        <div class="label">📎 Rattaché à ${doc.questions.length} question${doc.questions.length > 1 ? 's' : ''}</div>
        ${questionsHtml}
      </div>
      <div class="doc-actions">
        <button class="btn btn-danger" onclick="deleteDoc('${doc.id}')">🗑️ Supprimer</button>
      </div>
    </div>
  </div>
  `;
}

function deleteDoc(docId) {
  if (!confirm('Supprimer ce document de la bibliothèque ?')) return;
  library = library.filter(d => d.id !== docId);
  saveLibrary(library);
  renderLibrary();
}

// Recommendations for new docs to produce in 2026 (derived from scorecard gaps)
const RECOMMENDED_NEW_DOCS = [
  {name: "Évaluation des risques sécurité de l'information 2026", type: "action", priority: "haute", forQ: ["FBP600"], why: "Scorecard 2024 — Priorité ÉLEVÉE : absence de preuve d'évaluation des risques sec. info"},
  {name: "Évaluation des risques de corruption 2026", type: "action", priority: "haute", forQ: ["FBP600"], why: "Scorecard 2024 — Priorité ÉLEVÉE : absence de preuve d'évaluation des risques corruption"},
  {name: "Grille d'évaluation RSE fournisseurs 2026", type: "action", priority: "moyenne", forQ: ["SUP305", "SUP320"], why: "Scorecard 2024 — Absence d'évaluation des fournisseurs sur pratiques env/sociales"},
  {name: "Plan de formation acheteurs RSE 2026", type: "action", priority: "moyenne", forQ: ["SUP100", "SUP305"], why: "Scorecard 2024 — Absence de formation acheteurs sur questions RSE chaîne d'appro"},
  {name: "Protocole d'audit fournisseurs sur site 2026", type: "action", priority: "moyenne", forQ: ["SUP305"], why: "Scorecard 2024 — Absence d'audits sur site fournisseurs"},
  {name: "Évaluation des risques RSE chaîne d'approvisionnement", type: "action", priority: "moyenne", forQ: ["SUP100"], why: "Scorecard 2024 — Absence d'évaluation des risques RSE chaîne d'appro"},
  {name: "Bilan carbone 2025 finalisé (Scopes 1, 2, 3)", type: "reporting", priority: "faible", forQ: ["ENV630", "ENV640", "ENV697", "SUP600"], why: "Scorecard 2024 — Bilan carbone provisoire à finaliser, Scope 1/2/3 manquants"},
  {name: "KPI énergie/GES 2024-2025", type: "reporting", priority: "faible", forQ: ["ENV697"], why: "Scorecard 2024 — Reporting énergie renouvelable consommée manquant"},
  {name: "KPI déchets dangereux 2024-2025", type: "reporting", priority: "faible", forQ: ["ENV640"], why: "Scorecard 2024 — Reporting poids total déchets dangereux manquant"},
  {name: "KPI santé/sécurité intérimaires 2024-2025", type: "reporting", priority: "faible", forQ: ["LAB601"], why: "Scorecard 2024 — Absence de reporting indicateurs S&S pour intérimaires (cœur de métier !)"},
  {name: "Politique no-recruitment-fee", type: "politique", priority: "faible", forQ: ["LAB100"], why: "Scorecard 2024 — Déclaration ambiguë sur frais de recrutement candidats — clarifier"},
  {name: "Procédure d'alerte corruption renforcée", type: "action", priority: "faible", forQ: ["FBP600"], why: "Scorecard 2024 — Procédure d'alerte corruption à renforcer"},
  {name: "Due diligence tiers anti-corruption", type: "action", priority: "faible", forQ: ["FBP600"], why: "Scorecard 2024 — Devoir de vigilance tiers anti-corruption manquant"},
  {name: "Audit contrôles anti-corruption 2025", type: "audit", priority: "faible", forQ: ["FBP600"], why: "Scorecard 2024 — Audits procédures de contrôle anti-corruption manquants"},
  {name: "Rapport RSE 2025-2026 (refonte annuelle)", type: "reporting", priority: "haute", forQ: ["GEN300", "GEN600", "GEN703", "LAB100", "LAB601", "ENV300", "ENV313", "ENV630", "ENV640", "ENV697", "FBP600", "SUP100", "SUP305", "SUP320", "SUP600"], why: "Document maître référencé 59 fois — refonte annuelle obligatoire"},
];

function renderRecommendations() {
  // Filter out recommendations already added to library
  const libNamesNorm = library.map(d => d.name.toLowerCase().replace(/\s+/g,' ').trim());
  const todo = RECOMMENDED_NEW_DOCS.filter(r => !libNamesNorm.some(n => n.includes(r.name.toLowerCase().slice(0,30))));
  if (todo.length === 0) return '';
  return `
    <div class="recommended-panel">
      <h2>🎯 Documents recommandés à produire pour 2026 (${todo.length})</h2>
      <p style="font-size:0.85rem; color:var(--c-muted); margin:0 0 12px 0;">
        Basé sur les axes d'amélioration de la fiche d'évaluation 2024. Cliquez "Ajouter à la bibliothèque" pour suivre la production.
      </p>
      ${todo.map(r => `
        <div class="recommendation priority-${r.priority}">
          <strong>${escapeHtml(r.name)}</strong>
          <span class="doc-tag type-${r.type}" style="margin-left:8px;">${escapeHtml(r.type)}</span>
          <span class="priority-badge priority-${r.priority}" style="margin-left:6px;">${r.priority === 'haute' ? '🔴 Haute' : r.priority === 'moyenne' ? '🟠 Moyenne' : '🟡 Faible'}</span>
          <div style="margin-top:6px; font-size:0.85rem;">${escapeHtml(r.why)}</div>
          <div class="for-q">📎 Pour : ${r.forQ.map(c => `<a href="javascript:void(0)" onclick="goToQuestion('${c}')" class="doc-q-chip">${c}</a>`).join(' ')}</div>
          <button class="add-this-btn" onclick="addRecommendedDocByIdx(${RECOMMENDED_NEW_DOCS.indexOf(r)})">➕ Ajouter à la bibliothèque</button>
        </div>
      `).join('')}
    </div>
  `;
}

function addRecommendedDocByIdx(idx) {
  const r = RECOMMENDED_NEW_DOCS[idx];
  if (!r) return;
  const newDoc = {
    id: 'doc_rec_' + r.name.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40) + '_' + Date.now(),
    name: r.name,
    ecovadis_type: '',
    guessed_type: r.type,
    publication_date: '',
    questions: r.forQ.map(c => {
      const q = QUESTIONS.find(qq => qq.code === c);
      return { code: c, theme: q ? q.theme : '', pages: '', question_comment: r.why };
    }),
    comment: r.why,
    status: '🆕 nouveau doc à produire',
    location: '',
  };
  library.push(newDoc);
  saveLibrary(library);
  renderLibrary();
}

// Cross-tab navigation (replaces #anchor hrefs that trigger file:// security warnings)
function goToQuestion(code) {
  switchTab('questions');
  setTimeout(() => {
    const el = document.getElementById('q-' + code);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

function renderLibrary() {
  document.getElementById('library').innerHTML = renderRecommendations() + library.map(renderDocCard).join('');
  updateLibStats();
}

function updateLibStats() {
  const total = library.length;
  const valid = library.filter(d => computeValidity(d).status === 'valid').length;
  const warning = library.filter(d => computeValidity(d).status === 'warning').length;
  const expired = library.filter(d => computeValidity(d).status === 'expired').length;
  const unknown = library.filter(d => computeValidity(d).status === 'unknown').length;
  const filled = library.filter(d => d.publication_date).length;
  document.getElementById('lib-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Documents</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-success)">${valid}</div><div class="lbl">🟢 Valides</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-warning)">${warning}</div><div class="lbl">🟡 Bientôt expirés</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-danger)">${expired}</div><div class="lbl">🔴 Expirés</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-muted)">${unknown}</div><div class="lbl">⚪ Date à saisir</div></div>
    <div class="stat-card"><div class="num">${filled}/${total}</div><div class="lbl">Dates renseignées</div></div>
  `;
}

// Library filters
const libFilters = { type: 'all', validity: 'all' };
function applyLibFilters() {
  document.querySelectorAll('.doc-card').forEach(card => {
    const t = card.dataset.type;
    const v = card.dataset.validity;
    const typeOk = libFilters.type === 'all' || t === libFilters.type;
    const valOk = libFilters.validity === 'all' || v === libFilters.validity;
    card.classList.toggle('hidden', !(typeOk && valOk));
  });
}
document.querySelectorAll('.filter-btn[data-filter-lib]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filterLib;
    document.querySelectorAll(`.filter-btn[data-filter-lib="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    libFilters[f] = btn.dataset.value;
    applyLibFilters();
  });
});

// Add new doc
document.getElementById('btn-add-doc').addEventListener('click', () => {
  const container = document.getElementById('add-doc-form-container');
  if (container.innerHTML) { container.innerHTML = ''; return; }
  container.innerHTML = `
    <div class="add-doc-form">
      <h3>➕ Ajouter un nouveau document</h3>
      <div class="doc-fields">
        <div class="doc-field">
          <label>Nom</label>
          <input type="text" id="new-doc-name" placeholder="ex: Évaluation risques corruption 2026">
        </div>
        <div class="doc-field">
          <label>Type</label>
          <select id="new-doc-type">
            <option value="politique">Politique (8 ans)</option>
            <option value="action" selected>Action (8 ans)</option>
            <option value="reporting">Reporting/KPI (2 ans)</option>
            <option value="certificat">Certificat (3 ans)</option>
            <option value="adhesion">Adhésion</option>
            <option value="audit">Audit RSE (2 ans)</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="doc-field">
          <label>Date de parution</label>
          <input type="date" id="new-doc-date">
        </div>
        <div class="doc-field">
          <label>Statut</label>
          <select id="new-doc-status">
            <option value="🆕 nouveau doc à produire" selected>🆕 nouveau doc à produire</option>
            <option value="☐ à confirmer">☐ à confirmer</option>
            <option value="🟢 OK reconduire">🟢 OK reconduire</option>
            <option value="🟡 mettre à jour">🟡 mettre à jour</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary" onclick="addNewDoc()">Créer</button>
        <button class="btn" onclick="document.getElementById('add-doc-form-container').innerHTML=''">Annuler</button>
      </div>
    </div>
  `;
});

function addNewDoc() {
  const name = document.getElementById('new-doc-name').value.trim();
  if (!name) { alert('Nom requis'); return; }
  const newDoc = {
    id: 'doc_' + name.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40) + '_' + Date.now(),
    name: name,
    ecovadis_type: '',
    guessed_type: document.getElementById('new-doc-type').value,
    publication_date: document.getElementById('new-doc-date').value,
    questions: [],
    comment: '',
    status: document.getElementById('new-doc-status').value,
    location: '',
  };
  library.push(newDoc);
  saveLibrary(library);
  document.getElementById('add-doc-form-container').innerHTML = '';
  renderLibrary();
}

// Export / Import library
document.getElementById('btn-export-lib').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(library, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ecovadis-2026-bibliotheque-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('btn-import-lib').addEventListener('click', () => {
  document.getElementById('file-input-lib').click();
});
document.getElementById('file-input-lib').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      library = JSON.parse(ev.target.result);
      saveLibrary(library);
      renderLibrary();
      alert('Bibliothèque importée');
    } catch (err) { alert('Erreur : ' + err.message); }
  };
  reader.readAsText(file);
});

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'view-' + tab));
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Load QUESTIONS from external JSON, then render
async function loadAndRender() {
  try {
    const res = await fetch('_tools/questions-data.json');
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    QUESTIONS = await res.json();
    console.log('[ECORES] Loaded', QUESTIONS.length, 'questions');
    library = loadLibrary(); // re-init now that QUESTIONS is loaded
    render();
    renderLibrary();
    console.log('[ECORES] Rendered successfully');
  } catch (err) {
    console.error('[ECORES] Loader failed:', err);
    const errBox = document.createElement('div');
    errBox.style.cssText = 'background:#ffebee;border:2px solid #c62828;color:#b71c1c;padding:20px;margin:20px;border-radius:8px;font-family:monospace;white-space:pre-wrap;font-size:14px;';
    errBox.textContent = '⚠️ Erreur de chargement :\n\n' + err.name + ': ' + err.message + '\n\nStack:\n' + err.stack;
    (document.querySelector('main') || document.body).prepend(errBox);
  }
}
loadAndRender();
