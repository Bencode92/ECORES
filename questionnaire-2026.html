e recueille les commentaires de ses propres effectifs par le biais d’une enquête auprès de ses travailleurs\ngérée par un tiers. Les fournisseurs d’enquêtes auprès des travailleurs gérées par un tiers qui sont acceptables incluent Worker Voice d’EcoVadis et U-\nImpact d’Ulula ou tout autre outil répondant à l’ensemble des critères suivants :\n1. Plateforme tierce fournissant des données en temps réel pour une gestion proactive des risques\n2. Confidentialité des travailleurs qui répondent\n3. Accessibilité pour les travailleurs via plusieurs canaux ou langues\nL’enquête doit porter sur des questions pertinentes au travail, notamment, mais sans s’y limiter, l’accès au mécanisme de règlement des griefs, les\nmesures de protection en matière de santé et de sécurité, les heures de travail et les pratiques en matière d’heures supplémentaires.\nEnquête sur l’opinion des travailleurs gérée par un tiers\n\nSélectionnez cette option seulement si les actions couvrent les travailleurs intérimaires.\nExemples de documents à joindre\nEnquêtes de satisfaction des employés partagées avec les travailleurs intérimaires\nGrille salariale et/ou suivi de la rémunération des travailleurs intérimaires\nGuide sur les documents\nVotre document justificatif doit indiquer des actions mises en œuvre par votre entreprise pour garantir de bonnes conditions de travail à ses travailleurs\nintérimaires. Cela peut inclure un large éventail d’éléments, tels que les horaires de travail flexibles, la rémunération ou la couverture santé.\nActions liées aux conditions de travail des travailleurs intérimaires\nDocument joint\nManuel de l'employé : Questi…\nAutre\nRemplacer le document\nPages indiquées:\n2\nCommentaire:\nles salariés temporaires bénéficient des mêmes mesures avantageuses que les salariés permanents.\nDocument joint\nPolitique Sociale\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nune grande parti des intérimaires ont des contrats de travail prévu sur 2023 avec une augmentation\nmoyen de 15% des salaires du a l'inflation\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nExemples de documents à joindre :\nInstructions, manuel ou guides de travail\nMatériel de présentation ou de formation\nRapport annuel ou RSE\nGuide sur les documents\nVotre document devrait mentionner les actions menées par votre entreprise pour s’attaquer aux conditions de travail des employés que ne couvrent pas\nles options ci-dessus. Les preuves peuvent être liées aux heures de travail, aux rémunérations, aux avantages sociaux ou à d’autres actions qui, selon vous,\nne correspondent pas aux options spécifiques.\nVeuillez détailler l’action spécifique mise en œuvre.\nAutres actions pour garantir de bonnes conditions de travail qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\n\nComplète\nLAB341s\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour promouvoir la gestion de carrière et la formation des\nemployés ?\nExemples de documents à joindre :\nMatériel de formation tel que des diapositives de formation\nRapports d’avancement ou d’achèvement des formations\nFormulaires d’évaluation des formations avec le nom de la formation, sa description et la liste des participants\nVotre document justificatif doit démontrer ce qui suit : Formations offertes aux employés pour renforcer leurs connaissances et les compétences\npropres à leur travail ou à leur avancement professionnel. Les formations peuvent porter sur des sujets spécifiques au secteur d’activité ou au rôle et\npeuvent être dispensées à vos employés en personne (en externe ou sur le lieu de travail) ou en ligne.\nFormation de développement des compétences\nDocument joint\nbilan annuel compétences\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-11\nCommentaire:\nExemples de documents à joindre :\nFormulaires d’évaluation des performances des employés remplis\nLignes directrices à l’intention des responsables sur la manière de procéder à une évaluation annuelle\nInvitations à l’évaluation de la performance envoyées aux employés\nVotre document justificatif doit démontrer ce qui suit : Instructions ou processus opérationnel visant à évaluer et à examiner régulièrement le\nrendement au travail des employés sur le plan quantitatif et/ou qualitatif. L’évaluation régulière des performances individuelles permet à votre entreprise\nd’identifier les domaines à améliorer, de fournir un soutien et des conseils aux employés, et de mettre en lumière et récompenser les personnes\nperformantes.\nÉvaluation régulière de la performance individuelle\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n11\nCommentaire:\n\nExemples de documents à joindre :\nMatériel de communication (e-mails, notes de réunion, contacts entre responsable et employé au sujet de la carrière) concernant l’évolution de\ncarrière ou les aspirations professionnelles d’un employé\nListes de compétences sur lesquelles un employé peut travailler pour franchir les différents niveaux d’un parcours de carrière\nSection dédiée au développement de carrière dans l’évaluation annuelle\nVotre document justificatif doit démontrer ce qui suit : Discussion ou engagement entre le responsable et l’employé sur les voies que celui-ci peut\nemprunter pour développer ses forces et pallier ses faiblesses existantes afin d’augmenter ses chances d’évolution de carrière (au sein de l’entreprise ou\nen dehors).\nDiscussions formelles avec les employés sur leur développement de carrière\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n11\nCommentaire:\nExemples de documents à joindre :\nMatériel de communication ou documents de procédure concernant les promotions, les mutations ou les changements de rôle des employés\nRapports de mise en œuvre des programmes d’observation au poste de travail, des programmes internes de mentorat/parrainage, des\nprogrammes de rotation/échange de postes\nPreuves de pratiques de recrutement internes telles que les offres d’emploi internes, les annonces et les plates-formes de marché des talents\ninternes\nVotre document justificatif doit démontrer ce qui suit : Programme(s) spécifique(s) mis en œuvre par votre entreprise pour encourager la mobilité\ninterne des employés. La mobilité interne peut être verticale, horizontale, géographique ou transversale :\nLa mobilité verticale implique des promotions/transferts d’employés qui leur permettent d’accéder au niveau supérieur de l’organisation.\nLa mobilité horizontale implique que les employés changent de fonctions/départements, mais restent au même niveau d’emploi au sein de\nl’organisation.\nLa mobilité géographique implique le développement d’une activité sur un autre site/localisation au sein de l’organisation.\nLa mobilité transversale implique que les employés passent d’un rôle à l’autre ou d’une fonction à l’autre, en tirant parti de leurs compétences\ntransférables ou interfonctionnelles (le « cross-skilling »).\nActions pour promouvoir la mobilité interne\nSélectionnez cette option seulement si les actions couvrent les travailleurs intérimaires.\nExemples de documents à joindre\nMatériel de formation au développement des compétences à l’intention des travailleurs intérimaires\nÉvaluation de la performance destinée aux travailleurs intérimaires\nGuide sur les documents\nVos documents justificatifs doivent indiquer des actions, comme des programmes, des directives ou des évaluations spécifiques garantissant que les\ntravailleurs intérimaires bénéficient d’occasions de se former et de développer leur carrière.\nActions liées à la gestion de carrière et à la formation des travailleurs intérimaires\nDocument joint\nbilan annuel compétences\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-11\nCommentaire:\n\nPlease select this option only if the rest of the options listed do not apply.\nExamples of documents to attach:\nStandard operating procedures\nWork instructions\nAnnual/Sustainability Report\nYour supporting document should demonstrate the following: Actions other than those specified in the other options that benefit employees in their\nmain career stages, such as recruitment, evaluation, training, and management of layoffs.\nAutres actions pour encourager la gestion des carrières et la formation qui ne sont incluses nulle part ailleurs dans cette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\n\nComplète\nLAB3504\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour lutter contre le travail des enfants, le travail forcé et le\ntrafic d’êtres humains ?\nExemples de documents à joindre\nRapports sur l’évaluation de l’impact sur les droits humains\nRapports sur l’évaluation de l’impact social\nGuide sur les documents\nVotre document doit démontrer que des études d’impact ont été réalisées en interne ou par un tiers concernant le travail des enfants, le travail forcé et le\ntrafic d’êtres humains. Les études d’impact sur les droits humains font partie des éléments clés de la diligence raisonnable en matière de droits humains et\ns’avèrent essentielles pour identifier et évaluer tout impact négatif potentiel ou réel des activités de votre entreprise sur les droits humains de ses\nemployés. Votre document doit également démontrer l’identification des niveaux de gravité de cet impact particulier.\nIl convient de noter que si les évaluations des risques traditionnelles estiment les risques du point de vue de l’entreprise, les études d’impact sur les droits\nhumains prennent en considération les risques et les impacts négatifs pour les parties prenantes concernées, à savoir, dans ce cas, vos employés.\nAnalyse d’impact identifiant les risques potentiels de travail des enfants, de travail forcé ou de trafic d’êtres humains\nExemples de documents à joindre\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nGuide sur les documents\nVotre document doit démontrer que votre entreprise dispense des formations à ses employés pour renforcer leurs connaissances sur les questions de\ntravail des enfants, de travail forcé et de trafic d’êtres humains.\nVotre document doit indiquer de façon claire que les formations comprennent des sujets relatifs aux droits humains. Les références générales à l’éthique\ndes affaires seraient considérées comme relevant du thème « Éthique ».\nFormation des employés sur le travail des enfants, le travail forcé et le trafic d’êtres humains\nExemples de documents à joindre - Manuel des RH - Procédure d’embauche\nGuide sur les documents\nVotre document doit attester des actions mises en place pour empêcher l’embauche de travailleurs mineurs.\nSelon l’Organisation internationale du Travail, un « jeune travailleur » est une personne âgée de moins de 18 ans, mais qui a atteint l’âge minimum légal\npour travailler – en général 15 ans (13 ou 14 ans dans certaines régions).\nLorsque de telles mesures d’atténuation sont déjà imposées par votre gouvernement (local), veuillez télécharger les documents qui démontrent que votre\nentreprise veille à ce que ses effectifs soient au courant de ces mesures.\nVérification de l’âge des candidats avant l’embauche\nDocument joint\nRapport audit RGPD et lutte c…\nAutre\nRemplacer le document\nPages indiquées:\n2\nCommentaire:\nProcédure lors du premier entretien pour la sélection : La carte d’identité pour vérification\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n9\nCommentaire:\nNous nous engageons contre le travail des enfants, le travail forcé et la discrimination…La liberté de\nparole et de choix guide nos actions au quotidien. Travail des enfants et travail forcé (ex. Contrôle de\nl'identité au recrutement) Nos activés se situant uniquement en France n'est pas exposé au travail des\nenfants ni au travail forcé.\n\nExemples de documents à joindre\nRapport sur la diligence raisonnable\nÉvaluation des risques liés aux droits humains des clients\nGuide sur les documents\nVotre document doit présenter les procédures opérationnelles décrivant le processus de diligence raisonnable client, ou le résultat de la diligence\nraisonnable client effectuée, afin d’offrir une meilleure compréhension de l’activité client et de prévenir les risques de placement dans des sociétés\nd’exploitation.\nDiligence raisonnable effectuée auprès des clients pour empêcher les placements dans des entreprises responsables d'exploitation\nExemples de documents à joindre\nContrats de travail\nGuide des collaborateurs\nManuel des RH\nGuide sur les documents\nVotre document doit démontrer la mise à la disposition des travailleurs placés d’informations documentées sur leurs conditions générales d’emploi,\nformulées dans des termes compréhensibles pour eux. Il doit y être question du temps de travail, des salaires, des heures supplémentaires, des congés,\nde la rémunération et des avantages sociaux ou de toute autre condition d’emploi pertinente.\nContrat écrit fourni aux candidats placés\nDocument joint\nRapport audit RGPD et lutte c…\nAutre\nRemplacer le document\nPages indiquées:\n8-9\nCommentaire:\nANNEXE 3 Copie de la mention sur les contrats de travail\nDocument joint\ncontrat2023\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\n\nExemples de documents à joindre\nProcédures d’intégration des employés\nManuel des procédures RH\nGuide sur les documents\nVotre document doit présenter les processus mis en place pour garantir que les employés ne sont jamais obligés de se séparer de leurs justificatifs\nd’identité. Si cela s’avère néanmoins nécessaire, votre document doit faire état des processus mis en place pour garantir que les justificatifs d’identité de\nvos employés ne sont pas conservés et que ces derniers disposent de moyens pour les stocker en toute sécurité.\nLorsque de telles mesures d’atténuation sont déjà imposées par votre gouvernement (local), veuillez télécharger les documents qui démontrent que votre\nentreprise veille à ce que ses employés soient au courant de ces mesures.\nProcessus pour empêcher la conservation des documents d’identité des employés\nDocument joint\nRapport audit RGPD et lutte c…\nAutre\nRemplacer le document\nPages indiquées:\n2-4,6\nCommentaire:\nPersonnes n’ayant pas été recrutées et conservation des données, Personnes recrutées et conservation\ndes données. La société ne fait pas de copie de la carte d’identité sauf pour les étrangers (conservation\nobligatoire). Un espace personnel et sécurisé pour chaque salarié existe grâce au logiciel\nPLD/ARMADO, décrit en point 4.\nExemples de documents à joindre\nRapport de suivi\nProcédures ou rapports d’audit interne ou externe\nGuide sur les documents\nVotre document doit démontrer le suivi des contrôles internes effectués afin d’atténuer les violations des droits humains.\nLes entreprises doivent contrôler régulièrement l’efficacité des mesures mises en œuvre pour atténuer les risques liés au travail des enfants, au travail\nforcé et au trafic d’êtres humains, notamment par le biais d’audits périodiques. Ces derniers peuvent être internes ou externes.\nIl convient cependant de noter qu’un audit RSE externe réalisé par un tiers (SMETA, RBA, etc.) ne s’inscrit pas dans le cadre de cet indicateur et relève de la\nsection « Général » du questionnaire.\nSuivi des contrôles internes et de l’efficacité des actions mises en place pour prévenir le travail des enfants, le travail forcé ou le trafic\nd’êtres humains\nDocument joint\nRapport audit RGPD et lutte c…\nAutre\nRemplacer le document\nPages indiquées:\n1-9\nCommentaire:\nUn audit a été réalisé par le commissaire aux comptes qui a vérifié notamment la procédure de\nrecrutement.\n\nExemples de documents à joindre\nCode de conduite\nGuide des collaborateurs\nProcédure de signalement relative au mécanisme de règlement des griefs\nGuide sur les documents\nVotre document doit démontrer l’existence d’un mécanisme établi permettant à différentes parties de signaler les problèmes liés au travail des enfants, au\ntravail forcé et au trafic d’êtres humains.\nLes mécanismes de règlement des griefs doivent afficher les caractéristiques suivantes : 1) Accessibilité : Toutes les parties prenantes doivent avoir\nconnaissance de l’existence d’un mécanisme de règlement des griefs. Cette information doit être disponible à tout moment, en particulier pour les\npersonnes susceptibles d’être confrontées à des obstacles (linguistiques ou géographiques) et pour les personnes appartenant à une minorité au sein de\nvos effectifs. 2) Absence de représailles : Les personnes qui signalent des griefs doivent être protégées et ne pas faire l’objet de représailles.\n3) Confidentialité : Des mesures doivent être mises en place afin de préserver la confidentialité des personnes qui ont recours au mécanisme de\nrèglement des griefs.\nMécanisme de réclamation sur le travail des enfants, le travail forcé ou le trafic d’êtres humains\nDocument joint\nDispositif de lanceur d'alerte …\nProcédure\nRemplacer le document\nPages indiquées:\n3\nCommentaire:\nLe dispositif d'alerte est en place et couvre également les incidents liés au travail des enfants, au travail\nforcé et au trafic.\nExemples de documents à joindre\nCode de conduite\nGuide des collaborateurs\nDocuments indépendants sur les procédures correctives\nGuide sur les documents\nVotre document doit présenter un processus opérationnel ou la preuve d’une démarche corrective visant à soutenir les victimes de travail des enfants ou\nde travail forcé. Une procédure corrective est un processus opérationnel, non judiciaire, qui aide à limiter les incidents liés au travail des enfants, au travail\nforcé ou au trafic d’êtres humains en contribuant à identifier et à réparer tout préjudice causé aux victimes.\nLes procédures correctives doivent afficher les caractéristiques suivantes : 1) Proportionnalité : Identification des réactions appropriées à la violation\n2) Transparence : Communication transparente avec les parties prenantes 3) Surveillance : Mesures visant à contrôler l’efficacité de la démarche\ncorrective engagée\nProcédure corrective pour les victimes identifiées du travail des enfants, du travail forcé ou du trafic d’êtres humains\nDocument joint\nDispositif de lanceur d'alerte …\nProcédure\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nDans le dispositif de lanceur d'alerte qui concerne également le travail des enfants/forcé/trafic, il est\ndécrit que Si les faits rapportés constituent des indices suffisants et concordants permettant de\ncaractériser une infraction, le dossier est instruit et le référent saisit les autorités compétentes pour le\ntraitement de l’infraction.\n\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nGuide sur les documents\nVotre document doit attester des actions distinctes de celles spécifiées dans les autres options pour prévenir le travail des enfants, le travail forcé et le\ntrafic d’êtres humains.\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nRapport annuel ou RSE\nAutres actions visant à aborder le travail des enfants, le travail forcé et/ou le trafic d’êtres humains qui ne sont incluses nulle part\nailleurs dans cette question\nEn cas 'incident lié au travail d'enfant détecté chez des fournisseurs Caméléon a mis en place différentes mesures et actions qu'ils pleuvent\nappliquer comme la sanction de ces fournisseurs ou la résiliation du contrat les liant\nVeuillez préciser\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n6\nCommentaire:\nAucune action pour le moment/Je ne sais pas\n\nComplète\nLAB3605\nImpact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour prévenir la discrimination et le harcèlement ?\nExemples de documents à joindre\nAudits internes sur les pratiques de recrutement\nPreuve de la mise en œuvre d’un système ou d’un logiciel de recrutement à l’aveugle (cela peut inclure l’anonymisation des noms des candidats et de\ntout autre facteur d’identification tel que l’âge, le genre, le lieu de résidence, etc.)\nInformations partagées publiquement sur les pratiques de recrutement de nature accessible et non discriminatoire\nExemples d’offres d’emploi internes ou externes utilisant un vocabulaire accessible ou non discriminatoire\nGuide sur les documents\nVotre document doit prouver l’existence d’un processus de recrutement ouvert, transparent et fondé sur le mérite qui empêche les pratiques d’embauche\ndiscriminatoires et garantit l’égalité des chances à tous les candidats à l’emploi (internes ou externes) qui participent au processus de sélection des\nemployés de l’entreprise.\nActions visant à prévenir la discrimination lors de la phase de recrutement (veuillez préciser)\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n14\nCommentaire:\nRecruter que sur les compétences, Refléter la diversité de la société, Promouvoir l'égalité des chances\ndevant l'emploi, faire de la gestion de la diversité un levier performance\nExemples de documents à joindre\nManuel des RH\nMatériel de formation à destination des RH ou des recruteurs\nGuide sur les documents\nVotre document doit démontrer les efforts déployés par votre entreprise pour offrir l’égalité des chances à tous ses employés dans ses pratiques de\npromotion et de développement professionnel. Il peut s’agir de formations ou d’instructions fournies au service des ressources humaines sur la prévention\nde la discrimination ou l’amélioration de l’accessibilité.\nActions visant à prévenir la discrimination dans le cadre des processus de promotion et de développement professionnel (veuillez\npréciser)\nCaméléons RH ne pratique pas la discrimination que ce soit dans le processus de recrutement ou celui de promotion\nVeuillez préciser\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n12\nCommentaire:\nACTIONS POUR PREVENIR LA DISCRIMINATION ET LE HARCELEMENT\n\nSélectionnez cette option seulement si les actions couvrent les travailleurs intérimaires.\nExemples de documents à joindre :\nAudits internes sur les pratiques de recrutement\nPreuve de la mise en œuvre d’un système ou d’un logiciel de recrutement à l’aveugle (cela peut inclure l’anonymisation des noms des candidats et de\ntout autre facteur d’identification tel que l’âge, le genre, le lieu de résidence, etc.)\nInformations partagées publiquement sur les pratiques de recrutement de nature accessible et non discriminatoire\nExemples d’offres d’emploi internes ou externes utilisant un vocabulaire accessible ou non discriminatoire\nGuide sur les documents\nVotre document doit prouver l’existence d’un processus de recrutement ouvert, transparent et fondé sur le mérite qui empêche les pratiques d’embauche\ndiscriminatoires à l’égard des travailleurs intérimaires et garantit l’égalité des chances à tous les candidats à l’emploi qui participent au processus de\nsélection de l’entreprise.\nActions visant à prévenir les discriminations à l’égard des travailleurs intérimaires lors de la phase de recrutement\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n14\nCommentaire:\nLes mêmes règles sur l'anti-discrimination s'applique aux employés temporaires comme permanents\nExamples of documents to attach\nProgram implementation records\nCommunication materials\nEmployee handbook\nDocument guidelines\nYour document should demonstrate specific measures to prevent and monitor harassment in the workplace that is separate to grievance mechanisms,\nremediation processes and training programs.\nExamples of expected actions:\nEstablishing an anti-harassment committee\nInternal audit or monitoring reports on harassment cases\nOpen dialogue initiatives on workplace harassment\nActions visant à prévenir le harcèlement au travail (veuillez préciser)\nVeuillez préciser\nExemples de documents à joindre\nGuide des collaborateurs\nDocuments montrant la mise en œuvre du programme\nGuide sur les documents\nVotre document doit attester des actions visant à permettre aux employés porteurs de divers handicaps de s’acquitter de leurs tâches, telles que la mise\nen place d’infrastructures accessibles ou de programmes de formation spécifiques pour l’adaptation psychologique.\nActions visant à promouvoir l’inclusion des employés en situation de handicap\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n12\nCommentaire:\nNous accompagnons les travailleurs handicapés dans les entreprises, en partenariat avec certain de\nnos clients qui ont une priorité de l'embauche des travailleurs handicapés.\n\nExemples de documents à joindre\nRapport sur l’écart salarial\nAudit sur les rémunérations ou l’écart salarial\nÉtude sur l’écart salarial\nRapports de suivi des rémunérations\nGuide sur les documents\nVotre document doit démontrer un suivi ou un audit des pratiques de rémunération pour identifier les inégalités salariales, une analyse des facteurs qui\ncontribuent à l’écart salarial et toutes vos autres mesures visant à éliminer l’écart salarial.\nActions visant à garantir un salaire égal pour un travail égal\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nNous suivons le pourcentage d'écart salarial de genre moyen non ajusté à des postes comparables\nExamples of documents to attach\nProgram implementation records\nCommunication materials\nEmployee handbook\nDocument guidelines\nYour document should demonstrate operational processes, programs or any other actions to promote an inclusive environment for all employees in the\nworkplace such as networking groups, mentoring programs, or any other specific initiative.\nActions visant à promouvoir l’égalité des chances pour tous sur le lieu de travail\nRecruter des seniors, c’est d’abord recruter des profils, des compétences sans discrimination d’âge. Réussir le recrutement de seniors et leur\nintégration dans l’entreprise suppose des méthodes adaptées et des actions spécifiques lors de l’intégration.\nVeuillez préciser\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n13\nCommentaire:\nExemples de documents à joindre\nMatériel de formation (diaporamas, résumés du contenu de la formation, etc.)\nPreuve de la réalisation de la formation (rapports d’avancement, certificats d’achèvement, etc.)\nGuide sur les documents\nVotre document doit démontrer que votre entreprise dispense des formations visant à permettre à tous les employés de s’épanouir sur leur lieu de travail\net à éviter tout environnement de travail hostile.\nFormation des employés à la lutte contre la discrimination et le harcèlement\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n12\nCommentaire:\nAvec le FASTT nous proposons des formations sur la non discrimination\n\nExemples de documents à joindre\nCode de conduite\nManuel ou guide des collaborateurs\nProcédure de signalement ou manuel relatifs au mécanisme de règlement des griefs\nPolitique anti-harcèlement\nGuide sur les documents\nVotre document doit démontrer l’existence d’un mécanisme établi permettant à différentes parties de signaler les problèmes de discrimination et de\nharcèlement.\nLes mécanismes de règlement des griefs doivent afficher les caractéristiques suivantes : 1) Accessibilité : Toutes les parties prenantes doivent avoir\nconnaissance de l’existence d’un mécanisme de règlement des griefs. Cette information doit être disponible à tout moment, en particulier pour les\npersonnes susceptibles d’être confrontées à des obstacles (linguistiques ou géographiques) et pour les personnes appartenant à une minorité au sein de\nvos effectifs. 2) Absence de représailles : Les personnes qui signalent des griefs doivent être protégées et ne pas faire l’objet de représailles.\n3) Confidentialité : Des mesures doivent être mises en place afin de préserver la confidentialité des personnes qui ont recours au mécanisme de\nrèglement des griefs.\nMécanisme de réclamation sur les questions de discrimination et de harcèlement\nDocument joint\nDispositif de lanceur d'alerte …\nProcédure\nRemplacer le document\nPages indiquées:\n3\nCommentaire:\nCe dispositif de lanceur d'alerte permet de signaler tout problèmes liés aux questions de\ndiscrimination et de harcèlement\nExemples de documents à joindre\nCode de conduite\nGuide des collaborateurs\nProcédure de signalement ou manuel relatifs au mécanisme de règlement des griefs\nPolitique anti-harcèlement\nGuide sur les documents\nVotre document doit présenter des procédures opérationnelles ou la preuve d’une démarche corrective visant à soutenir les victimes de discrimination ou\nde harcèlement. Une procédure corrective est un processus opérationnel, non judiciaire, qui aide à limiter les incidents liés à la discrimination et au\nharcèlement en contribuant à identifier et à réparer tout préjudice causé aux victimes.\nLes procédures correctives doivent afficher les caractéristiques suivantes : 1) Proportionnalité : Identification des réactions appropriées à la violation\n2) Transparence : Communication transparente avec les parties prenantes 3) Surveillance : Mesures visant à contrôler l’efficacité de la démarche\ncorrective engagée\nProcédure corrective pour les victimes identifiées de discrimination et de harcèlement\nDocument joint\nDispositif de lanceur d'alerte …\nProcédure\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nEn cas de victime identifiée le référent Caméléons saisit les autorités compétentes pour le traitement\nde l’infraction.\n\nIndicateur\nReporting\nImpact sur le score\nLe reporting repose sur des indicateurs de performance clés quantitatifs qui permettent de mesurer votre mise en œuvre des pratiques RSE.\nNous vous demanderons de joindre des documents comprenant vos indicateurs RSE. Un document de reporting valide comporte l’année de\nreporting et l’unité de reporting (comme les kWh ou les litres).\nAssurez-vous que la dernière période de reporting se situe au cours des deux dernières années calendaires.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nVeuillez sélectionner cette option si les autres options ne correspondent pas à votre situation. Veuillez décrire votre situation dans la zone de texte.\nGuide sur les documents\nVotre document doit attester des actions distinctes de celles spécifiées dans les autres options visant à prévenir la discrimination et le harcèlement sur le\nlieu de travail.\nExemples de documents à joindre\nProcédures opératoires standard\nInstructions de travail\nRapport annuel ou RSE\nAutres actions visant à prévenir la discrimination et le harcèlement sur le lieu de travail qui ne sont incluses nulle part ailleurs dans\ncette question\nVeuillez préciser\nAucune action pour le moment/Je ne sais pas\nObligatoire\nLAB1008\nVotre entreprise emploie-t-elle des jeunes travailleurs qui ont l’âge légal de travailler dans votre juridiction, mais qui sont\nâgés de moins de 18 ans ?\nOui\nNon\nJe ne sais pas\n\nComplète\nLAB6013\nImpact sur le score\nVeuillez déclarer les indicateurs suivants relatifs au social et aux droits humains :\nLes réponses à cette question seront affichées dans une section dédiée de votre plateforme EcoVadis : Indicateurs. Cet outil est utile pour stocker\ntoutes les données quantitatives pertinentes et surveiller vos progrès en matière de RSE.\nIl n'y a pas de document à joindre pour cette option. Les informations fournies doivent provenir de rapports publics ou internes de données consolidées\nsur le nombre d'heures travaillées comptabilisées sur une année de référence. Les heures travaillées sont définies comme la somme de toutes les périodes\nconsacrées à des activités directes et annexes pour produire des biens et des services. S'il n'est pas possible de calculer directement le nombre d'heures\ntravaillées, celui-ci peut être estimé en fonction du nombre normal ou standard d'heures de travail, en tenant compte des droits à des périodes d'absence\ndu travail payé (congés payés, congé de maladie avec rémunération, jours fériés, etc.).\nNombre d’heures travaillées\n91500\nValeur\nExemples de documents à joindre :\nRapport sur les maladies liées au travail\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au taux enregistré de maladie. Les maladies liées au travail peuvent comprendre des problèmes\nde santé aigus, récurrents et chroniques causés ou aggravés par les conditions ou les pratiques de travail. Elles incluent les troubles musculo-\nsquelettiques, les maladies liées au stress (y compris l’obésité et les maladies cardiaques) et les maladies psychologiques.\nCet indicateur s’applique aux employés directs (personnes qui ont une relation de travail directe avec votre entreprise).\nNombre de problèmes de santé liés au travail\n0\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n25\nCommentaire:\nAnnée\nAnnée\n\nExemples de documents à joindre :\nRapport interne sur les formations\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au nombre moyen d’heures durant lesquelles chaque employé est formé. Le terme « formation »\ndésigne tout type d’instruction ou de formation professionnelle et d’enseignement externe qui est partiellement ou intégralement pris en charge par\nl’entreprise.\nExemple de calcul Nombre moyen d'heures de formation par employé = nombre total d'heures de formation ÷ nombre total d'employés participant aux\nformations\nCet indicateur s’applique aux employés directs (personnes qui ont une relation de travail directe avec votre entreprise).\nNombre moyen d’heures de formation par employé\nheures par employé (H/employé(e))\n6.83\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nExemples de documents à joindre :\nRapport interne sur la diversité\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au pourcentage d’employés qui s’identifient comme des femmes au sein de l’entreprise.\nCet indicateur s’applique aux employés directs (personnes qui ont une relation de travail directe avec votre entreprise).\nPourcentage de femmes employées dans l'ensemble de l'organisation\npour cent (%)\n71\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nAnnée\nUnité\nAnnée\nUnité\n\nExemples de documents à joindre :\nRapport interne sur la diversité\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au pourcentage de travailleurs issus de groupes minoritaires ou vulnérables employés par\nl’entreprise.\nLe terme « groupes minoritaires » recouvre ici un large éventail de groupes, reprenant des caractéristiques telles que l’appartenance ethnique, la\nreligion, le handicap, l’identité de genre, etc.\nLes groupes vulnérables sont ceux qui ont une condition physique, sociale, politique ou économique particulière, ou des caractéristiques qui les\nexposent à un risque plus élevé de subir un fardeau (tels que les enfants et les jeunes, les personnes âgées, les personnes handicapées, les réfugiés,\netc).\nNous reconnaissons que, dans certains cas, la collecte de données sur les groupes minoritaires ou vulnérables est limitée dans certains pays.\nVotre entreprise peut choisir à sa guise le groupe couvert par cet indicateur.\nCet indicateur s’applique aux employés directs (personnes qui ont une relation de travail directe avec votre entreprise).\nPourcentage d'employés issus d'un groupe minoritaire ou vulnérable dans l'ensemble de l'organisation\npour cent (%)\n17.82\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n23\nCommentaire:\nAucun indicateur pour le moment/Je ne sais pas\nComplète\nLAB5041\nImpact sur le score\nVeuillez déclarer les indicateurs suivants relatifs à la santé et à la sécurité des travailleurs intérimaires :\nIl n'y a pas de document à joindre pour cette option. Les informations fournies doivent provenir de rapports publics ou internes de données consolidées\nsur le nombre d’heures travaillées par des travailleurs intérimaires comptabilisées sur une année de référence. Les heures travaillées sont définies comme\nla somme de toutes les périodes consacrées à des activités directes et annexes pour produire des biens et des services. S'il n'est pas possible de calculer\ndirectement le nombre d'heures travaillées, celui-ci peut être estimé en fonction du nombre normal ou standard d'heures de travail, en tenant compte des\ndroits à des périodes d'absence du travail payé (congés payés, congé de maladie avec rémunération, jours fériés, etc.).\nNombre d’heures travaillées par des travailleurs intérimaires\nVeuillez préciser\nExemples de documents à joindre :\nRapport sur les maladies liées au travail\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au taux enregistré de maladie. Les maladies liées au travail peuvent comprendre des problèmes\nde santé aigus, récurrents et chroniques causés ou aggravés par les conditions ou les pratiques de travail. Elles incluent les troubles musculo-\nsquelettiques, les maladies liées au stress (y compris l’obésité et les maladies cardiaques) et les maladies psychologiques.\nCet indicateur s’applique aux employés directs (personnes qui ont une relation de travail directe avec votre entreprise).\nNombre de cas de maladie liée au travail chez les travailleurs intérimaires\nVeuillez préciser\nAucun indicateur pour le moment/Je ne sais pas\nAnnée\nUnité\n\nComplète", "docs": [{"name": "Politique Sociale", "type": "Politique/code de conduite", "pages": "2-3", "comment": "SANTE ET SECURITE DES SALARIES"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "Les fournisseurs de Caméléons doivent prendre toutes les mesures pour assurer la santé et la sécurité"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "8", "comment": "Santé et sécurité des employés"}, {"name": "Politique Sociale", "type": "Politique/code de conduite", "pages": "4", "comment": "Système de rémunération, Organisation flexible du travail"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "Les fournisseurs de Caméléons RH doivent respecter les lois en vigueur en matière de salaire et de"}, {"name": "contrat2023", "type": "Autre", "pages": "1", "comment": "Document joint"}, {"name": "Politique Sociale", "type": "Politique/code de conduite", "pages": "6", "comment": "Dialogue social"}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "Les fournisseurs doivent s'assurer de l'octroi du droit des salariés à la liberté d’association"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "10", "comment": "Dialogue social"}, {"name": "Politique Sociale", "type": "Politique/code de conduite", "pages": "7", "comment": "Développement des carrières et de la formation"}, {"name": "Charte achats responsable et…", "type": "Po
