-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n25\nCommentaire:\n%d’incidents de corruption confirmés\nExemples de documents à joindre :\nRapport sur l’éthique des affaires\nRapport sur les alertes en matière d'éthique des affaires\nSection de reporting dans votre rapport annuel ou RSE\nVotre document doit : Démontrer les indicateurs relatifs au nombre d’incidents de sécurité de l’information confirmés.\nUn incident de sécurité de l’information confirmé est un incident qui est reconnu comme une violation caractérisée du code de conduite, des politiques de\nl’entreprise ou de la législation relatifs à la sécurité de l’information. Cela comprend notamment les accès non autorisés aux données, applications ou\nréseaux de l’entreprise et les violations de la vie privée des clients, etc.\nUn incident pour lequel une enquête est encore en cours durant la période de reporting n’est pas considéré comme confirmé.\nNombre d’incidents liés à la sécurité de l’information confirmés\nValeur\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n25\nCommentaire:\n%d’incidents liés à la sécurité de l’information confirmés\nVeuillez sélectionner cette option si les autres options ne correspondent pas à votre situation. Veuillez décrire votre situation dans la zone de texte.\nAutres indicateurs liés à l’éthique des affaires\nVeuillez préciser\nAucun indicateur pour le moment/Je ne sais pas\nAnnée\nAnnée\n\nThème\nAchats Responsables\nImpact sur le score\nCe thème se concentre sur la gestion des risques RSE dans votre chaîne d’approvisionnement. Les questions clés portent sur les points suivants :\nles matières premières que vous achetez\nles services que vous engagez\nvos actions visant à promouvoir des pratiques et des opérations durables auprès de votre base de fournisseurs\nvos actions pour encourager des achats responsables\nEnjeux RSE pertinents pour votre entreprise :\nPratiques environnementales des fournisseurs\nPratiques sociales des fournisseurs\nNos avons sélectionné les enjeux RSE les plus pertinents pour votre entreprise d’après son secteur d’activité, sa taille et sa localisation.\nLes enjeux RSE sélectionnés influencent les questions que vous allez recevoir et l’impact de ce thème sur votre score global.\nIndicateur\nPolitiques\nImpact sur le score\nUne politique est un ensemble d’objectifs qui concerne des enjeux RSE spécifiques. Elle montre que votre entreprise a l’intention de réduire son\nimpact, d’atténuer ses risques ou d’améliorer ses performances.\nExemples de politiques :\nPrincipes généraux, déclarations et objectifs qualitatifs visant à améliorer la RSE.\nObjectifs quantitatifs spécifiques avec une échéance définie dans le futur. Vous pouvez soumettre des objectifs tant absolus que relatifs. Un\nobjectif concluant doit remplir les conditions suivantes :\nÊtre limité dans le temps : il doit inclure une année de référence et une année cible.\nÊtre mesurable : il doit inclure un objectif quantitatif à atteindre.\nÊtre réalisable : il doit être réaliste et pertinent par rapport aux activités de l’entreprise.\nObtenir plus d’exemples et de bonnes pratiques concernant l’élaboration de politiques\n\nComplète", "docs": [{"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "25", "comment": "Pourcentage ou nombre de nouveaux employés formés à l’éthique + sécurité de l’information"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "25-26", "comment": "Nombre de cas de travail des enfants et de travail forcé confirmés Nombre d’incidents de corruption"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "25", "comment": "%d’incidents de corruption confirmés"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "25", "comment": "%d’incidents liés à la sécurité de l’information confirmés"}], "no_answers": ["Aucun indicateur pour le moment"], "scorecard_notes": ["🔴 PRIORITÉ ÉLEVÉE — Absence évaluation des risques sécurité de l'information", "🔴 PRIORITÉ ÉLEVÉE — Absence évaluation des risques de corruption", "🟡 Procédure d'alerte corruption à renforcer", "🟡 Devoir de vigilance tiers anti-corruption manquant", "🟡 Audits procédures de contrôle anti-corruption manquants"], "section": "Reporting", "section_label": "Indicateurs éthique"}, {"code": "SUP100", "theme": "Achats Responsables", "question": "Votre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?", "raw": "Impact sur le score\nVotre entreprise dispose-t-elle d'une politique offrant des objectifs qualitatifs et quantitatifs pour les éléments suivants ?\nExemples de documents à joindre :\nPolitique d’achats responsables\nPolitique relative à la diligence raisonnable dans la chaîne d'approvisionnement\nRapport annuel ou RSE\nVotre document doit : Démontrer l’engagement de votre entreprise à gérer les risques d’impacts environnementaux dans la gestion des\napprovisionnements, aux côtés des considérations d’approvisionnement classiques (telles que le prix, la qualité et la fiabilité). Votre politique peut inclure\ndes objectifs qualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : nous engager à gérer les risques d’impacts environnementaux négatifs dans notre chaîne d’approvisionnement et à\nsélectionner des fournisseurs qui mettent en œuvre les bonnes pratiques environnementales.\nObjectifs quantitatifs :\nNiveau des Achats Responsables mondiaux : chercher à former 90 % des employés de l’équipe Achats aux enjeux environnementaux dans la chaîne\nd’approvisionnement d’ici 2025 (année de référence : 2020)\nNiveau des critères : réduire les émissions de la chaîne d’approvisionnement de 20 % d’ici 2025 (année de référence : 2023)\nUne politique d’achats responsables devrait exister dans un document distinct du code de conduite à l’intention des fournisseurs. Une politique d’achats\nresponsables vise à communiquer en interne les engagements de l’entreprise en matière d’achats responsables. En revanche, un code de conduite à\nl’intention des fournisseurs vise à communiquer en externe les exigences de l’entreprise à l’égard de ses fournisseurs afin de pouvoir faire affaire avec eux.\nPratiques environnementales des fournisseurs\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n5\nCommentaire:\nPRATIQUES ENVIRONNEMENTALES\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n20\nCommentaire:\n\nIndicateur\nMesures\nImpact sur le score\nL’indicateur représente les actions de votre entreprise en faveur de vos politiques et engagements RSE.\nLes options de réponse pour chaque question représentent les bonnes pratiques selon la taille et le secteur d’activité de votre entreprise.\nSélectionnez les options que votre entreprise a déjà mises en œuvre et fournissez des documents prouvant vos actions.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nExemples de documents à joindre :\nPolitique d’achats responsables\nPolitique relative à la diligence raisonnable dans la chaîne d'approvisionnement\nRapport annuel ou RSE\nVotre document doit : Démontrer l’engagement de votre entreprise à gérer les risques d’impacts sociaux (tels que les heures de travail et les salaires)\ndans la gestion des approvisionnements, aux côtés des considérations d’approvisionnement classiques. Votre politique peut inclure des objectifs\nqualitatifs, quantitatifs ou les deux.\nVoici quelques exemples :\nObjectif qualitatif : nous engager à gérer les risques d’impacts sociaux négatifs dans notre chaîne d’approvisionnement et à sélectionner des\nfournisseurs qui mettent en œuvre les bonnes pratiques sociales.\nObjectifs quantitatifs :\nNiveau des Achats Responsables mondiaux : chercher à former 90 % des employés de l’équipe Achats aux enjeux environnementaux dans la chaîne\nd’approvisionnement d’ici 2025 (année de référence : 2020)\nNiveau des critères : 100 % des employés des fournisseurs touchant un salaire décent d’ici 2030 (année de référence : 2022)\nUne politique d’achats responsables devrait exister dans un document distinct du code de conduite à l’intention des fournisseurs. Une politique d’achats\nresponsables vise à communiquer en interne les engagements de l’entreprise en matière d’achats responsables. En revanche, un code de conduite à\nl’intention des fournisseurs vise à communiquer en externe les exigences de l’entreprise à l’égard de ses fournisseurs afin de pouvoir faire affaire avec eux.\nPratiques sociales des fournisseurs\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n4\nCommentaire:\nPRATIQUES D’EMPLOI : DROITS FONDAMENTAUX ET LUTTES CONTRE LES DISCRIMINATIONS\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n20\nCommentaire:\nAucune politique\n\nComplète", "docs": [{"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "5", "comment": "PRATIQUES ENVIRONNEMENTALES"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "20", "comment": ""}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "4", "comment": "PRATIQUES D’EMPLOI : DROITS FONDAMENTAUX ET LUTTES CONTRE LES DISCRIMINATIONS"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "20", "comment": "Aucune politique"}], "no_answers": [], "scorecard_notes": ["🟠 Adhésion partielle (50/100) — étendre adhésions sur achats responsables"], "section": "Politiques", "section_label": "Politique achats responsables"}, {"code": "SUP305", "theme": "Achats Responsables", "question": "Quelles actions votre entreprise a-t-elle mises en œuvre pour intégrer les facteurs sociaux et environnementaux au sein des achats ?", "raw": "Impact sur le score\nQuelles actions votre entreprise a-t-elle mises en œuvre pour intégrer les facteurs sociaux et environnementaux au sein\ndes achats ?\nExemples de documents à joindre :\nCode de conduite à l’intention des fournisseurs\nRapport annuel ou RSE\nVotre document doit : Attester la communication de votre entreprise auprès de ses fournisseurs, en définissant ses attentes envers eux en matière de\nresponsabilité sociétale et environnementale.\nUn code de conduite à l’intention des fournisseurs devrait exister dans un document distinct de la politique d’achats responsables d’une entreprise, car\nchacun sert un objectif différent (le premier est externe pour les fournisseurs et le second est interne pour l’équipe d’approvisionnement ou les autres\nemployés des achats).\nCode de conduite RSE à l’intention des fournisseurs\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n1-7\nCommentaire:\nExemples de documents à joindre :\nInstructions relatives aux contrats avec les fournisseurs\nContrats fournisseurs avec des clauses\nCode de conduite à l’intention des fournisseurs avec une section indiquant la façon dont les fournisseurs seront tenus légalement responsables en\ncas d’infraction\nVotre document doit : Démontrer l’existence de dispositions ou de clauses dans les contrats commerciaux qui couvrent les enjeux RSE et la gestion des\nrisques d’impacts négatifs en coopération avec le fournisseur. Ces enjeux ne sont pas directement liés à l’objet du contrat, mais visent à définir des\nattentes quant à la RSE et au devoir de vigilance.\nCes dispositions ou clauses contractuelles obligent les fournisseurs à satisfaire aux exigences et prévoient généralement des sanctions disciplinaires en\ncas de rupture de contrat, allant jusqu’à sa résiliation.\nIntégration systématique de clauses sociales et environnementales dans les contrats fournisseurs\nDocument joint\nAvenant au contrat fournisseur\nAutre\nRemplacer le document\nPages indiquées:\nTout\nCommentaire:\n\nExemples de documents à joindre :\nInstructions de travail relatives aux évaluations des risques liés à la chaîne d’approvisionnement\nDocuments internes d’évaluation des risques liés à la chaîne d’approvisionnement\nDocuments d’évaluation des risques RSE du fournisseur\nVotre document doit : Démontrer l’existence d’un processus permettant d’identifier les risques les plus importants d’impacts négatifs au niveau RSE dans\nla chaîne d’approvisionnement et parmi les fournisseurs. Les impacts négatifs au niveau RSE comprennent les effets négatifs sur les particuliers, les\ntravailleurs, les communautés et l’environnement liés à la divulgation de données, aux droits humains, à l’emploi, à la corruption et aux intérêts des\nconsommateurs. Ce processus doit permettre d’évaluer la nature et l’étendue des impacts réels et potentiels tout au long de la chaîne\nd’approvisionnement, en intégrant les informations pertinentes sur la RSE fournies par les parties prenantes et les détenteurs de droits, mais également\nde classer les risques par ordre de priorité en fonction de leur gravité et de leur probabilité.\nLe résultat de cette évaluation des risques pourrait servir de référence pour l’entreprise lorsqu’elle cherche à établir si des actions supplémentaires\ns’imposent pour un fournisseur, un produit ou une catégorie d’achat en particulier (telles que des évaluations et des audits).\nÉvaluation des risques d’impacts négatifs au niveau RSE dans la chaîne d’approvisionnement\nExemples de documents à joindre :\nInstructions relatives à l’évaluation des fournisseurs\nExemples de questionnaires\nChecklists\nVotre document doit : Démontrer l’examen par questionnaire des pratiques RSE d’un fournisseur afin de vérifier si des mesures d’atténuation des risques\nsont mises en œuvre et de s’assurer que les impacts négatifs ont été évités ou pris en considération.\nCette évaluation fournisseur peut être effectuée à distance, par exemple, sans se rendre sur le site d’un fournisseur, soit par une tierce partie, soit\ndirectement par le fournisseur sans vérification (notamment sous forme d’auto-évaluation).\nÉvaluation des fournisseurs concernant leurs pratiques environnementales et sociales\nDocument joint\nCharte achats responsable et…\nPolitique/code de conduite\nRemplacer le document\nPages indiquées:\n5,6\nCommentaire:\nSuivi et contrôle : Aux fins de démontrer le respect des engagements pris aux présentes, le Fournisseur\ns’engage à fournir par écrit à Caméléons rh tout documents, à première demande et dans les meilleurs\ndélais\nExemples de documents à joindre :\nMatériel de formation (diaporamas, résumés du contenu de la formation)\nPreuve de la réalisation de la formation (p. ex., rapports d’avancement, certificats d’achèvement)\nVotre document doit : Démontrer que votre entreprise propose des programmes de formation portant sur les achats responsables à ses professionnels\ndes achats. Ces programmes de formation visent à renforcer leur connaissance des enjeux sociaux et environnementaux ainsi que des risques d’impacts\nnégatifs tout au long de la chaîne d’approvisionnement.\nFormation des acheteurs sur les questions environnementales et sociales au sein de la chaîne d’approvisionnement\nExemples de documents à joindre :\nInstructions pour l’audit des fournisseurs\nRapports d’audit ou d’inspection\nVotre document doit : Démontrer l’existence d’instructions ou d’un processus opérationnel pour réaliser des audits sur site ou virtuels des fournisseurs\nde votre entreprise, annoncés ou non, afin de déceler les cas de non-conformité aux exigences obligatoires en matière de RSE. Ce processus doit\npermettre de contrôler la mise en œuvre et l’efficacité de vos engagements, activités et objectifs internes sur le plan du devoir de vigilance.\nAudits sur site des fournisseurs sur les enjeux environnementaux et sociaux\n\nExemples de documents à joindre :\nInstructions de travail relatives à l’évaluation de la performance des acheteurs\nDocuments d’évaluation des employés comportant des objectifs en matière d’achats responsables\nVotre document doit : Démontrer l’existence d’un processus ou mécanisme qui intègre la performance RSE des fournisseurs dans l’évaluation de la\nperformance des acheteurs. Les objectifs doivent être propres aux acheteurs qui, au sein du service Achats, sont chargés de sélectionner, de gérer et\nd’interagir avec les fournisseurs de votre entreprise.\nObjectifs d’achats responsables intégrés dans les évaluations de performance des acheteurs\nExemples de documents à joindre :\nInstructions internes relatives aux achats responsables pour les acheteurs\nDocuments montrant la mise en œuvre du programme\nVotre document doit : Démontrer l’existence d’un processus ou mécanisme qui intègre la performance RSE des fournisseurs dans les processus d’achat\ninternes pour des produits ou services spécifiques. Il peut s’agir d’un processus visant à acheter uniquement des articles de papeterie durables, des\nproduits dérivés du bois certifiés, des services d’hébergement de données économes en énergie, etc.\nUne facture ou un reçu indiquant un achat ponctuel de produits ou de services durables ne peut pas faire office de preuve.\nProcessus d’achat internes pour des produits ou services spécifiques (p. ex., articles en papier et de papeterie, services\nd’hébergement de données, mobilier ou équipement de bureau) intégrant des critères RSE\nVeuillez sélectionner cette option uniquement si les autres options répertoriées ne s’appliquent pas.\nVotre document doit : Attester des actions, distinctes de celles spécifiées dans d’autres options, pour promouvoir les achats responsables. Ces actions\nsont réalisées en intégrant des enjeux environnementaux ainsi que des questions sociales et de droits humains dans la gestion des approvisionnements\naux côtés des considérations d’approvisionnement classiques (telles que le prix, la qualité et la fiabilité).\nExemples de documents à joindre :\nProcédures opératoires standard\nInstructions de travail\nDocuments montrant la mise en œuvre du programme\nAutres actions pour encourager des achats responsables qui ne sont incluses nulle part ailleurs dans cette question\nNotre fournisseur à des engagements RSE\nVeuillez préciser\nDocument joint\nLettre engagement RGPD du …\nAutre\nRemplacer le document\nPages indiquées:\n1\nCommentaire:\nAucune action pour le moment/Je ne sais pas\n\nIndicateur\nReporting\nImpact sur le score\nLe reporting repose sur des indicateurs de performance clés quantitatifs qui permettent de mesurer votre mise en œuvre des pratiques RSE.\nNous vous demanderons de joindre des documents comprenant vos indicateurs RSE. Un document de reporting valide comporte l’année de\nreporting et l’unité de reporting (comme les kWh ou les litres).\nAssurez-vous que la dernière période de reporting se situe au cours des deux dernières années calendaires.\nEn savoir plus sur les critères à respecter pour les documents justificatifs\nComplète", "docs": [{"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "1-7", "comment": "Exemples de documents à joindre :"}, {"name": "Avenant au contrat fournisseur", "type": "Autre", "pages": "Tout", "comment": ""}, {"name": "Charte achats responsable et…", "type": "Politique/code de conduite", "pages": "5,6", "comment": "Suivi et contrôle : Aux fins de démontrer le respect des engagements pris aux présentes, le Fournisseur"}, {"name": "Lettre engagement RGPD du …", "type": "Autre", "pages": "1", "comment": "Aucune action pour le moment/Je ne sais pas"}], "no_answers": ["Aucune action pour le moment"], "scorecard_notes": ["🟠 Absence évaluation fournisseurs sur pratiques env/sociales", "🟠 Absence formation acheteurs sur questions RSE", "🟠 Absence audits sur site fournisseurs", "🟠 Absence évaluation risques RSE chaîne d'appro"], "section": "Actions", "section_label": "Actions achats responsables"}, {"code": "SUP320", "theme": "Achats Responsables", "question": "Avez-vous mis en place un programme d’approvisionnement inclusif ou d’autres actions visant à prévenir la discrimination dans la chaîne d’approvisionnement ?", "raw": "Impact sur le score\nAvez-vous mis en place un programme d’approvisionnement inclusif ou d’autres actions visant à prévenir la\ndiscrimination dans la chaîne d’approvisionnement ?\nExamples of documents to attach\nSupplier Ownership Classification\nSupplier program implementation record\nStandard operating procedure\nSupplier database with information on ownership\nAnnual Report, Sustainability Report\nDocument guidelines The document(s) should demonstrate operational processes or efforts to ensure inclusive sourcing in their supply chain. Examples\nof actions include: preventing any type of discrimination against suppliers and using supplier selection processes that give equal consideration to local\nand/or global companies.\nExamples of documents to attach\nOn-site audit records for supplier\nStandard operation procedures\nProgram implementation records\nTraining materials and additional evidence of training execution (progress reports, certificates of completion, etc.)\nAnnual Report or Sustainability Report\nDocument guidelines\nThe document(s) should demonstrate the implementation of actions to prevent discrimination and harassment within the workforce and operations of the\ncompany's suppliers. For example (but not limited to) provision of training program on anti-discrimination for suppliers, monitoring of implementation of\nanti-discrimination actions in the suppliers operations, monitoring discrimination cases in the workforce, ensuring suppliers are certified in anti-\ndiscrimination topics, linking procurement-management compensation to supplier anti-discrimination goals.\nPlease select this option only if the rest of the options listed do not apply and describe your own declaration in the open text field.\nDocument guidelines\nYour document should demonstrate actions other than those specified in the other options to prevent discrimination in the supply chain.\nExamples of documents to attach\nStandard operating procedures\nWork instructions\nProgram implementation records\nAnnual Report or Sustainability Report\nAucune action pour le moment/Je ne sais pas\n\nComplète", "docs": [], "no_answers": ["Aucune action pour le moment"], "scorecard_notes": ["🔴 0 document attaché — programme inclusif/anti-discrimination chaîne appro à documenter"], "section": "Actions", "section_label": "Programme inclusif chaîne appro"}, {"code": "SUP600", "theme": "Achats Responsables", "question": "Veuillez déclarer les indicateurs suivants relatifs aux achats responsables : Le(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage de fournisseurs ciblés (par exemple par catégorie d'achats, fournisseurs stratégiques ou autres facteurs de ciblage) qui ont signé le code de conduite des fournisseurs au cours de la période considérée.", "raw": "Impact sur le score\nVeuillez déclarer les indicateurs suivants relatifs aux achats responsables :\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage de fournisseurs ciblés\n(par exemple par catégorie d'achats, fournisseurs stratégiques ou autres facteurs de ciblage) qui ont signé le code de conduite des fournisseurs au cours\nde la période considérée. Exemples de documents à joindre : rapport de gestion des achats, rapport annuel, rapport RSE / développement durable, etc. Il\nn’est pas garanti qu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex. filiale, maison mère, société sœur, etc.) ait un impact\nsur l’évaluation. La période de reporting doit être spécifiée et couvrir une durée minimum d’un an. La dernière période de reporting ne doit pas être\nantérieure aux deux dernières années calendaires.\nPourcentage des fournisseurs ciblés ayant signé le code de conduite des fournisseurs\nLe(s) document(s) doit (doivent) démontrer ce qui suit : la communication publique ou interne de données consolidées sur le pourcentage de contrats\nciblés (par exemple par catégorie d'achat, fournisseurs stratégiques ou autres facteurs de ciblage) qui incluent des clauses sur les exigences en matière\nd'environnement, de travail, de droits de l'homme et d'éthique pendant la période de référence. Exemples de documents à joindre : rapport de gestion des\nachats, rapport annuel, rapport RSE / développement durable, etc. Il n’est pas garanti qu’un reporting pour un périmètre partiel ou hors opérations de\nl’entreprise (p. ex. filiale, maison mère, société sœur, etc.) ait un impact sur l’évaluation. La période de reporting doit être spécifiée et couvrir une durée\nminimum d’un an. La dernière période de reporting ne doit pas être antérieure aux deux dernières années calendaires.\nPourcentage des fournisseurs ciblés avec des contrats contenant des clauses sur les exigences en matière d'environnement, de\ntravail et de droits humains\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n26\nCommentaire:\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage ou le nombre de\nfournisseurs ciblés (par exemple par catégorie d'achats, fournisseurs stratégiques ou autres facteurs de ciblage) qui sont couverts par une évaluation de\nleurs pratiques environnementales et/ou sociales. Exemples de documents à joindre : rapport de gestion des achats, rapport annuel, rapport RSE /\ndéveloppement durable, etc. Il n’est pas garanti qu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex. filiale, maison mère,\nsociété sœur, etc.) ait un impact sur l’évaluation. La période de reporting doit être spécifiée et couvrir une durée minimum d’un an. La dernière période de\nreporting ne doit pas être antérieure aux deux dernières années calendaires.\nPourcentage ou nombre de fournisseurs ciblés ayant fait l'objet d'une évaluation RSE\nDocument joint\nrapport rse 2023-2024\nRapport annuel/RSE\nRemplacer le document\nPages indiquées:\n26\nCommentaire:\nPourcentage ou nombre de fournisseurs ciblés couverts par une évaluation RSE *données estimées\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne des données consolidées sur le pourcentage ou le nombre de\nfournisseurs ciblés (par exemple par catégorie d'achats, fournisseurs stratégiques ou autres facteurs de ciblage) qui sont couverts par un audit sur site de\nleurs pratiques environnementales et/ou sociales. Exemples de documents à joindre : rapport de gestion des achats, rapport annuel, rapport RSE /\ndéveloppement durable, etc. Il n’est pas garanti qu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex. filiale, maison mère,\nsociété sœur, etc.) ait un impact sur l’évaluation. La période de reporting doit être spécifiée et couvrir une durée minimum d’un an. La dernière période de\nreporting ne doit pas être antérieure aux deux dernières années calendaires.\nPourcentage ou nombre de fournisseurs ciblés couverts par un audit sur site de la RSE\n\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage ou le nombre d’employés\nde l’équipe Achats de l’entreprise qui ont reçu une formation sur les achats responsables afin de s’assurer de la compréhension des enjeux sociaux et\nenvironnementaux et de la manière de les intégrer dans leur fonction Achats. Exemples de documents à joindre : rapport de gestion des achats, rapport\nannuel, rapport RSE / développement durable, etc. Il n’est pas garanti qu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex.\nfiliale, maison mère, société sœur, etc.) ait un impact sur l’évaluation. La période de reporting doit être spécifiée et couvrir une durée minimum d’un an. La\ndernière période de reporting ne doit pas être antérieure aux deux dernières années calendaires.\nPourcentage ou nombre d'acheteurs ayant reçu une formation sur les achats responsables\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage ou le nombre des\nfournisseurs audités ou évalués participant à des actions correctives ou au développement des capacités sur les problématiques environnementales ou\nsociales. Exemples de documents à joindre : rapport de gestion des achats, rapport annuel, rapport RSE / développement durable, etc. Il n’est pas garanti\nqu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex. filiale, maison mère, société sœur, etc.) ait un impact sur l’évaluation. La\npériode de reporting doit être spécifiée et couvrir une durée minimum d’un an. La dernière période de reporting ne doit pas être antérieure aux deux\ndernières années calendaires.\nPourcentage ou nombre de fournisseurs audités ou évalués engagés dans des actions correctives ou le développement des capacités\nLe(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne des données consolidées sur tout autre KPI RSE sur les fournisseurs\nnon listés ci-dessus. Exemples de documents à joindre : rapport de gestion des achats, rapport annuel, rapport RSE / développement durable, etc. Il n’est\npas garanti qu’un reporting pour un périmètre partiel ou hors opérations de l’entreprise (p. ex. filiale, maison mère, société sœur, etc.) ait un impact sur\nl’évaluation. La période de reporting doit être spécifiée et couvrir une durée minimum d’un an. La dernière période de reporting ne doit pas être antérieure\naux deux dernières années calendaires.\nAutres indicateurs relatifs aux achats responsables\nVeuillez préciser\nAucun indicateur pour le moment/Je ne sais pas", "docs": [{"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "26", "comment": "Le(s) document(s) doit (doivent) démontrer ce qui suit : le reporting public ou interne de données consolidées sur le pourcentage ou le nombre de"}, {"name": "rapport rse 2023-2024", "type": "Rapport annuel/RSE", "pages": "26", "comment": "Pourcentage ou nombre de fournisseurs ciblés couverts par une évaluation RSE *données estimées"}], "no_answers": ["Aucun indicateur pour le moment"], "scorecard_notes": ["🟡 Absence reporting Scope 3 amont (achats)"], "section": "Reporting", "section_label": "Indicateurs achats responsables"}];

// Determine global priority per question (from scorecard notes)
function priorityOf(q) {
  if (q.scorecard_notes.some(n => n.includes("ÉLEVÉE") || n.includes("PRIORITÉ ÉLEVÉE"))) return "haute";
  if (q.scorecard_notes.some(n => n.includes("🟠"))) return "moyenne";
  if (q.scorecard_notes.length > 0) return "faible";
  return "ok";
}
const PRIORITY_LABEL = {
  haute: "🔴 Priorité haute",
  moyenne: "🟠 Priorité moyenne",
  faible: "🟡 Priorité faible",
  ok: "🟢 Pas d'amélioration identifiée"
};

const THEME_CLASS = {
  "Général": "théme-général",
  "Environnement": "theme-environnement",
  "Social et Droits Humains": "theme-social",
  "Éthique": "theme-éthique",
  "Achats Responsables": "theme-achats",
};
function themeClass(t) {
  if (t === "Général") return "theme-général";
  if (t === "Environnement") return "theme-environnement";
  if (t === "Social et Droits Humains") return "theme-social";
  if (t === "Éthique") return "theme-éthique";
  if (t === "Achats Responsables") return "theme-achats";
  return "theme-général";
}

// LocalStorage helpers
const STORAGE_KEY = "ecovadis_2026_annotations";
function loadAnnotations() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveAnnotations(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
let annotations = loadAnnotations();

function getAnn(code, key, defaultVal = "") {
  return (annotations[code] && annotations[code][key]) || defaultVal;
}
function setAnn(code, key, val) {
  if (!annotations[code]) annotations[code] = {};
  annotations[code][key] = val;
  saveAnnotations(annotations);
  updateStats();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function updateStats() {

  const haute = QUESTIONS.filter(q => priorityOf(q) === "haute").length;

}

const LIB_STORAGE_KEY = "ecovadis_2026_library";

// Doc type → validity duration in years (per EcoVadis methodology)
const VALIDITY_YEARS = {
  politique: 8,
  action: 8,
  reporting: 2,
  audit: 2,
  certificat: 3,
  adhesion: 99,
  autre: 8,
};

// Heuristic: guess type from EcoVadis "type" field of a doc
function guessType(rawType, name) {
  const s = ((rawType || '') + ' ' + (name || '')).toLowerCase();
  if (s.includes('politique') || s.includes('code') || s.includes('charte') || s.includes('lettre d\'engagement')) return 'politique';
  if (s.includes('rapport annuel') || s.includes('rapport rse') || s.includes('rse')) return 'reporting';
  if (s.includes('certificat') || s.includes('iso')) return 'certificat';
  if (s.includes('audit')) return 'audit';
  if (s.includes('adhésion') || s.includes('adhesion')) return 'adhesion';
  if (s.includes('kpi') || s.includes('bilan') || s.includes('reporting')) return 'reporting';
  return 'action';
}

// Build initial library from QUESTIONS data
function buildInitialLibrary() {
  const docMap = new Map();
  for (const q of QUESTIONS) {
    for (const d of q.docs) {
      const key = d.name.trim();
      if (!docMap.has(key)) {
        docMap.set(key, {
          id: 'doc_' + key.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40),
          name: key,
          ecovadis_type: d.type || '',
          guessed_type: guessType(d.type, d.name),
          publication_date: '',  // user fills
          questions: [],
          comment: '',
          status: '☐ à confirmer',
          location: '',  // chemin local fichier
        });
      }
      const doc = docMap.get(key);
      doc.questions.push({
        code: q.code,
        theme: q.theme,
        pages: d.pages || '',
        question_comment: d.comment || ''
      });
    }
  }
  return Array.from(docMap.values());
}

function loadLibrary() {
  try {
    const stored = JSON.parse(localStorage.getItem(LIB_STORAGE_KEY));
    if (stored && Array.isArray(stored) && stored.length > 0) return stored;
  } catch {}
  return buildInitialLibrary();
}
function saveLibrary(data) {
  localStorage.setItem(LIB_STORAGE_KEY, JSON.stringify(data));
}
let library = loadLibrary();

function setDocField(docId, field, value) {
  const doc = library.find(d => d.id === docId);
  if (!doc) return;
  doc[field] = value;
  saveLibrary(library);
  // Re-render only this card to update validity
  if (field === 'publication_date' || field === 'guessed_type') {
    const card = document.getElementById(docId);
    if (card) card.outerHTML = renderDocCard(doc);
  }
  updateLibStats();
}

// Compute validity status from publication_date + type
function computeValidity(doc) {
  if (!doc.publication_date) return { status: 'unknown', label: '⚪ Date inconnue', expiry: null };
  const pub = new Date(doc.publication_date);
  if (isNaN(pub)) return { status: 'unknown', label: '⚪ Date invalide', expiry: null };
  const years = VALIDITY_YEARS[doc.guessed_type] || 8;
  const expiry = new Date(pub);
  expiry.setFullYear(expiry.getFullYear() + years);
  const now = new Date();
  const monthsLeft = (expiry - now) / (1000 * 60 * 60 * 24 * 30);
  const expiryStr = expiry.toISOString().slice(0, 10);
  if (monthsLeft < 0) return { status: 'expired', label: `🔴 Expiré le ${expiryStr}`, expiry: expiryStr };
  if (monthsLeft < 6) return { status: 'warning', label: `🟡 Expire le ${expiryStr}`, expiry: expiryStr };
  return { status: 'valid', label: `🟢 Valide jusqu'au ${expiryStr}`, expiry: expiryStr };
}

function renderDocCard(doc) {
  const validity = computeValidity(doc);
  const typeLabel = {
    politique: 'Politique (8 ans)',
    action: 'Action (8 ans)',
    reporting: 'Reporting/KPI (2 ans)',
    certificat: 'Certificat (3 ans)',
    adhesion: 'Adhésion',
    audit: 'Audit RSE (2 ans)',
    autre: 'Autre'
  };
  // For each rattachement, look up the question text
  const questionsHtml = doc.questions.length === 0
    ? '<div class="empty-msg">Pas encore rattaché à une question</div>'
    : doc.questions.map(qa => {
        const fullQ = QUESTIONS.find(qq => qq.code === qa.code);
        const qShort = fullQ ? (fullQ.question.length > 130 ? fullQ.question.slice(0, 130) + '…' : fullQ.question) : '';
        const why = qa.question_comment && qa.question_comment.trim()
          ? `<div class="rattach-why">💡 <strong>Justification</strong> : ${escapeHtml(qa.question_comment)}</div>`
          : `<div class="rattach-why-empty">⚠️ Pas de justification renseignée — à clarifier pour 2026</div>`;
        return `
          <div class="rattachement-row">
            <a class="rattach-code" href="javascript:void(0)" onclick="goToQuestion('${qa.code}')" title="Aller à la question">${qa.code}</a>
            <div class="rattach-info">
              <div class="rattach-question">${escapeHtml(qShort)}</div>
              ${qa.pages ? `<span class="rattach-pages">📄 Pages : ${escapeHtml(qa.pages)}</span>` : ''}
              <span class="section-tag">${escapeHtml(qa.theme)}</span>
              ${why}
            </div>
          </div>
        `;
      }).join('');

  return `
  <div class="doc-card ${validity.status}" data-type="${doc.guessed_type}" data-validity="${validity.status}" id="${doc.id}">
    <div class="doc-card-header">
      <div>
        <h3>${escapeHtml(doc.name)}</h3>
        <div class="doc-tags">
          <span class="doc-tag type-${doc.guessed_type}">${typeLabel[doc.guessed_type] || doc.guessed_type}</span>
          ${doc.ecovadis_type ? `<span class="section-tag">EcoVadis : ${escapeHtml(doc.ecovadis_type)}</span>` : ''}
        </div>
      </div>
      <span class="validity-badge ${validity.status}">${validity.label}</span>
    </div>
    <div class="doc-card-body">
      <div class="doc-fields">
        <div class="doc-field">
          <label>Type EcoVadis</label>
          <select onchange="setDocField('${doc.id}', 'guessed_type', this.value)">
            ${Object.entries(typeLabel).map(([k, v]) =>
              `<option value="${k}" ${doc.guessed_type === k ? 'selected' : ''}>${v}</option>`
            ).join('')}
          </select>
        </div>
        <div class="doc-field">
          <label>Date de parution</label>
          <input type="date" value="${escapeHtml(doc.publication_date)}" oninput="setDocField('${doc.id}', 'publication_date', this.value)">
        </div>
        <div class="doc-field">
          <label>Date d'expiration</label>
          <div class="computed">${validity.expiry || '—'}</div>
        </div>
        <div class="doc-field">
          <label>Statut 2026</label>
          <select onchange="setDocField('${doc.id}', 'status', this.value)">
            ${['☐ à confirmer','🟢 OK reconduire','🟡 mettre à jour','⚫ obsolète remplacer','🔴 ne couvre pas','🆕 nouveau doc à produire'].map(s =>
              `<option value="${s}" ${doc.status === s ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </div>
        <div class="doc-field" style="grid-column: span 2;">
          <label>Chemin / fichier (optionnel)</label>
          <input type="text" value="${escapeHtml(doc.location)}" oninput="setDocField('${doc.id}', 'location', this.value)" placeholder="ex: 03-social-droits-humains/politiques/politique-sociale-2025.pdf">
        </div>
        <div class="doc-field" style="grid-column: 1 / -1;">
          <label>Commentaire</label>
          <input type="text" value="${escapeHtml(doc.comment)}" oninput="setDocField('${doc.id}', 'comment', this.value)" placeholder="notes...">
        </div>
      </div>
      <div class="doc-questions-list">
        <div class="label">📎 Rattaché à ${doc.questions.length} question${doc.questions.length > 1 ? 's' : ''}</div>
        ${questionsHtml}
      </div>
      <div class="doc-actions">
        <button class="btn btn-danger" onclick="deleteDoc('${doc.id}')">🗑️ Supprimer</button>
      </div>
    </div>
  </div>
  `;
}

function deleteDoc(docId) {
  if (!confirm('Supprimer ce document de la bibliothèque ?')) return;
  library = library.filter(d => d.id !== docId);
  saveLibrary(library);
  renderLibrary();
}

  if (!r) return;
  const newDoc = {
    id: 'doc_rec_' + r.name.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40) + '_' + Date.now(),
    name: r.name,
    ecovadis_type: '',
    guessed_type: r.type,
    publication_date: '',
    questions: r.forQ.map(c => {
      const q = QUESTIONS.find(qq => qq.code === c);
      return { code: c, theme: q ? q.theme : '', pages: '', question_comment: r.why };
    }),
    comment: r.why,
    status: '🆕 nouveau doc à produire',
    location: '',
  };
  library.push(newDoc);
  saveLibrary(library);
  renderLibrary();
}

// Cross-tab navigation (replaces #anchor hrefs that trigger file:// security warnings)
function goToQuestion(code) {
  switchTab('questions');
  setTimeout(() => {
    const el = document.getElementById('q-' + code);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

function renderLibrary() {
  document.getElementById('library').innerHTML = renderRecommendations() + library.map(renderDocCard).join('');
  updateLibStats();
}

function updateLibStats() {
  const total = library.length;
  const valid = library.filter(d => computeValidity(d).status === 'valid').length;
  const warning = library.filter(d => computeValidity(d).status === 'warning').length;
  const expired = library.filter(d => computeValidity(d).status === 'expired').length;
  const unknown = library.filter(d => computeValidity(d).status === 'unknown').length;
  const filled = library.filter(d => d.publication_date).length;
  document.getElementById('lib-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Documents</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-success)">${valid}</div><div class="lbl">🟢 Valides</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-warning)">${warning}</div><div class="lbl">🟡 Bientôt expirés</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-danger)">${expired}</div><div class="lbl">🔴 Expirés</div></div>
    <div class="stat-card"><div class="num" style="color:var(--c-muted)">${unknown}</div><div class="lbl">⚪ Date à saisir</div></div>
    <div class="stat-card"><div class="num">${filled}/${total}</div><div class="lbl">Dates renseignées</div></div>
  `;
}

// Library filters
const libFilters = { type: 'all', validity: 'all' };
function applyLibFilters() {
  document.querySelectorAll('.doc-card').forEach(card => {
    const t = card.dataset.type;
    const v = card.dataset.validity;
    const typeOk = libFilters.type === 'all' || t === libFilters.type;
    const valOk = libFilters.validity === 'all' || v === libFilters.validity;
    card.classList.toggle('hidden', !(typeOk && valOk));
  });
}
document.querySelectorAll('.filter-btn[data-filter-lib]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filterLib;
    document.querySelectorAll(`.filter-btn[data-filter-lib="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    libFilters[f] = btn.dataset.value;
    applyLibFilters();
  });
});

// Add new doc
document.getElementById('btn-add-doc').addEventListener('click', () => {
  const container = document.getElementById('add-doc-form-container');
  if (container.innerHTML) { container.innerHTML = ''; return; }
  container.innerHTML = `
    <div class="add-doc-form">
      <h3>➕ Ajouter un nouveau document</h3>
      <div class="doc-fields">
        <div class="doc-field">
          <label>Nom</label>
          <input type="text" id="new-doc-name" placeholder="ex: Évaluation risques corruption 2026">
        </div>
        <div class="doc-field">
          <label>Type</label>
          <select id="new-doc-type">
            <option value="politique">Politique (8 ans)</option>
            <option value="action" selected>Action (8 ans)</option>
            <option value="reporting">Reporting/KPI (2 ans)</option>
            <option value="certificat">Certificat (3 ans)</option>
            <option value="adhesion">Adhésion</option>
            <option value="audit">Audit RSE (2 ans)</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="doc-field">
          <label>Date de parution</label>
          <input type="date" id="new-doc-date">
        </div>
        <div class="doc-field">
          <label>Statut</label>
          <select id="new-doc-status">
            <option value="🆕 nouveau doc à produire" selected>🆕 nouveau doc à produire</option>
            <option value="☐ à confirmer">☐ à confirmer</option>
            <option value="🟢 OK reconduire">🟢 OK reconduire</option>
            <option value="🟡 mettre à jour">🟡 mettre à jour</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary" onclick="addNewDoc()">Créer</button>
        <button class="btn" onclick="document.getElementById('add-doc-form-container').innerHTML=''">Annuler</button>
      </div>
    </div>
  `;
});

function addNewDoc() {
  const name = document.getElementById('new-doc-name').value.trim();
  if (!name) { alert('Nom requis'); return; }
  const newDoc = {
    id: 'doc_' + name.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40) + '_' + Date.now(),
    name: name,
    ecovadis_type: '',
    guessed_type: document.getElementById('new-doc-type').value,
    publication_date: document.getElementById('new-doc-date').value,
    questions: [],
    comment: '',
    status: document.getElementById('new-doc-status').value,
    location: '',
  };
  library.push(newDoc);
  saveLibrary(library);
  document.getElementById('add-doc-form-container').innerHTML = '';
  renderLibrary();
}

// Export / Import library
document.getElementById('btn-export-lib').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(library, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ecovadis-2026-bibliotheque-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('btn-import-lib').addEventListener('click', () => {
  document.getElementById('file-input-lib').click();
});
document.getElementById('file-input-lib').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      library = JSON.parse(ev.target.result);
      saveLibrary(library);
      renderLibrary();
      alert('Bibliothèque importée');
    } catch (err) { alert('Erreur : ' + err.message); }
  };
  reader.readAsText(file);
});

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'view-' + tab));
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Initial render
render();
renderLibrary();
</script>
</body>
</html>
